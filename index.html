<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Talentera · Sales Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/base.css"/>
<link rel="stylesheet" href="./assets/css/components.css"/>
<link rel="stylesheet" href="./assets/css/acquisition.css"/>
<link rel="stylesheet" href="./assets/css/retention.css"/>
<link rel="stylesheet" href="./assets/css/pnl.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">
  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img class="logo-img" src="https://www.talentera.com/wp-content/themes/talentera-2018/images/new-design/Talentera-ATS-black-logo.svg" alt="Talentera" onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'">
      <span id="logo-fallback" style="display:none;font-size:15px;font-weight:800;color:var(--sb-accent)">Talentera</span>
      <div class="logo-sub">Sales Command Center</div>
    </div>

    <div class="sidebar-section">Main</div>
    <button class="nav-item active" id="nav-acquisition" data-route="acquisition">
      <span class="nav-icon">📊</span> Acquisition
    </button>
    <button class="nav-item" id="nav-retention-team" data-route="retention-team">
      <span class="nav-icon">🛡️</span> Retention
    </button>
    <button class="nav-item nav-sub" id="nav-retention-financial" data-route="retention-financial">
      <span class="nav-icon">💰</span> Financial Details
    </button>
    <button class="nav-item nav-sub" id="nav-features-plan" data-route="features-plan">
      <span class="nav-icon">🚀</span> Features Plan
    </button>
    <button class="nav-item" id="nav-pnl" data-route="pnl">
      <span class="nav-icon">📈</span> P&amp;L
    </button>

    <div class="sidebar-section" id="sideRepTitle">Team</div>
    <div id="sideRepLinks"></div>

    <div class="sidebar-bottom">
      <div class="user-row">
        <div class="user-av">SM</div>
        <div>
          <div class="user-name">Sales Manager</div>
          <div class="user-role">Admin · Riyadh</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <div class="main-area">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbarTitle">Acquisition · Team Overview</div>
        <div class="topbar-sub" id="topbarSub">Loading…</div>
      </div>
      <div class="topbar-right">
        <div class="live-badge"><span class="live-dot"></span>LIVE · SUPABASE</div>
        <button class="refresh-btn" id="refreshBtn"><span id="refreshIcon">↻</span> Refresh</button>
      </div>
    </div>

    <div class="tabs-bar" id="tabsBar">
      <button class="tab-btn active" data-route="acquisition">🏠 Team Overview</button>
      <button class="tab-btn" data-route="retention-team">🛡️ Retention</button>
      <button class="tab-btn" data-route="retention-financial">💰 Financial</button>
      <button class="tab-btn" data-route="features-plan">🚀 Features</button>
      <button class="tab-btn" data-route="pnl">📈 P&amp;L</button>
    </div>

    <div class="content">
      <div id="appContent">
        <div class="loading-state">
          <div class="spinner"></div>
          <div>Loading dashboard…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ MODAL ═══ -->
<div id="detailModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-hd">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="modalSearch" class="modal-search" placeholder="Search…"/>
        <button class="modal-export-btn" id="modalExportBtn">⬇ CSV</button>
        <button class="modal-close-btn" id="modalCloseBtn">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="./assets/js/config.js"></script>
<script src="./assets/js/supabase-client.js"></script>
<script src="./assets/js/state.js"></script>
<script src="./assets/js/utils.js"></script>
<script src="./assets/js/components.js"></script>
<script src="./assets/js/modal.js"></script>
<script src="./assets/js/modules/acquisition.js"></script>
<script src="./assets/js/modules/retention-team.js"></script>
<script src="./assets/js/modules/retention-financial.js"></script>
<script src="./assets/js/modules/features-plan.js"></script>
<script src="./assets/js/modules/pnl.js"></script>
<script src="./assets/js/router.js"></script>
</body>
</html>
