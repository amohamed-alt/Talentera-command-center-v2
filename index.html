<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Talentera · Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f3f7f5;--surface:#fff;--surface2:#f8faf9;--text:#0f2017;--muted:#668075;--border:#dfe8e3;--green:#16a34a;--green2:#0f8c3d;--red:#dc2626;--amber:#d97706;--blue:#2563eb;--purple:#7c3aed;--cyan:#0891b2;--dark:#0f1a14;--dark2:#17231b;--accent:#3dd68c;--shadow:0 10px 30px rgba(15,32,23,.08);--r:18px;--r2:24px;--mono:"DM Mono",monospace;--font:"Plus Jakarta Sans",system-ui,sans-serif}
*{box-sizing:border-box}body{margin:0;font-family:var(--font);background:radial-gradient(circle at top left,rgba(61,214,140,.16),transparent 30%),var(--bg);color:var(--text);min-height:100vh}button,input,select{font-family:inherit}.app{display:flex;min-height:100vh}.side{width:252px;background:linear-gradient(180deg,var(--dark),#09110d);color:#fff;position:fixed;inset:0 auto 0 0;padding:18px 12px;display:flex;flex-direction:column;z-index:5}.brand{padding:8px 10px 18px;border-bottom:1px solid rgba(255,255,255,.08)}.brand h1{font-size:18px;margin:0;font-weight:800;letter-spacing:-.04em}.brand p{margin:5px 0 0;color:#8bad8a;font-size:11px}.nav-title{font-size:10px;color:#78917e;letter-spacing:.16em;text-transform:uppercase;font-weight:800;margin:18px 10px 8px}.nav button{width:100%;display:flex;align-items:center;gap:10px;border:0;background:transparent;color:#9db79f;padding:10px 11px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;text-align:left}.nav button:hover{background:rgba(255,255,255,.06);color:white}.nav button.active{background:rgba(61,214,140,.14);color:var(--accent)}.nav .ico{width:20px;text-align:center}.side-foot{margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding:14px 10px;color:#8bad8a;font-size:11px}.main{margin-left:252px;min-height:100vh;width:calc(100% - 252px)}.top{position:sticky;top:0;background:rgba(255,255,255,.84);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);height:68px;display:flex;align-items:center;gap:14px;padding:0 26px;z-index:4}.top h2{font-size:17px;margin:0;letter-spacing:-.03em}.top p{font-size:11px;color:var(--muted);margin:3px 0 0}.top-actions{margin-left:auto;display:flex;gap:10px;align-items:center}.pill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);background:#fff;border-radius:999px;padding:7px 11px;font-size:11px;font-weight:800;color:var(--muted)}.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(22,163,74,.12)}.btn{border:1px solid var(--border);background:var(--surface);border-radius:12px;padding:9px 12px;font-weight:800;font-size:12px;cursor:pointer;color:var(--text)}.btn:hover{box-shadow:var(--shadow)}.content{padding:24px;max-width:1800px;margin:auto}.view{display:none}.view.active{display:block}.hero{background:linear-gradient(135deg,#10331f,#0f1a14);color:#fff;border-radius:var(--r2);padding:24px;box-shadow:var(--shadow);display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:18px;overflow:hidden;position:relative}.hero:after{content:"";position:absolute;right:-120px;top:-120px;width:330px;height:330px;background:radial-gradient(circle,rgba(61,214,140,.25),transparent 65%)}.hero h3{margin:0;font-size:25px;letter-spacing:-.05em}.hero p{margin:8px 0 0;color:#bdd3c2;font-size:13px}.hero .meta{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.hero .meta span{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);padding:7px 10px;border-radius:999px;font-size:11px;font-weight:800}.filters{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}.filters input,.filters select{border:1px solid var(--border);background:#fff;border-radius:12px;padding:10px 12px;font-size:12px;min-width:160px;color:var(--text);font-weight:700}.grid{display:grid;gap:14px}.kpis{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:1.2fr .8fr}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 1px 2px rgba(0,0,0,.03);padding:16px;min-width:0}.card h4{margin:0 0 12px;font-size:14px;letter-spacing:-.02em}.kpi{cursor:pointer;transition:.15s}.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow)}.kpi .label{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.06em}.kpi .num{font-size:27px;font-weight:800;letter-spacing:-.05em;margin-top:8px}.kpi .sub{font-size:11px;color:var(--muted);margin-top:6px}.kpi.green{border-color:rgba(22,163,74,.25);background:linear-gradient(180deg,#fff,rgba(22,163,74,.05))}.kpi.red{border-color:rgba(220,38,38,.25);background:linear-gradient(180deg,#fff,rgba(220,38,38,.05))}.kpi.amber{border-color:rgba(217,119,6,.25);background:linear-gradient(180deg,#fff,rgba(217,119,6,.05))}.kpi.blue{border-color:rgba(37,99,235,.25);background:linear-gradient(180deg,#fff,rgba(37,99,235,.05))}.kpi.purple{border-color:rgba(124,58,237,.25);background:linear-gradient(180deg,#fff,rgba(124,58,237,.05))}.table-wrap{overflow:auto;max-height:560px;border-radius:14px;border:1px solid var(--border)}table{width:100%;border-collapse:collapse;background:#fff;min-width:840px}th{position:sticky;top:0;background:#f8faf9;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:10px;border-bottom:1px solid var(--border);z-index:1}td{font-size:12px;padding:10px;border-bottom:1px solid #eef3f0;vertical-align:middle}tr:hover td{background:#fbfdfc}.tag{display:inline-flex;padding:4px 8px;border-radius:999px;font-size:10px;font-weight:800;border:1px solid var(--border);background:#f7faf8}.tag.green{color:var(--green);background:rgba(22,163,74,.08);border-color:rgba(22,163,74,.18)}.tag.red{color:var(--red);background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.18)}.tag.amber{color:var(--amber);background:rgba(217,119,6,.08);border-color:rgba(217,119,6,.18)}.tag.blue{color:var(--blue);background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.18)}.tag.purple{color:var(--purple);background:rgba(124,58,237,.08);border-color:rgba(124,58,237,.18)}.mono{font-family:var(--mono)}.muted{color:var(--muted)}.bar{height:8px;background:#edf3ef;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:999px}.chart-list{display:flex;flex-direction:column;gap:10px}.chart-row{display:grid;grid-template-columns:110px 1fr 70px;gap:10px;align-items:center;font-size:12px}.status{padding:12px;border-radius:14px;border:1px solid var(--border);background:#fff;margin-bottom:14px;font-size:12px;color:var(--muted)}.error{border-color:rgba(220,38,38,.25);background:rgba(220,38,38,.06);color:#991b1b}.ok{border-color:rgba(22,163,74,.25);background:rgba(22,163,74,.06);color:#166534}.modal{display:none;position:fixed;inset:0;background:rgba(5,12,8,.55);z-index:20;align-items:center;justify-content:center;padding:22px}.modal.show{display:flex}.modal-card{background:#fff;width:min(1180px,96vw);max-height:88vh;overflow:hidden;border-radius:24px;box-shadow:0 30px 90px rgba(0,0,0,.25);display:flex;flex-direction:column}.modal-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}.modal-head h3{margin:0;font-size:17px}.modal-head button{margin-left:auto}.modal-body{padding:16px;overflow:auto}.loader{height:3px;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:load 1.2s infinite;margin:-24px -24px 18px;display:none}.loading .loader{display:block}@keyframes load{from{transform:translateX(-100%)}to{transform:translateX(100%)}}@media(max-width:1100px){.side{width:72px}.brand p,.brand h1 span,.nav-title,.nav button span:not(.ico),.side-foot{display:none}.main{margin-left:72px;width:calc(100% - 72px)}.kpis,.two,.three{grid-template-columns:1fr 1fr}}@media(max-width:720px){.side{display:none}.main{margin-left:0;width:100%}.top{padding:0 14px}.content{padding:14px}.kpis,.two,.three{grid-template-columns:1fr}.hero{flex-direction:column}.filters input,.filters select{width:100%}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><h1>Talentera <span>Command</span></h1><p>Supabase Live Dashboard</p></div>
    <div class="nav-title">Core</div>
    <div class="nav" id="nav"></div>
    <div class="side-foot"><b>Data source</b><br>Supabase views only<br><span id="sideSync">Loading...</span></div>
  </aside>
  <main class="main">
    <header class="top">
      <div><h2 id="pageTitle">Command Center</h2><p id="pageSub">Acquisition · Retention · P&L · Marketing</p></div>
      <div class="top-actions"><span class="pill"><span class="dot"></span><span id="syncText">Live</span></span><button class="btn" onclick="refreshAll()">Refresh</button></div>
    </header>
    <section class="content loading" id="content">
      <div class="loader"></div>
      <div id="status" class="status">Loading Supabase views...</div>
      <div id="views"></div>
    </section>
  </main>
</div>
<div class="modal" id="modal"><div class="modal-card"><div class="modal-head"><h3 id="modalTitle">Details</h3><button class="btn" onclick="closeModal()">Close</button></div><div class="modal-body" id="modalBody"></div></div></div>
<script>
const SUPABASE_URL = 'https://czaxtwbmborxwzaboqxl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_uVUdpVWggu1WvkSKCAi51w_9qsb-AjX';
const PORTAL_ID = '145742477';
const VIEWS = {
  acqSummary:'vw_acquisition_dashboard_summary', acqOwners:'vw_acquisition_owner_coverage', acqNeeds:'vw_acquisition_needs_contact', acqDeals:'vw_acquisition_deal_summary', ownerPeriods:'vw_owner_activity_periods',
  retSummary:'vw_retention_dashboard_summary', retOwners:'vw_retention_owner_summary', retAccounts:'vw_retention_renewal_logic', retNotBudget:'vw_retention_not_in_budget',
  pnlSummary:'vw_pnl_dashboard_summary', pnlMonthly:'vw_pnl_monthly',
  featSummary:'vw_features_plan_dashboard_summary', featCompanies:'vw_features_plan_company_summary',
  mktOverview:'vw_marketing_overview', mktSourceRegion:'vw_marketing_source_region', dataQuality:'vw_data_quality_dashboard'
};
const state = {tab:'overview', data:{}, filters:{q:'', product:'All', owner:'All', year:'All', country:'All'}};
const tabs = [
  ['overview','🏠','Overview'],['acquisition','🎯','Acquisition'],['retention','🔁','Retention'],['pnl','💰','P&L'],['features','🚀','Features Plan'],['marketing','📣','Marketing'],['quality','🧹','Data Quality']
];
const fmt = new Intl.NumberFormat('en-US');
const money = v => '$' + fmt.format(Math.round(Number(v||0)));
const num = v => fmt.format(Math.round(Number(v||0)));
const pct = v => (Number(v||0)).toFixed(1) + '%';
const esc = v => String(v ?? '').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
const by = (arr,key) => [...new Set((arr||[]).map(x=>x?.[key]).filter(Boolean))].sort();
const sum = (arr,key) => (arr||[]).reduce((a,b)=>a+Number(b?.[key]||0),0);
const cls = label => { const t=String(label||'').toLowerCase(); if(t.includes('lost')||t.includes('delayed')||t.includes('untouched'))return 'red'; if(t.includes('cash')||t.includes('connected')||t.includes('completed')||t.includes('on time'))return 'green'; if(t.includes('booked')||t.includes('upcoming')||t.includes('pending'))return 'amber'; if(t.includes('late'))return 'purple'; return 'blue'; };
function api(path,params={}){ const qs = new URLSearchParams(params); return fetch(`${SUPABASE_URL}/rest/v1/${path}?${qs}`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}}).then(async r=>{ if(!r.ok) throw new Error(`${path}: ${r.status} ${await r.text()}`); return r.json(); }); }
async function load(){ document.getElementById('content').classList.add('loading'); setStatus('Loading Supabase views...'); const reqs = Object.entries(VIEWS).map(async ([k,v])=>{ try{ state.data[k]=await api(v,{select:'*',limit:k.includes('Accounts')||k.includes('Needs')||k.includes('Companies')?5000:1000}); } catch(e){ state.data[k]=[]; console.error(e); setStatus('Some views failed: '+e.message,true); } }); await Promise.all(reqs); document.getElementById('content').classList.remove('loading'); setStatus(`Loaded ${Object.keys(VIEWS).length} Supabase views · ${new Date().toLocaleString()}`,false,true); document.getElementById('sideSync').textContent = new Date().toLocaleTimeString(); render(); }
function setStatus(t,isErr=false,isOk=false){ const el=document.getElementById('status'); el.textContent=t; el.className='status '+(isErr?'error':isOk?'ok':''); document.getElementById('syncText').textContent=isErr?'Check data':'Live'; }
function initNav(){ document.getElementById('nav').innerHTML=tabs.map(t=>`<button data-tab="${t[0]}"><span class="ico">${t[1]}</span><span>${t[2]}</span></button>`).join(''); document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render();}); }
function setTitle(){ const t=tabs.find(x=>x[0]===state.tab)||tabs[0]; document.getElementById('pageTitle').textContent=t[2]; document.getElementById('pageSub').textContent='Live from Supabase · clickable KPIs · no static JSON fallback'; document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab)); }
function kpi(label,value,sub='',color='green',rows=[]){ return `<div class="card kpi ${color}" onclick='openRows(${JSON.stringify(label)},${JSON.stringify(rows||[])})'><div class="label">${esc(label)}</div><div class="num">${esc(value)}</div><div class="sub">${esc(sub)}</div></div>`; }
function table(rows,cols,limit=80){ rows = rows || []; return `<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${esc(c.label)}</th>`).join('')}</tr></thead><tbody>${rows.slice(0,limit).map(r=>`<tr>${cols.map(c=>`<td>${c.render?c.render(r):esc(r[c.key])}</td>`).join('')}</tr>`).join('') || `<tr><td colspan="${cols.length}">No rows</td></tr>`}</tbody></table></div>${rows.length>limit?`<p class="muted" style="margin-top:8px;font-size:11px">Showing ${limit} of ${rows.length}</p>`:''}`; }
function chart(rows,labelKey,valueKey,maxRows=10){ rows=[...(rows||[])].sort((a,b)=>Number(b[valueKey]||0)-Number(a[valueKey]||0)).slice(0,maxRows); const max=Math.max(1,...rows.map(r=>Number(r[valueKey]||0))); return `<div class="chart-list">${rows.map(r=>`<div class="chart-row"><b>${esc(r[labelKey]||'Unknown')}</b><div class="bar"><span style="width:${Math.min(100,Number(r[valueKey]||0)/max*100)}%"></span></div><span class="mono">${num(r[valueKey])}</span></div>`).join('')||'<p class="muted">No data</p>'}</div>`; }
function filters(extra=''){ return `<div class="filters"><input placeholder="Search company / owner / country" value="${esc(state.filters.q)}" oninput="state.filters.q=this.value;render()"><select onchange="state.filters.product=this.value;render()"><option>All</option>${by([...(state.data.retAccounts||[]),...(state.data.pnlSummary||[])],'product').map(x=>`<option ${state.filters.product===x?'selected':''}>${esc(x)}</option>`).join('')}</select><select onchange="state.filters.year=this.value;render()"><option>All</option>${by([...(state.data.retSummary||[]),...(state.data.pnlSummary||[])],'year').map(x=>`<option ${String(state.filters.year)===String(x)?'selected':''}>${esc(x)}</option>`).join('')}</select>${extra}</div>`; }
function apply(rows){ const q=state.filters.q.toLowerCase(), p=state.filters.product, y=state.filters.year; return (rows||[]).filter(r=>{ const blob=JSON.stringify(r).toLowerCase(); return (!q||blob.includes(q)) && (p==='All'||r.product===p||r.product_line===p) && (y==='All'||String(r.year)===String(y)); }); }
function render(){ setTitle(); const root=document.getElementById('views'); root.innerHTML = ({overview,acquisition,retention,pnl,features,marketing,quality}[state.tab]||overview)(); }
function overview(){ const a=(state.data.acqSummary||[])[0]||{}, m=(state.data.mktOverview||[])[0]||{}; const rs=state.data.retSummary||[], ps=state.data.pnlSummary||[], q=state.data.dataQuality||[]; return `<div class="hero"><div><h3>Talentera Live Command Center</h3><p>Acquisition, Retention, P&L, Features Plan, Marketing and Data Quality are now powered by Supabase views.</p></div><div class="meta"><span>${num(a.companies)} companies</span><span>${num(m.contacts)} contacts</span><span>${num(rs.length)} retention products</span><span>${num(ps.length)} P&L rows</span></div></div><div class="grid kpis">${kpi('Acquisition Coverage',pct(a.coverage_pct),'Touched companies','green',state.data.acqOwners)}${kpi('Need Contact',num(a.needs_contact_companies),'No connected call yet','red',state.data.acqNeeds)}${kpi('Retention Renewal',money(sum(rs,'renewal_value')),'Budget 2026','blue',state.data.retAccounts)}${kpi('P&L Net Position',money(sum(ps,'net_cash_position')),'Cashing - total cost','purple',state.data.pnlMonthly)}</div><br><div class="grid two"><div class="card"><h4>Top data quality issues</h4>${table(q,[{key:'issue',label:'Issue',render:r=>`<span class="tag ${cls(r.issue)}">${esc(r.issue)}</span>`},{key:'count',label:'Count',render:r=>num(r.count)}],10)}</div><div class="card"><h4>Marketing sources</h4>${chart(state.data.mktSourceRegion,'analytics_source','contacts')}</div></div>`; }
function acquisition(){ const s=(state.data.acqSummary||[])[0]||{}, owners=apply(state.data.acqOwners||[]), needs=apply(state.data.acqNeeds||[]), deals=apply(state.data.acqDeals||[]); return `<div class="hero"><div><h3>Acquisition Command</h3><p>Coverage, owner activity, needs contact, rank/country coverage, deals and sales emails.</p></div><div class="meta"><span>${pct(s.coverage_pct)} coverage</span><span>${num(s.sales_emails_logged)} emails</span></div></div>${filters()}<div class="grid kpis">${kpi('Companies',num(s.companies),'Acquisition scope','blue',owners)}${kpi('Touched',num(s.touched_companies),pct(s.coverage_pct),'green',owners.filter(x=>Number(x.touched)>0))}${kpi('Need Contact',num(s.needs_contact_companies),'No connected call','red',needs)}${kpi('Completed Meetings',num(s.completed_meetings),'Logged meetings completed','purple',owners)}</div><br><div class="grid two"><div class="card"><h4>Owner / Country / Rank Coverage</h4>${table(owners,[{key:'owner_name',label:'Owner'},{key:'country',label:'Country'},{key:'rank',label:'Rank'},{key:'companies',label:'Companies',render:r=>num(r.companies)},{key:'touched',label:'Touched',render:r=>num(r.touched)},{key:'needs_contact',label:'Need Contact',render:r=>`<span class="tag red">${num(r.needs_contact)}</span>`},{key:'coverage_pct',label:'Coverage',render:r=>pct(r.coverage_pct)}])}</div><div class="card"><h4>Deal Pipeline</h4>${table(deals,[{key:'pipeline_name',label:'Pipeline'},{key:'stage_name',label:'Stage'},{key:'owner_name',label:'Owner'},{key:'product',label:'Product'},{key:'deals',label:'Deals',render:r=>num(r.deals)},{key:'amount',label:'Amount',render:r=>money(r.amount)}],80)}</div></div><br><div class="card"><h4>Need to Contact Accounts</h4>${table(needs,[{key:'company_name',label:'Company',render:r=>`<a target="_blank" href="${esc(r.hubspot_url)}">${esc(r.company_name)}</a>`},{key:'owner_name',label:'Owner'},{key:'country',label:'Country'},{key:'rank',label:'Rank'},{key:'calls_logged',label:'Calls',render:r=>num(r.calls_logged)},{key:'meetings_logged',label:'Meetings',render:r=>num(r.meetings_logged)},{key:'last_touch_at',label:'Last Touch'}],120)}</div>`; }
function retention(){ const summary=apply(state.data.retSummary||[]), accounts=apply(state.data.retAccounts||[]), owners=apply(state.data.retOwners||[]), notb=apply(state.data.retNotBudget||[]); return `<div class="hero"><div><h3>Retention & CS Command</h3><p>Budget, booking, collection, delayed renewals, expected lost, renewed late and not-in-budget logic.</p></div><div class="meta"><span>${money(sum(summary,'renewal_value'))} renewal</span><span>${money(sum(summary,'cash_collected'))} cash</span></div></div>${filters()}<div class="grid kpis">${kpi('Renewal Value',money(sum(summary,'renewal_value')),'Budget 2026','blue',accounts)}${kpi('Booked Value',money(sum(summary,'booked_value')),'Booking sheet','amber',accounts.filter(x=>Number(x.booked_value)>0))}${kpi('Cash Collected',money(sum(summary,'cash_collected')),'Collection sheet','green',accounts.filter(x=>Number(x.collected_value)>0))}${kpi('Delayed Accounts',num(sum(summary,'delayed_accounts')),'Lost excluded · Expected lost tagged','red',accounts.filter(x=>String(x.renewal_status).includes('Delayed')))}</div><br><div class="grid three">${kpi('Booked Not Cash',money(sum(summary,'booked_not_cash')),'Booked - collected','amber',accounts.filter(x=>Number(x.booked_not_cash_value)>0))}${kpi('Renewed Late',num(sum(summary,'renewed_late_accounts')),'Action after renewal month','purple',accounts.filter(x=>x.renewed_late))}${kpi('Not In Budget',num(notb.length),'Booking/collection outside budget','blue',notb)}</div><br><div class="grid two"><div class="card"><h4>Retention Accounts</h4>${table(accounts,[{key:'company_name',label:'Company',render:r=>`<a target="_blank" href="${esc(r.hubspot_search_url)}">${esc(r.company_name)}</a>`},{key:'product',label:'Product'},{key:'rm_owner',label:'RM'},{key:'csm_owner',label:'CSM'},{key:'renewal_status',label:'Status',render:r=>`<span class="tag ${cls(r.renewal_status)}">${esc(r.renewal_status)}</span>`},{key:'renewal_value',label:'Renewal',render:r=>money(r.renewal_value)},{key:'booked_value',label:'Booked',render:r=>money(r.booked_value)},{key:'collected_value',label:'Cash',render:r=>money(r.collected_value)}],150)}</div><div class="card"><h4>Owner Summary</h4>${table(owners,[{key:'rm_owner',label:'RM'},{key:'csm_owner',label:'CSM'},{key:'product',label:'Product'},{key:'accounts',label:'Accounts',render:r=>num(r.accounts)},{key:'renewal_value',label:'Renewal',render:r=>money(r.renewal_value)},{key:'cash_collected',label:'Cash',render:r=>money(r.cash_collected)},{key:'delayed_accounts',label:'Delayed',render:r=>`<span class="tag red">${num(r.delayed_accounts)}</span>`}],120)}</div></div>`; }
function pnl(){ const s=apply(state.data.pnlSummary||[]), m=apply(state.data.pnlMonthly||[]); return `<div class="hero"><div><h3>P&L · Revenue Analysis</h3><p>Total cost = COGS + Overheads + Support Allocation. Monthly 2025/2026 comparison is live from Supabase.</p></div><div class="meta"><span>${money(sum(s,'booking'))} booking</span><span>${money(sum(s,'total_cost'))} cost</span></div></div>${filters()}<div class="grid kpis">${kpi('Booking',money(sum(s,'booking')),'Full reporting','blue',m)}${kpi('Cashing',money(sum(s,'cashing')),'Cash collected','green',m)}${kpi('Total Cost',money(sum(s,'total_cost')),'COGS + Overheads + Support','red',m)}${kpi('Net Position',money(sum(s,'net_cash_position')),'Cashing - cost','purple',m)}</div><br><div class="grid two"><div class="card"><h4>P&L Summary</h4>${table(s,[{key:'year',label:'Year'},{key:'product',label:'Product'},{key:'booking',label:'Booking',render:r=>money(r.booking)},{key:'cashing',label:'Cashing',render:r=>money(r.cashing)},{key:'cogs',label:'COGS',render:r=>money(r.cogs)},{key:'overheads',label:'Overheads',render:r=>money(r.overheads)},{key:'support_allocation',label:'Support',render:r=>money(r.support_allocation)},{key:'net_cash_position',label:'Net',render:r=>`<span class="tag ${Number(r.net_cash_position)>=0?'green':'red'}">${money(r.net_cash_position)}</span>`}])}</div><div class="card"><h4>Monthly Net Position</h4>${table(m,[{key:'year',label:'Year'},{key:'month',label:'Month'},{key:'booking',label:'Booking',render:r=>money(r.booking)},{key:'cashing',label:'Cashing',render:r=>money(r.cashing)},{key:'total_cost',label:'Cost',render:r=>money(r.total_cost)},{key:'net_cash_position',label:'Net',render:r=>money(r.net_cash_position)}],80)}</div></div>`; }
function features(){ const s=apply(state.data.featSummary||[]), c=apply(state.data.featCompanies||[]); return `<div class="hero"><div><h3>Features Plan · Upsell</h3><p>Company-level grouping to avoid double counting renewal and upsell value.</p></div><div class="meta"><span>${money(sum(s,'upsell_value'))} upsell</span><span>${num(sum(s,'feature_rows'))} feature rows</span></div></div>${filters()}<div class="grid kpis">${kpi('Companies',num(sum(s,'companies')),'Unique grouped','blue',c)}${kpi('Proposal Sent',num(sum(s,'proposal_sent_count')),'Feature status','purple',c)}${kpi('Interested',num(sum(s,'interested_count')),'Potential upsell','green',c)}${kpi('Upsell Value',money(sum(s,'upsell_value')),'Company unique','amber',c)}</div><br><div class="grid two"><div class="card"><h4>Summary by Product / Month</h4>${table(s,[{key:'product_line',label:'Product'},{key:'expected_month',label:'Month'},{key:'companies',label:'Companies',render:r=>num(r.companies)},{key:'proposal_sent_count',label:'Proposal',render:r=>num(r.proposal_sent_count)},{key:'interested_count',label:'Interested',render:r=>num(r.interested_count)},{key:'upsell_value',label:'Upsell',render:r=>money(r.upsell_value)},{key:'renewal_value',label:'Renewal',render:r=>money(r.renewal_value)}])}</div><div class="card"><h4>Company Summary</h4>${table(c,[{key:'company_name',label:'Company'},{key:'product_line',label:'Product'},{key:'owner_name',label:'Owner'},{key:'csm_owner',label:'CSM'},{key:'feature_rows',label:'Rows',render:r=>num(r.feature_rows)},{key:'interested_count',label:'Interested',render:r=>num(r.interested_count)},{key:'upsell_value_company_unique',label:'Upsell',render:r=>money(r.upsell_value_company_unique)}],120)}</div></div>`; }
function marketing(){ const m=(state.data.mktOverview||[])[0]||{}, sr=apply(state.data.mktSourceRegion||[]); return `<div class="hero"><div><h3>Marketing Intelligence</h3><p>Source, region, MTD/YTD contacts and sales follow-up readiness. Email events/forms can be plugged in once HubSpot scopes are available.</p></div><div class="meta"><span>${num(m.contacts)} contacts</span><span>${num(m.sources)} sources</span></div></div>${filters('<select onchange="state.filters.country=this.value;render()"><option>All</option>'+by(state.data.mktSourceRegion||[],'country').map(x=>`<option ${state.filters.country===x?'selected':''}>${esc(x)}</option>`).join('')+'</select>')}<div class="grid kpis">${kpi('Contacts',num(m.contacts),'All synced contacts','blue',sr)}${kpi('MTD Contacts',num(m.contacts_mtd),'Created this month','green',sr)}${kpi('YTD Contacts',num(m.contacts_ytd),'Created this year','purple',sr)}${kpi('Paid Contacts',num(m.paid_contacts),'Analytics source contains paid','amber',sr.filter(x=>String(x.analytics_source).toLowerCase().includes('paid')))}</div><br><div class="grid two"><div class="card"><h4>Source / Region Matrix</h4>${table(sr.filter(r=>state.filters.country==='All'||r.country===state.filters.country),[{key:'analytics_source',label:'Source'},{key:'country',label:'Country'},{key:'contacts',label:'Contacts',render:r=>num(r.contacts)},{key:'companies',label:'Companies',render:r=>num(r.companies)}],140)}</div><div class="card"><h4>Top Sources</h4>${chart(sr,'analytics_source','contacts',12)}</div></div>`; }
function quality(){ const q=state.data.dataQuality||[]; return `<div class="hero"><div><h3>Data Quality Center</h3><p>Operational cleanup list for owners, country, product, retention matching and not-in-budget issues.</p></div><div class="meta"><span>${num(sum(q,'count'))} total issues</span></div></div><div class="grid kpis">${q.slice(0,4).map(x=>kpi(x.issue,num(x.count),'Click to inspect','red',[x])).join('')}</div><br><div class="card"><h4>All Issues</h4>${table(q,[{key:'issue',label:'Issue',render:r=>`<span class="tag ${cls(r.issue)}">${esc(r.issue)}</span>`},{key:'count',label:'Count',render:r=>num(r.count)}])}</div>`; }
function openRows(title,rows){ document.getElementById('modalTitle').textContent=title; const cols = inferCols(rows); document.getElementById('modalBody').innerHTML=table(rows,cols,500); document.getElementById('modal').classList.add('show'); }
function inferCols(rows){ const keys=[...new Set((rows||[]).flatMap(r=>Object.keys(r||{})))].filter(k=>!['raw'].includes(k)).slice(0,12); return keys.map(k=>({key:k,label:k.replace(/_/g,' '),render:r=>{ const v=r[k]; if(k.includes('value')||k.includes('amount')||k.includes('cash')||k.includes('booking')||k.includes('cost')) return typeof v==='number'?money(v):esc(v); if(k.includes('url')) return `<a target="_blank" href="${esc(v)}">Open</a>`; if(typeof v==='boolean') return v?'<span class="tag green">Yes</span>':'<span class="tag red">No</span>'; return esc(v); }})); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function refreshAll(){ load(); }
initNav(); load();
</script>
