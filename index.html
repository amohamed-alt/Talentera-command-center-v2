<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Talentera · Sales Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/acquisition.css?v=20260601-contacts-v2" />
  <link rel="stylesheet" href="assets/css/retention.css?v=20260601-contacts-v2" />
  <link rel="stylesheet" href="assets/css/pnl.css?v=20260601-contacts-v2" />
  <style>
    .app{display:flex;min-height:100vh}
    .sidebar{width:var(--sb-w);position:fixed;left:0;top:0;bottom:0;background:var(--sb-bg);border-right:1px solid var(--sb-border);padding:14px 10px;display:flex;flex-direction:column;z-index:20;backdrop-filter:blur(20px)}
    .sidebar-logo{padding:8px 10px 16px;border-bottom:1px solid var(--sb-border);margin-bottom:10px}
    .logo-img{height:28px;width:auto;display:block;margin-bottom:6px}.logo-sub{font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.12em}
    .sidebar-section{font-size:9px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.14em;margin:18px 8px 8px}
    .nav-item{width:100%;display:flex;align-items:center;gap:9px;border:1px solid transparent;background:transparent;color:var(--text2);padding:10px 11px;border-radius:14px;font:700 12px var(--font);cursor:pointer;text-align:left;margin-bottom:4px}
    .nav-item:hover{background:rgba(255,255,255,.55);border-color:var(--border)}.nav-item.active{background:rgba(255,255,255,.9);color:var(--primary-dk);border-color:var(--green-bd);box-shadow:var(--sh-xs)}
    .nav-icon{width:18px;text-align:center}.sidebar-bottom{margin-top:auto}.user-row{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,.55);border:1px solid var(--border);border-radius:16px;padding:10px}.user-av{width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,var(--green),var(--cyan));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900}.user-name{font-size:12px;font-weight:900}.user-role{font-size:9px;color:var(--muted);font-weight:700}
    .main-area{margin-left:var(--sb-w);width:calc(100% - var(--sb-w));min-height:100vh;padding:14px 18px 60px}.topbar{min-height:66px;background:rgba(255,255,255,.74);border:1px solid var(--border);border-radius:24px;display:flex;align-items:center;gap:14px;padding:14px 20px;box-shadow:var(--sh-xs);backdrop-filter:blur(18px);position:sticky;top:12px;z-index:10}.topbar-title{font-size:18px;font-weight:900}.topbar-sub{font-size:11px;color:var(--muted);font-weight:700;margin-top:3px}.topbar-right{margin-left:auto;display:flex;align-items:center;gap:9px}.live-badge{display:flex;align-items:center;gap:6px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);font-size:10px;font-weight:900;border-radius:999px;padding:6px 12px}.live-dot{width:7px;height:7px;border-radius:99px;background:var(--green)}.refresh-btn{border:0;background:var(--green);color:#fff;border-radius:999px;padding:8px 14px;font:900 11px var(--font);cursor:pointer}.refresh-btn:hover{filter:brightness(.95)}
    .tabs-bar{display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.58);border:1px solid var(--border);border-radius:22px;padding:10px;margin:12px 0 16px;overflow-x:auto}.tab-btn{border:1px solid transparent;background:transparent;color:var(--text2);font:800 11px var(--font);padding:9px 13px;border-radius:999px;cursor:pointer;white-space:nowrap}.tab-btn:hover{background:rgba(255,255,255,.65)}.tab-btn.active{background:var(--green);color:#fff;border-color:var(--green-bd)}.content{padding-bottom:60px}.record-link{font-weight:900;color:var(--blue);text-decoration:none}.record-link:hover{text-decoration:underline}.command-health-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}.command-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;box-shadow:var(--sh-xs)}.command-card-top{display:flex;justify-content:space-between;gap:10px}.command-card-title{font-size:11px;font-weight:900;color:var(--text2);text-transform:uppercase;letter-spacing:.09em}.command-card-accent{width:38px;height:4px;border-radius:10px}.command-main-value{font-family:var(--mono);font-size:30px;font-weight:900;margin-top:12px}.command-main-label{font-size:9px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.1em;margin-top:6px}.command-sub-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}.command-mini-v{font-family:var(--mono);font-size:16px;font-weight:900}.command-mini-l{font-size:8px;color:var(--muted);font-weight:900;text-transform:uppercase;margin-top:3px}.ret-period-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px}.ret-period-card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:12px}.ret-period-label{font-size:10px;font-weight:900;color:var(--text2);text-transform:uppercase;margin-bottom:8px}.ret-period-row{display:flex;justify-content:space-between;border-top:1px solid var(--border);padding:7px 0}.ret-period-row:first-of-type{border-top:0}.ret-period-key{font-size:10px;color:var(--muted);font-weight:800}.ret-period-val{font-family:var(--mono);font-size:12px;font-weight:900}.section-unavail,.error-state{padding:14px 16px;border-radius:16px;background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);font-weight:800;margin-bottom:12px}.loading-state{min-height:300px;display:flex;align-items:center;justify-content:center;gap:12px;color:var(--muted);font-weight:900}.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(5,20,12,.48);z-index:100;align-items:center;justify-content:center;padding:20px}.modal-card{width:min(1180px,96vw);max-height:88vh;background:var(--surface);border:1px solid var(--border);border-radius:24px;box-shadow:var(--sh-md);display:flex;flex-direction:column;overflow:hidden}.modal-hd{padding:16px 18px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center}.modal-title{font-size:16px;font-weight:900}.modal-sub{font-size:11px;color:var(--muted);font-weight:800;margin-top:3px}.modal-actions{margin-left:auto;display:flex;gap:8px}.modal-search{height:34px;border:1px solid var(--border);border-radius:999px;padding:0 12px;background:#fff;font:800 11px var(--font)}.modal-btn{height:34px;border:1px solid var(--border);border-radius:999px;background:#fff;padding:0 12px;font:900 11px var(--font);cursor:pointer}.modal-close{width:34px;height:34px;border-radius:999px;border:1px solid var(--border);background:#fff;font-size:18px;cursor:pointer}.modal-body{overflow:auto}.modal-empty{padding:40px;text-align:center;color:var(--muted);font-weight:800}.tbl-wrap{overflow:auto}.tbl{width:100%;border-collapse:collapse}.tbl th{background:var(--surface2);color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.1em;text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}.tbl .c{text-align:center}.show-more-btn{width:100%;border:0;border-top:1px solid var(--border);background:var(--surface2);padding:11px;color:var(--green);font:900 11px var(--font);cursor:pointer}
    @media(max-width:1100px){.summary-grid{grid-template-columns:repeat(2,1fr)!important}.command-health-grid,.two-col,.pipe-cards-grid{grid-template-columns:1fr!important}.main-area{padding:10px}.sidebar{position:static;width:100%;height:auto}.main-area{margin-left:0;width:100%}.app{display:block}.topbar{position:static}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img class="logo-img" src="https://www.talentera.com/wp-content/themes/talentera-2018/images/new-design/Talentera-ATS-black-logo.svg" alt="Talentera" onerror="this.style.display='none'">
        <div class="logo-sub">Sales Command Center</div>
      </div>
      <div class="sidebar-section">Main</div>
      <button class="nav-item active" data-route="acquisition"><span class="nav-icon">📊</span> Acquisition</button>
      <button class="nav-item" data-route="retention-team"><span class="nav-icon">🛡️</span> Retention Team</button>
      <button class="nav-item" data-route="retention-financial"><span class="nav-icon">💰</span> Retention Financial</button>
      <button class="nav-item" data-route="features-plan"><span class="nav-icon">🚀</span> Features Plan</button>
      <button class="nav-item" data-route="pnl"><span class="nav-icon">📈</span> P&amp;L</button>
      <div class="sidebar-bottom">
        <div class="user-row"><div class="user-av">SM</div><div><div class="user-name">Sales Manager</div><div class="user-role">Admin · Riyadh</div></div></div>
      </div>
    </aside>
    <main class="main-area">
      <div class="topbar">
        <div><div class="topbar-title" id="topbarTitle">Acquisition · Command Center</div><div class="topbar-sub" id="topbarSub">Supabase-only live dashboard</div></div>
        <div class="topbar-right"><div class="live-badge"><span class="live-dot"></span>LIVE · SUPABASE</div><button class="refresh-btn" id="refreshBtn">↻ Refresh</button></div>
      </div>
      <div class="tabs-bar" id="tabsBar">
        <button class="tab-btn active" data-route="acquisition">⚡ Acquisition</button>
        <button class="tab-btn" data-route="retention-team">🛡️ Retention Team</button>
        <button class="tab-btn" data-route="retention-financial">💰 Retention Financial</button>
        <button class="tab-btn" data-route="features-plan">🚀 Features Plan</button>
        <button class="tab-btn" data-route="pnl">📈 P&amp;L</button>
      </div>
      <div class="content" id="appContent"></div>
    </main>
  </div>

  <div class="modal-backdrop" id="detailModal">
    <div class="modal-card">
      <div class="modal-hd">
        <div><div class="modal-title" id="modalTitle">Details</div><div class="modal-sub" id="modalSub">0 rows</div></div>
        <div class="modal-actions"><input class="modal-search" id="modalSearch" placeholder="Search rows…"><button class="modal-btn" id="modalExportBtn">Export CSV</button><button class="modal-close" id="modalCloseBtn">×</button></div>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="assets/js/config.js?v=20260601-contacts-v2"></script>
  <script src="assets/js/utils.js?v=20260601-contacts-v2"></script>

  <script src="assets/js/modules/acquisition.js?v=20260601-contacts-v2"></script>

  <script src="assets/js/modules/features-plan.js?v=20260601-contacts-v2"></script>
