l',owner:'all',status:'all',rep:null,repRole:null,retTab:'team',data:{},err:{},loadedAt:null};let DIAG=[],CACHE={},cid=0;const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];function $(x){return document.getElementById(x)}function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function n(v){let x=Number(String(v??'').replace(/[^0-9.-]/g,''));return Number.isFinite(x)?x:0}function int(v){return Math.round(n(v)).toLocaleString()}function money(v){let x=n(v),s=x<0?'-':'',a=Math.abs(x);return s+'$'+(a>=1e6?(a/1e6).toFixed(1)+'M':Math.round(a).toLocaleString())}function pct(v){return (n(v)||0).toFixed(1)+'%'}function norm(v){return String(v??'').trim().toLowerCase()}function sum(rows,k){return rows.reduce((a,r)=>a+n(r[k]),0)}function uniq(a){return [...new Set(a.filter(Boolean).map(String))].sort((x,y)=>x.localeCompare(y))}function cur(k){return S.data[k]||[]}function tone(c){return {green:'--g',cyan:'--c',blue:'--b',purple:'--p',amber:'--a',red:'--r'}[c]||'--g'}function sideMode(){return S.active==='acquisition'||S.active==='acqRep'?'acq':S.active==='retention'||S.active==='retRep'?'ret':'main'}function hsCompany(nm){return nm?`${HS}/contacts/${PORTAL}/objects/0-2/views/all/list?query=${encodeURIComponent(nm)}`:''}function url(r){return r.hubspot_url||r.hubspot_search_url||r.company_url||r.deal_url||r.url||hsCompany(r.company_name||r.dealname||r.name)}function link(v,r){let u=url(r);return u?`<a class="link" target="_blank" href="${esc(u)}">${esc(v||'Open')}</a>`:esc(v||'—')}function activeAcq(rows){return (rows||[]).filter(r=>(S.country==='all'||norm(r.country)===norm(S.country))&&(S.rank==='all'||norm(r.rank)===norm(S.rank))&&(S.owner==='all'||norm(r.owner_name)===norm(S.owner))&&(!S.rep||S.active!=='acqRep'||norm(r.owner_name)===norm(S.rep)))}function activePnl(rows){return (rows||[]).filter(r=>(S.year==='all'||!r.year||String(r.year)===S.year)&&(S.month==='all'||!r.month||norm(String(r.month).slice(0,3))===norm(S.month))&&(S.product==='all'||!r.product||norm(r.product)===norm(S.product)))}function retRows(){return cur('retLogic').filter(r=>(S.year==='all'||!r.year||String(r.year)===S.year)&&(S.month==='all'||!r.month||norm(String(r.month).slice(0,3))===norm(S.month))&&(S.product==='all'||!r.product||norm(r.product)===norm(S.product)))}async function get(k,v){try{let {data,error}=await sb.from(v).select('*').limit(k==='syncRuns'?100:5000);if(error)throw error;S.data[k]=data||[];S.err[k]='';return data||[]}catch(e){S.data[k]=[];S.err[k]=e.message||String(e);return []}}async function loadAll(manual=false){$('live').textContent=manual?'Refreshing':'Connecting';await Promise.all(Object.entries(V).map(([k,v])=>get(k,v)));S.loadedAt=new Date();DIAG=Object.entries(V).map(([k,v])=>({source:k,view:v,rows:cur(k).length,status:S.err[k]?'Failed':'Loaded',error:S.err[k]||''}));$('live').textContent='Live';$('sync').textContent=`${DIAG.filter(x=>x.status==='Loaded').length} sources · ${S.loadedAt.toLocaleTimeString()}`;render()}function toggleSide(){$('sidebar').classList.toggle('open')}function setPage(a){S.active=a;S.rep=null;render()}function setAcqTab(t){S.active='acquisition';S.acqTab=t;S.rep=null;render()}function setRetTab(t){S.active='retention';S.retTab=t;S.rep=null;render()}function setRep(a,name,role){S.active=a;S.rep=name;S.repRole=role||null;render()}function setFilter(k,v){S[k]=v;render()}function reset(){S.year='2026';S.month='all';S.product='all';S.country='all';S.rank='all';S.owner='all';S.status='all';render()}function cache(rows){let id='c'+(++cid);CACHE[id]=rows;return id}function fmt(v,k,r){if(v==null||v==='')return '—';if(['company_name','dealname','name'].includes(k))return link(v,r);if(/url/i.test(k)&&String(v).startsWith('http'))return `<a class="pill blue" target="_blank" href="${esc(v)}">Open</a>`;if(/value|amount|cash|booking|cogs|overheads|support|cost|profit|collection|position|delta|pipeline/i.test(k))return `<span class="num">${money(v)}</span>`;if(/pct|score|margin/i.test(k))return `<span class="num">${pct(v)}</span>`;let s=String(v);if(/lost|delayed|critical|risk|churn/i.test(s))return `<span class="pill red">${esc(s)}</span>`;if(/expected|upcoming|pending|watch|needs/i.test(s))return `<span class="pill amber">${esc(s)}</span>`;if(/cash|booked|renewed|active|completed|loaded|success|healthy|contacted/i.test(s))return `<span class="pill green">${esc(s)}</span>`;return esc(s)}function table(title,rows,cols,sub=''){rows=rows||[];cols=cols||Object.keys(rows[0]||{}).slice(0,10);let id=rows.length?cache(rows):'';return `<section class="card"><div class="head"><div><h3>${esc(title)}</h3><p>${rows.length.toLocaleString()} rows${sub?' · '+esc(sub):''}</p></div>${rows.length?`<button class="chip" onclick="openDrawer('${esc(title)}',CACHE['${id}'],'${rows.length.toLocaleString()} rows')">Open All</button>`:''}</div><div class="wrap">${rows.length?`<table><thead><tr>${cols.map(c=>`<th>${esc(c).replaceAll('_',' ')}</th>`).join('')}</tr></thead><tbody>${rows.slice(0,160).map(r=>`<tr>${cols.map(c=>`<td>${fmt(r[c],c,r)}</td>`).join('')}</tr>`).join('')}</tbody></table>`:`<div class="empty">No rows found.</div>`}</div></section>`}function kpi(t,v,s,c='green',rows=null){let js=rows?`onclick="openDrawer('${esc(t)}',${rows},'${esc(s||'Details')}')"`:'';return `<button class="kpi" style="--tone:var(${tone(c)})" ${js}><div class="v">${v}</div><div class="k">${esc(t)}</div>${s?`<div class="s">${esc(s)}</div>`:''}</button>`}function hero(t,s,side=''){return `<div class="hero"><section class="panel"><span class="eyebrow">Live Snapshot</span><h1>${esc(t)}</h1><p>${esc(s)}</p></section><section class="health">${side||health()}</section></div>`}function health(){let ok=DIAG.filter(x=>x.status==='Loaded').length,bad=DIAG.length-ok;return `<div class="health-row"><span>Loaded Sources</span><b>${ok}</b></div><div class="health-row"><span>Failed Sources</span><b>${bad}</b></div><div class="health-row"><span>Last Refresh</span><b>${S.loadedAt?S.loadedAt.toLocaleTimeString():'—'}</b></div>`}function nav(){let h='<div class="sec">Main</div>';[['acquisition','🎯','Acquisition'],['retention','🛡️','Retention'],['pnl','💰','P&L'],['upsell','✨','Upselling'],['marketing','📣','Marketing'],['quality','🧰','Data Quality']].forEach(x=>h+=`<button class="nav ${S.active===x[0]||((x[0]==='acquisition')&&S.active==='acqRep')||((x[0]==='retention')&&S.active==='retRep')?'active':''}" onclick="setPage('${x[0]}')"><span>${x[1]}</span><span>${x[2]}</span></button>`);if(sideMode()==='acq'){h+='<div class="sec">Acquisition Pages</div>';[['overview','Team Overview'],['kpi','KPI Snapshot'],['rank','Rank A/B Coverage'],['needs','Leads Need Contact'],['pipeline','Pipeline Summary'],['sources','Field Sources']].forEach(x=>h+=`<button class="nav ${S.acqTab===x[0]&&S.active==='acquisition'?'active':''}" onclick="setAcqTab('${x[0]}')"><span>•</span><span>${x[1]}</span></button>`);h+='<div class="sec">Acquisition Reps</div>';cur('acqSidebar').forEach(r=>h+=`<button class="nav ${S.active==='acqRep'&&S.rep===r.owner_name?'active':''}" onclick="setRep('acqRep','${esc(r.owner_name)}','activity')"><span>●</span><span>${esc(r.owner_name)}<small>${int(r.connected_calls)} connected · ${int(r.meetings_completed)} meetings</small></span><span class="badge ok">${int(r.connected_calls)}</span></button>`);let deals=cur('acqPipe').filter(r=>r.role==='deals_only');if(deals.length){h+='<div class="sec">Deal Owners</div>';deals.forEach(r=>h+=`<button class="nav ${S.active==='acqRep'&&S.rep===r.owner_name?'active':''}" onclick="setRep('acqRep','${esc(r.owner_name)}','deals_only')"><span>◆</span><span>${esc(r.owner_name)}<small>${int(r.open_deals)} open · ${money(r.open_pipeline_value)}</small></span><span class="badge">${int(r.open_deals)}</span></button>`)}}if(sideMode()==='ret'){h+='<div class="sec">Retention Pages</div>';[['team','Team Overview'],['financial','Financial Details']].forEach(x=>h+=`<button class="nav ${S.retTab===x[0]&&S.active==='retention'?'active':''}" onclick="setRetTab('${x[0]}')"><span>•</span><span>${x[1]}</span></button>`);['RM','CSM'].forEach(role=>{h+=`<div class="sec">Retention ${role}</div>`;cur('retSidebar').filter(r=>r.role===role).forEach(r=>h+=`<button class="nav ${S.active==='retRep'&&S.rep===r.owner_name&&S.repRole===role?'active':''}" onclick="setRep('retRep','${esc(r.owner_name)}','${role}')"><span>●</span><span>${esc(r.owner_name)}<small>${int(r.accounts)} accounts · ${money(r.renewal_value)}</small></span><span class="badge">${int(r.delayed_accounts)}</span></button>`)})}$('nav').innerHTML=h}function filters(){let ar=[...cur('acqRank'),...cur('acqRankDetails'),...cur('acqNeeds')],rr=cur('retLogic'),pnl=[...cur('pnl'),...cur('pnlMonthly')];let years=uniq([...rr.map(r=>r.year),...pnl.map(r=>r.year)]);let products=uniq([...rr.map(r=>r.product),...pnl.map(r=>r.product),...cur('upsellCompanies').map(r=>r.product_line)]);let h=`<select class="sel" onchange="setFilter('year',this.value)"><option value="all">All Years</option>${(years.length?years:['2026']).map(y=>`<option ${S.year==y?'selected':''}>${esc(y)}</option>`).join('')}</select>`;if(S.active==='pnl'||S.active==='retention'||S.active==='retRep')h+=`<select class="sel" onchange="setFilter('month',this.value)"><option value="all">All Months</option>${MONTHS.map(m=>`<option ${S.month===m?'selected':''}>${m}</option>`).join('')}</select><select class="sel" onchange="setFilter('product',this.value)"><option value="all">All Products</option>${products.map(p=>`<option ${S.product===p?'selected':''}>${esc(p)}</option>`).join('')}</select>`;if(sideMode()==='acq')h+=`<select class="sel" onchange="setFilter('owner',this.value)"><option value="all">All Owners</option>${uniq(ar.map(r=>r.owner_name)).map(o=>`<option ${S.owner===o?'selected':''}>${esc(o)}</option>`).join('')}</select><select class="sel" onchange="setFilter('country',this.value)"><option value="all">All Countries</option>${uniq(ar.map(r=>r.country)).map(c=>`<option ${S.country===c?'selected':''}>${esc(c)}</option>`).join('')}</select><select class="sel" onchange="setFilter('rank',this.value)"><option value="all">All Ranks</option>${uniq(ar.map(r=>r.rank)).map(r=>`<option ${S.rank===r?'selected':''}>${esc(r)}</option>`).join('')}</select>`;h+=`<button class="btn alt" onclick="reset()">Reset filters</button>`;$('filters').innerHTML=h}function render(){nav();filters();let map={acquisition:['Acquisition','Team overview, KPI snapshot, Rank A/B coverage, needs contact, pipeline, and field sources.'],acqRep:[`Acquisition · ${S.rep||''}`,'Rep-level acquisition details.'],retention:['Retention','Retention team, financials, RM/CSM views.'],retRep:[`Retention ${S.repRole||''} · ${S.rep||''}`,'Rep-level renewal action details.'],pnl:['P&L Advanced','Booking, cashing, COGS, overheads, support allocation, total cost and margins.'],upsell:['Upselling / Features Plan','Company-level feature plan and status.'],marketing:['Marketing','Marketing overview and source split.'],quality:['Data Quality','Sources, sync and data health.']};let [t,s]=map[S.active]||map.acquisition;$('title').textContent=t;$('subtitle').textContent=s;let html='';if(S.active==='acquisition')html=renderAcq();if(S.active==='acqRep')html=renderAcqRep();if(S.active==='retention')html=renderRetention();if(S.active==='retRep')html=renderRetRep();if(S.active==='pnl')html=renderPnl();if(S.active==='upsell')html=renderUpsell();if(S.active==='marketing')html=hero('Marketing','Marketing overview and source / region split.')+table('Marketing Overview',cur('marketing'));if(S.active==='quality')html=hero('Data Quality & Sync Monitor','Source status, sync runs and failed views.',health())+`<div class="kpis">${kpi('Loaded Sources',int(DIAG.filter(x=>x.status==='Loaded').length),'Supabase reads','green')}${kpi('Failed Sources',int(DIAG.filter(x=>x.status==='Failed').length),'Check permissions/views','red')}</div>`+table('Source Diagnostics',DIAG)+table('Sync State',cur('syncState'))+table('Sync Runs',cur('syncRuns'));$('content').innerHTML=html}function acqTeam(){let t=cur('acqTeam')[0]||{},p=cur('acqPipe');let open=sum(p,'open_deals'),openVal=sum(p,'open_pipeline_value'),wonM=sum(p,'won_mtd'),lostM=sum(p,'lost_mtd'),wonY=sum(p,'won_ytd'),lostY=sum(p,'lost_ytd');return {t,open,openVal,wonM,lostM,wonY,lostY}}function acqKpis(){let {t,open,openVal,wonM,lostM,wonY,lostY}=acqTeam();return `<div class="kpis">${kpi('Companies',int(t.total_companies),'Allowed acquisition owners','green')}${kpi('Contacted',int(t.contacted_companies),'Connected call OR completed meeting','cyan','activeAcq(cur(\'acqRankDetails\')).filter(r=>!r.needs_contact)')}${kpi('Needs Contact',int(t.needs_contact_companies),'No connected call and no completed meeting','red','activeAcq(cur(\'acqNeeds\'))')}${kpi('Rank A Coverage',pct(t.rank_a_coverage_pct),'Contacted / Rank A total','green','activeAcq(cur(\'acqRankDetails\')).filter(r=>[\'a\',\'rank a\'].includes(norm(r.rank)))')}${kpi('Rank B Coverage',pct(t.rank_b_coverage_pct),'Contacted / Rank B total','blue','activeAcq(cur(\'acqRankDetails\')).filter(r=>[\'b\',\'rank b\'].includes(norm(r.rank)))')}${kpi('Open Pipeline',money(openVal),`${int(open)} open deals`,'purple','cur(\'acqPipeDetails\').filter(r=>r.deal_status===\'open\')')}${kpi('Won MTD',int(wonM),`${int(wonY)} won YTD`,'green','cur(\'acqPipeDetails\').filter(r=>r.deal_status===\'won\')')}${kpi('Lost MTD',int(lostM),`${int(lostY)} lost YTD`,'red','cur(\'acqPipeDetails\').filter(r=>r.deal_status===\'lost\')')}</div>`}function renderAcq(){let d=activeAcq(cur('acqRankDetails')),n=activeAcq(cur('acqNeeds')),rank=activeAcq(cur('acqRank')),pipe=cur('acqPipe'),pd=cur('acqPipeDetails');let tabs=`<section class="card"><div class="head"><div><h3>Acquisition Sections</h3><p>Open one section at a time</p></div><div class="tabs">${[['overview','Overview'],['kpi','KPI Snapshot'],['rank','Rank A/B'],['needs','Needs Contact'],['pipeline','Pipeline'],['sources','Field Sources']].map(x=>`<button class="chip ${S.acqTab===x[0]?'active':''}" onclick="setAcqTab('${x[0]}')">${x[1]}</button>`).join('')}</div></div></section>`;let base=hero('Acquisition Team Overview','Contacted means the same company owner has at least one connected call or one completed meeting.');if(S.acqTab==='overview')return base+tabs+acqKpis()+`<div class="grid2">${table('Acquisition Reps',cur('acqSidebar'),['owner_name','calls_logged','connected_calls','meetings_logged','meetings_completed','last_activity_at'])}${table('Pipeline Snapshot',pipe,['owner_name','role','open_deals','open_pipeline_value','won_mtd','won_mtd_value','won_ytd','won_ytd_value','lost_mtd','lost_ytd'])}</div>${table('Rank A/B Coverage Summary',rank,['rank','country','owner_name','total_companies','touched_companies','untouched_companies','needs_contact','connected_calls','completed_meetings','coverage_pct'])}`;if(S.acqTab==='kpi')return base+tabs+acqKpis()+table('Acquisition KPI Snapshot',cur('acqKpi'));if(S.acqTab==='rank')return base+tabs+acqKpis()+`<div class="grid2">${table('Rank A/B Coverage by Country & Owner',rank,['rank','country','owner_name','total_companies','touched_companies','untouched_companies','needs_contact','connected_calls','completed_meetings','coverage_pct'])}${table('Rank Company Details',d,['company_name','country','rank','company_tier','owner_name','calls_logged','connected_calls','meetings_logged','completed_meetings','needs_contact','last_touch_at','hubspot_url'])}</div>`;if(S.acqTab==='needs')return base+tabs+acqKpis()+table('Leads Need Contact',n,['company_name','country','rank','company_tier','owner_name','calls_logged','connected_calls','meetings_logged','completed_meetings','needs_contact','last_touch_at','hubspot_url'],'No connected call and no completed meeting from the same company owner');if(S.acqTab==='pipeline')return base+tabs+`<div class="grid2">${table('Pipeline Snapshot',pipe,['owner_name','role','open_deals','open_pipeline_value','won_mtd','won_mtd_value','won_ytd','won_ytd_value','lost_mtd','lost_ytd'])}${table('Pipeline Details',pd,['dealname','owner_name','role','deal_status','amount','amount_in_home_currency','pipeline','dealstage','product','closedate','hubspot_url'])}</div>`;return base+tabs+table('Field Sources',cur('acqSources'),['metric','source_table','logic'])}function renderAcqRep(){let owner=S.rep,role=S.repRole;let details=activeAcq(cur('acqRankDetails')).filter(r=>norm(r.owner_name)===norm(owner)),needs=activeAcq(cur('acqNeeds')).filter(r=>norm(r.owner_name)===norm(owner)),pipe=cur('acqPipe').filter(r=>norm(r.owner_name)===norm(owner)),pd=cur('acqPipeDetails').filter(r=>norm(r.owner_name)===norm(owner)),act=cur('acqSidebar').find(r=>norm(r.owner_name)===norm(owner))||{};return hero(`Acquisition · ${owner}`,role==='deals_only'?'Deals-only owner: activity coverage is not counted here.':'Activity owner: coverage is person-scoped to company owner.')+`<div class="kpis">${kpi('Connected Calls',int(act.connected_calls),'Same owner only','cyan')}${kpi('Completed Meetings',int(act.meetings_completed),'Same owner only','green')}${kpi('Needs Contact',int(needs.length),'No connected/completed','red')}${kpi('Open Pipeline',money(sum(pipe,'open_pipeline_value')),`${int(sum(pipe,'open_deals'))} open deals`,'purple')}</div><div class="grid2">${table('Rep Rank Company Details',details,['company_name','country','rank','company_tier','calls_logged','connected_calls','meetings_logged','completed_meetings','needs_contact','last_touch_at','hubspot_url'])}${table('Rep Needs Contact',needs,['company_name','country','rank','company_tier','calls_logged','connected_calls','meetings_logged','completed_meetings','needs_contact','last_touch_at','hubspot_url'])}</div>${table('Rep Pipeline Deals',pd,['dealname','deal_status','amount','amount_in_home_currency','pipeline','dealstage','product','closedate','hubspot_url'])}`}function retSummary(){let rows=retRows();return {renewal:sum(rows,'renewal_value'),booked:sum(rows,'booked_value'),cash:sum(rows,'collected_value'),bnc:sum(rows,'booked_not_cash_value'),rem:sum(rows,'remaining_collection_value'),delayed:rows.filter(r=>String(r.is_delayed)==='true'||r.is_delayed===true).length}}function renderRetention(){let s=retSummary();if(S.retTab==='financial')return hero('Retention Financial Details','Budget, booking, cash collection and action tables.')+`<div class="kpis">${kpi('Renewal Value',money(s.renewal),'Budget','green')}${kpi('Booked',money(s.booked),'Booked value','blue')}${kpi('Cash',money(s.cash),'Collected','cyan')}${kpi('Booked Not Cash',money(s.bnc),'Collection gap','amber')}${kpi('Remaining',money(s.rem),'Remaining collection','purple')}${kpi('Delayed',int(s.delayed),'Accounts','red')}</div><div class="grid2">${table('Retention Rows',rowsForRet(),['company_name','product','month','renewal_value','booked_value','collected_value','booked_not_cash_value','remaining_collection_value','rm_owner','csm_owner','hubspot_search_url'])}${table('Not In Budget',cur('retNotBudget'))}</div>`;return hero('Retention Team Overview','Retention snapshot, KPI periods and coverage quality.')+`<div class="kpis">${kpi('Renewal Value',money(s.renewal),'Budget','green')}${kpi('Cash',money(s.cash),'Collected','cyan')}${kpi('Delayed',int(s.delayed),'Accounts','red')}</div>${table('Retention KPI Snapshot',cur('retKpi'))}<div class="grid2">${table('Retention Coverage Quality',cur('retCoverage'))}${table('Retention Sidebar Summary',cur('retSidebar'))}</div>`}function rowsForRet(){return retRows()}function renderRetRep(){let rows=retRows().filter(r=>S.repRole==='RM'?norm(r.rm_owner)===norm(S.rep):norm(r.csm_owner)===norm(S.rep));return hero(`Retention ${S.repRole} · ${S.rep}`,'Rep-level renewal actions.')+table('Rep Renewal Rows',rows,['company_name','product','month','renewal_value','booked_value','collected_value','booked_not_cash_value','remaining_collection_value','status','renewal_status','hubspot_search_url'])}function renderPnl(){let rows=activePnl(cur('pnl')),monthly=activePnl(cur('pnlMonthly')),breakdown=activePnl(cur('pnlBreakdown')),comp=S.year==='all'?cur('pnlCompare'):cur('pnlCompare').filter(r=>String(r.year)===S.year);let t={booking:sum(rows,'booking'),cashing:sum(rows,'cashing'),cogs:sum(rows,'cogs'),overheads:sum(rows,'overheads'),support:sum(rows,'support_allocation'),cost:sum(rows,'total_cost'),net:sum(rows,'net_cash_position')};return hero('P&L Advanced','Dynamic P&L from Supabase views.')+`<div class="kpis">${kpi('Booking',money(t.booking),'Booked revenue','green')}${kpi('Cashing',money(t.cashing),'Cash collected','cyan')}${kpi('COGS',money(t.cogs),'Cost of goods','red')}${kpi('Overheads',money(t.overheads),'Overhead cost','amber')}${kpi('Support Allocate',money(t.support),'Support allocation','purple')}${kpi('Total Cost',money(t.cost),'COGS + Overheads + Support','red')}${kpi('Net Cash',money(t.net),'Cashing + signed cost','blue')}</div><div class="grid2">${table('Product Summary',rows)}${table('Year Comparison',comp)}</div><div class="grid2">${table('Monthly Advanced',monthly)}${table('Cost Breakdown',breakdown)}</div>`}function activePnl(rows){return (rows||[]).filter(r=>(S.year==='all'||!r.year||String(r.year)===S.year)&&(S.month==='all'||!r.month||norm(String(r.month).slice(0,3))===norm(S.month))&&(S.product==='all'||!r.product||norm(r.product)===norm(S.product)))}function renderUpsell(){let s=cur('upsellSummary')[0]||{};return hero('Upselling / Features Plan','Company-level feature plan and status.')+`<div class="kpis">${kpi('Clients',int(s.clients),'Unique companies','green')}${kpi('Feature Rows',int(s.feature_rows),'Features','blue')}${kpi('Proposal Sent',int(s.proposal_sent),'Proposal sent','purple')}${kpi('Interested',int(s.interested),'Interested','cyan')}${kpi('Not Interested',int(s.not_interested),'Rejected','red')}${kpi('Upsell Value',money(s.upsell_value_total),'Potential','amber')}</div><div class="grid2">${table('Upsell Summary',cur('upsellSummary'))}${table('Upsell Companies',cur('upsellCompanies'))}</div>`}function openDrawer(t,rows,sub){rows=rows||[];$('dt').textContent=t;$('ds').textContent=sub||`${rows.length.toLocaleString()} rows`;$('db').innerHTML=table(t,rows).replace('<section class="card">','<section>').replace('</section>','</section>');$('drawer').classList.add('open')}function closeDrawer(){$('drawer').classList.remove('open')}loadAll();</script></body></html>
