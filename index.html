<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Talentera · Sales Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/layout.css?v=20260601-pipeline-only-v1" />

  <style>
    body{margin:0;font-family:var(--font);background:linear-gradient(180deg,#f7fbf8,#eaf5ef);color:var(--text)}
    .app{display:flex;min-height:100vh}.sidebar{width:240px;position:fixed;left:0;top:0;bottom:0;background:rgba(255,255,255,.72);border-right:1px solid rgba(22,64,42,.10);padding:14px 10px;display:flex;flex-direction:column;z-index:20;backdrop-filter:blur(22px);box-shadow:8px 0 28px rgba(17,47,31,.05)}
    .sidebar-logo{padding:8px 10px 16px;border-bottom:1px solid rgba(22,64,42,.10);margin-bottom:10px}.logo-img{height:28px;width:auto;display:block;margin-bottom:6px}.logo-sub{font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.12em}.sidebar-section{font-size:9px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.14em;margin:18px 8px 8px}
    .nav-item,.acq-side-rep{width:100%;display:flex;align-items:center;gap:9px;border:1px solid transparent;background:transparent;color:var(--text2);padding:10px 11px;border-radius:14px;font:800 12px var(--font);cursor:pointer;text-align:left;margin-bottom:4px}.nav-item:hover,.acq-side-rep:hover{background:rgba(255,255,255,.70);border-color:var(--border)}.nav-item.active,.acq-side-rep.active{background:#fff;color:var(--primary-dk);border-color:var(--green-bd);box-shadow:var(--sh-xs)}.nav-icon{width:18px;text-align:center}.acq-side-dot{width:7px;height:7px;border-radius:999px;flex:0 0 7px}.acq-side-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}.acq-side-alert{margin-left:auto;min-width:15px;height:15px;border-radius:999px;background:var(--red-bg);color:var(--red);font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 4px}
    .sidebar-bottom{margin-top:auto}.user-row{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,.70);border:1px solid var(--border);border-radius:16px;padding:10px}.user-av{width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,var(--green),var(--cyan));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900}.user-name{font-size:12px;font-weight:900}.user-role{font-size:9px;color:var(--muted);font-weight:700}
    .main-area{margin-left:240px;width:calc(100% - 240px);min-height:100vh;padding:14px 18px 60px}.topbar{min-height:66px;background:rgba(255,255,255,.78);border:1px solid var(--border);border-radius:24px;display:flex;align-items:center;gap:14px;padding:14px 20px;box-shadow:var(--sh-xs);backdrop-filter:blur(18px);position:sticky;top:12px;z-index:10}.topbar-title{font-size:18px;font-weight:900}.topbar-sub{font-size:11px;color:var(--muted);font-weight:700;margin-top:3px}.topbar-right{margin-left:auto;display:flex;align-items:center;gap:9px}.live-badge{display:flex;align-items:center;gap:6px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);font-size:10px;font-weight:900;border-radius:999px;padding:6px 12px}.live-dot{width:7px;height:7px;border-radius:99px;background:var(--green)}.refresh-btn{border:0;background:var(--green);color:#fff;border-radius:999px;padding:8px 14px;font:900 11px var(--font);cursor:pointer}
    .tabs-bar{display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.66);border:1px solid var(--border);border-radius:22px;padding:10px;margin:12px 0 16px;overflow-x:auto}.tab-btn{border:1px solid transparent;background:transparent;color:var(--text2);font:800 11px var(--font);padding:9px 13px;border-radius:999px;cursor:pointer;white-space:nowrap}.tab-btn:hover{background:rgba(255,255,255,.70)}.tab-btn.active{background:var(--green);color:#fff;border-color:var(--green-bd)}.content{padding-bottom:60px}.record-link{font-weight:900;color:var(--blue);text-decoration:none}.record-link:hover{text-decoration:underline}
    .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(5,20,12,.48);z-index:100;align-items:center;justify-content:center;padding:20px}.modal-card{width:min(1180px,96vw);max-height:88vh;background:var(--surface);border:1px solid var(--border);border-radius:24px;box-shadow:var(--sh-md);display:flex;flex-direction:column;overflow:hidden}.modal-hd{padding:16px 18px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center}.modal-title{font-size:16px;font-weight:900}.modal-sub{font-size:11px;color:var(--muted);font-weight:800;margin-top:3px}.modal-actions{margin-left:auto;display:flex;gap:8px}.modal-search{height:34px;border:1px solid var(--border);border-radius:999px;padding:0 12px;background:#fff;font:800 11px var(--font)}.modal-btn{height:34px;border:1px solid var(--border);border-radius:999px;background:#fff;padding:0 12px;font:900 11px var(--font);cursor:pointer}.modal-close{width:34px;height:34px;border-radius:999px;border:1px solid var(--border);background:#fff;font-size:18px;cursor:pointer}.modal-body{overflow:auto}.modal-empty{padding:40px;text-align:center;color:var(--muted);font-weight:800}
    @media(max-width:900px){.sidebar{position:static;width:100%;height:auto}.main-area{margin-left:0;width:100%;padding:10px}.app{display:block}.topbar{position:static}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-logo"><img class="logo-img" src="https://www.talentera.com/wp-content/themes/talentera-2018/images/new-design/Talentera-ATS-black-logo.svg" alt="Talentera" onerror="this.style.display='none'"><div class="logo-sub">Sales Command Center</div></div>
      <div class="sidebar-section">Main</div>
      <button class="nav-item active" data-route="acquisition"><span class="nav-icon">📊</span> Acquisition Pipeline</button>
      <button class="nav-item" data-route="retention-team"><span class="nav-icon">🛡️</span> Retention Team</button>
      <button class="nav-item" data-route="retention-financial"><span class="nav-icon">💰</span> Retention Financial</button>
      <button class="nav-item" data-route="features-plan"><span class="nav-icon">🚀</span> Features Plan</button>
      <button class="nav-item" data-route="pnl"><span class="nav-icon">📈</span> P&amp;L</button>
      <div class="sidebar-section">Pipeline Owners</div>
      <button class="acq-side-rep" data-acq-rep="Marita Chedid"><span class="acq-side-dot" style="background:var(--green)"></span><span class="acq-side-name">Marita Chedid</span><span class="acq-side-alert">!</span></button>
      <button class="acq-side-rep" data-acq-rep="Zein Fares"><span class="acq-side-dot" style="background:var(--blue)"></span><span class="acq-side-name">Zein Fares</span><span class="acq-side-alert">!</span></button>
      <button class="acq-side-rep" data-acq-rep="Ursula Waked"><span class="acq-side-dot" style="background:var(--purple)"></span><span class="acq-side-name">Ursula Waked</span><span class="acq-side-alert">!</span></button>
      <button class="acq-side-rep" data-acq-rep="Ahmad Khawajah"><span class="acq-side-dot" style="background:var(--amber)"></span><span class="acq-side-name">Ahmad Khawajah</span><span class="acq-side-alert">!</span></button>
      <button class="acq-side-rep" data-acq-rep="Mohammed Faizan"><span class="acq-side-dot" style="background:var(--cyan)"></span><span class="acq-side-name">Mohammed Faizan</span><span class="acq-side-alert">!</span></button>
      <button class="acq-side-rep" data-acq-rep="Mohammad Jehad Al-Barqawi"><span class="acq-side-dot" style="background:var(--red)"></span><span class="acq-side-name">Mohammad Jehad Al-Barqawi</span><span class="acq-side-alert">!</span></button>
      <button class="acq-side-rep" data-acq-rep="Fadi Zanona"><span class="acq-side-dot" style="background:var(--slate)"></span><span class="acq-side-name">Fadi Zanona</span><span class="acq-side-alert">!</span></button>
      <div class="sidebar-bottom"><div class="user-row"><div class="user-av">SM</div><div><div class="user-name">Sales Manager</div><div class="user-role">Admin · Riyadh</div></div></div></div>
    </aside>
    <main class="main-area">
      <div class="topbar"><div><div class="topbar-title" id="topbarTitle">Acquisition · Pipeline</div><div class="topbar-sub" id="topbarSub">Pipeline-only dashboard · Supabase live data</div></div><div class="topbar-right"><div class="live-badge"><span class="live-dot"></span>LIVE · SUPABASE</div><button class="refresh-btn" id="refreshBtn">↻ Refresh</button></div></div>
      <div class="tabs-bar" id="tabsBar"><button class="tab-btn active" data-route="acquisition">⚡ Acquisition Pipeline</button><button class="tab-btn" data-route="retention-team">🛡️ Retention Team</button><button class="tab-btn" data-route="retention-financial">💰 Retention Financial</button><button class="tab-btn" data-route="features-plan">🚀 Features Plan</button><button class="tab-btn" data-route="pnl">📈 P&amp;L</button></div>
      <div class="content" id="appContent"></div>
    </main>
  </div>
  <div class="modal-backdrop" id="detailModal"><div class="modal-card"><div class="modal-hd"><div><div class="modal-title" id="modalTitle">Details</div><div class="modal-sub" id="modalSub">0 rows</div></div><div class="modal-actions"><input class="modal-search" id="modalSearch" placeholder="Search rows…"><button class="modal-btn" id="modalExportBtn">Export CSV</button><button class="modal-close" id="modalCloseBtn">×</button></div></div><div class="modal-body" id="modalBody"></div></div></div>
  <script src="assets/js/config.js?v=20260601-pipeline-only-v1"></script>
  <script src="assets/js/utils.js?v=20260601-pipeline-only-v1"></script>
  <script src="assets/js/supabase-client.js?v=20260601-pipeline-only-v1"></script>
  <script src="assets/js/components.js?v=20260601-pipeline-only-v1"></script>
  <script src="assets/js/modal.js?v=20260601-pipeline-only-v1"></script>
  <script src="assets/js/state.js?v=20260601-pipeline-only-v1"></script>
  <script src="assets/js/modules/acquisition.js?v=20260601-pipeline-only-v1"></script>
  <script src="assets/js/acquisition-pipeline-only.js?v=20260601-pipeline-only-v1"></script>
  <script src="assets/js/modules/retention-team.js?v=20260601-pipeline-only-v1"></script>
  <script src="assets/js/modules/retention-financial.js?v=20260601-pipeline-only-v1"></script>
  <script src="assets/js/modules/features-plan.js?v=20260601-pipeline-only-v1"></script>
  <script src="assets/js/modules/pnl.js?v=20260601-pipeline-only-v1"></script>
  <script src="assets/js/router.js?v=20260601-pipeline-only-v1"></script>
</body>
