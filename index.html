function el(x){return document.getElementById(x)}function n(v){let x=Number(String(v??'').replace(/[^0-9.-]/g,''));return isFinite(x)?x:0}function i(v){return Math.round(n(v)).toLocaleString()}function money(v){let x=n(v),s=x<0?'-':'',a=Math.abs(x);return s+'$'+(a>=1e6?(a/1e6).toFixed(1)+'M':Math.round(a).toLocaleString())}function pct(v){return (n(v)||0).toFixed(0)+'%'}function norm(v){return String(v??'').trim().toLowerCase()}function allowed(list,name){return list.some(x=>norm(x)===norm(name))}function sum(a,k){return (a||[]).reduce((x,r)=>x+n(r[k]),0)}function rows(k){return S.d[k]||[]}function esc(v){return String(v??'').replace(/[&<>"]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[x]))}function uniq(a){return [...new Set((a||[]).filter(Boolean).map(String))].sort((a,b)=>a.localeCompare(b))}

function rankAggByCountry(summary,detail){let map={};if(summary&&summary.length){summary.forEach(r=>{let c=cleanCountry(r.country), g=rankGroup(r);map[c]=map[c]||{country:c,a:0,at:0,an:0,b:0,bt:0,bn:0,calls:0,meetings:0};let o=map[c];if(g==='a'){o.a+=n(r.companies);o.at+=n(r.touched_companies);o.an+=n(r.no_touch_companies)}else if(g==='b'){o.b+=n(r.companies);o.bt+=n(r.touched_companies);o.bn+=n(r.no_touch_companies)}o.calls+=n(r.connected_calls);o.meetings+=n(r.completed_meetings)})}else{(detail||[]).forEach(r=>{let c=cleanCountry(r.country);map[c]=map[c]||{country:c,a:0,at:0,an:0,b:0,bt:0,bn:0,calls:0,meetings:0};let o=map[c], touched=ownerTouched(r);if(isRankA(r)){o.a++; touched?o.at++:o.an++}else if(isRankB(r)){o.b++; touched?o.bt++:o.bn++}o.calls+=ownerConn(r);o.meetings+=ownerMeet(r)})}return Object.values(map).sort((x,y)=>(y.an+y.bn)-(x.an+x.bn)||x.country.localeCompare(y.country))}

function monthlyRows(){let m={};rows('ret').filter(ok).forEach(r=>{let mo=String(r.month||'Unknown').slice(0,3)||'Unknown';m[mo]=m[mo]||{month:mo,due:0,renewed:0,booked:0,cashed:0,delayed:0,value:0};let o=m[mo];o.due++;o.value+=n(r.renewal_value);if(n(r.booked_value)>0)o.booked++;if(n(r.collected_value)>0)o.cashed++;if(/delayed/i.test(String(r.renewal_status||r.status||'')))o.delayed++;if(n(r.booked_value)>0||n(r.collected_value)>0)o.renewed++});return Object.values(m)}
function retFinancial(){let x=retMetrics(),not=rows('notBudget');return hero('Retention Financial Details','Budget, booking, collection, not-in-budget and renewal status split.',[])+`<div class="kpis">${kpi('Budget Renewal',money(x.renewal),`${i(x.r.length)} rows`,'b',x.r)}${kpi('Booked Total',money(x.bookVal),`${i(x.book.length)} booked`,'p',x.book)}${kpi('Cash Collected',money(x.cashVal),`${i(x.cash.length)} cashed`,'g',x.cash)}${kpi('Remaining',money(x.remain),'open collection','b',x.r.filter(r=>n(r.remaining_collection_value)>0))}${kpi('Delayed',i(x.del.length),'needs action','r',x.del)}${kpi('Not in Budget',i(not.length),'outside budget','a',not)}</div>${tbl('Owner Financial Summary',rows('retSide').filter(r=>allowed(RET,r.owner_name)))}${tbl('Booked Value Total',x.book)}${tbl('Cash Collected',x.cash)}${tbl('Delayed',x.del)}${tbl('Not In Budget',not)}`}
function retOwner(name){let r=rows('ret').filter(x=>ok(x)&&(norm(x.rm_owner)===norm(name)||norm(x.csm_owner)===norm(name)||norm(x.owner_name)===norm(name)));return hero(name,'Retention owner view: renewal rows and financial exposure.',[])+`<div class="kpis">${kpi('Accounts',i(r.length),'','b',r)}${kpi('Renewal Value',money(sum(r,'renewal_value')),'','g',r)}${kpi('Booked',money(sum(r,'booked_value')),'','p',r.filter(x=>n(x.booked_value)>0))}${kpi('Cash',money(sum(r,'collected_value')),'','g',r.filter(x=>n(x.collected_value)>0))}${kpi('Delayed',i(r.filter(x=>/delayed/i.test(String(x.renewal_status||x.status||''))).length),'','r',r.filter(x=>/delayed/i.test(String(x.renewal_status||x.status||''))))}</div>${tbl('Owner Renewal Rows',r)}`}
function features(){return hero('Features Plan for Upselling','Company-level feature plan and status.',[])+`<div class="grid2">${tbl('Features Plan Summary',rows('upS'))}${tbl('Company Summary',rows('upC'))}</div>`}
function pnl(){let r=rows('pnl'),mm=rows('pnlM'),b=rows('pnlB');return hero('Executive P&L Dashboard','Booking, cashing, cost breakdown and margin views.',[])+`<div class="kpis">${kpi('Booking',money(sum(r,'booking')),'','g',mm)}${kpi('Cashing',money(sum(r,'cashing')),'','b',mm)}${kpi('COGS',money(sum(r,'cogs')),'','r',b)}${kpi('Overheads',money(sum(r,'overheads')),'','a',b)}${kpi('Support Allocation',money(sum(r,'support_allocation')),'','p',b)}${kpi('Total Cost',money(sum(r,'total_cost')),'','r',b)}</div><div class="grid2">${tbl('P&L Product Summary',r)}${tbl('Year Comparison',rows('pnlC'))}</div>${tbl('Monthly P&L',mm)}`}
function pnlDetails(){return hero('P&L Cost Breakdown','COGS, overheads and support allocation by month/product.',[])+tbl('Cost Breakdown',rows('pnlB'))+tbl('Monthly Advanced',rows('pnlM'))}
loadAll();setInterval(loadAll,300000);
</script></body></html>
