<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Talentera · Sales Command Center</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<style>

:root{--primary:#16A34A;--primary-dk:#15803D;--sb-bg:#0F1A14;--sb-text:#8BAD8A;--sb-accent:#3DD68C;--sb-border:rgba(61,214,140,0.1);--sb-w:230px;--page-bg:#F0F4F2;--surface:#FFFFFF;--surface2:#F7FAF8;--border:#E4EBE7;--text:#0D1F16;--text2:#3A5044;--muted:#6B877A;--green:#16A34A;--green-bg:rgba(22,163,74,0.08);--green-bd:rgba(22,163,74,0.2);--red:#DC2626;--red-bg:rgba(220,38,38,0.08);--red-bd:rgba(220,38,38,0.2);--amber:#D97706;--amber-bg:rgba(217,119,6,0.08);--amber-bd:rgba(217,119,6,0.2);--blue:#2563EB;--blue-bg:rgba(37,99,235,0.08);--blue-bd:rgba(37,99,235,0.2);--purple:#7C3AED;--purple-bg:rgba(124,58,237,0.08);--purple-bd:rgba(124,58,237,0.2);--cyan:#0891B2;--cyan-bg:rgba(8,145,178,0.08);--font:"Plus Jakarta Sans",system-ui,sans-serif;--mono:"DM Mono",monospace;--r-sm:8px;--r:12px;--r-lg:18px;--sh-xs:0 1px 3px rgba(0,0,0,0.06);--sh:0 2px 8px rgba(0,0,0,0.07),0 1px 3px rgba(0,0,0,0.05);--sh-md:0 6px 24px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--page-bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sb-w);background:var(--sb-bg);position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.sidebar-logo{padding:16px 18px;display:flex;flex-direction:column;align-items:flex-start;gap:6px;border-bottom:1px solid var(--sb-border)}
.logo-img{height:28px;width:auto;filter:brightness(0) invert(1);object-fit:contain}
.logo-sub{font-size:9px;color:var(--sb-text);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.sidebar-section{padding:18px 18px 5px;font-size:9px;font-weight:700;color:rgba(139,173,138,.5);text-transform:uppercase;letter-spacing:.14em}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;margin:1px 6px;border-radius:var(--r-sm);cursor:pointer;transition:all .15s;color:var(--sb-text);font-size:12px;font-weight:500;border:none;background:none;width:calc(100% - 12px);text-align:left;font-family:var(--font)}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(61,214,140,.12);color:var(--sb-accent);font-weight:600}
.nav-icon{width:16px;text-align:center;font-size:14px;flex-shrink:0}
.nav-badge{margin-left:auto;background:rgba(220,38,38,.25);color:#FCA5A5;font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px}
.ret{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(8,145,178,.15);color:#22D3EE;border:1px solid rgba(8,145,178,.25)}
.view-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid rgba(100,116,139,.25)}
.sidebar-bottom{margin-top:auto;border-top:1px solid var(--sb-border);padding:12px 6px}
.user-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;transition:background .15s}
.user-row:hover{background:rgba(255,255,255,.06)}
.user-av{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--sb-accent),#0D9488);display:flex;align-items:center;justify-content:center;color:var(--sb-bg);font-size:11px;font-weight:800;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:#fff}.user-role{font-size:9px;color:var(--sb-text);margin-top:1px}
.main-area{margin-left:var(--sb-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:var(--sh-xs)}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:2px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:6px;background:var(--green-bg);color:var(--green);font-size:10px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--green-bd);letter-spacing:.04em}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.icon-btn{width:34px;height:34px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;color:var(--text2)}
.icon-btn:hover{background:var(--page-bg)}
.refresh-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s}
.refresh-btn:hover{background:var(--primary-dk);transform:translateY(-1px);box-shadow:0 4px 12px rgba(22,163,74,.3)}
.spin{animation:spinning .8s linear infinite;display:inline-block}
@keyframes spinning{to{transform:rotate(360deg)}}
.tabs-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;overflow-x:auto;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:0 14px;height:44px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab-btn:hover{color:var(--text2);background:var(--surface2)}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:700}
.tab-chip{background:var(--red-bg);color:var(--red);font-size:8px;font-weight:800;padding:1px 5px;border-radius:4px}
.content{padding:20px 24px 80px}
.panel{display:none;animation:fadeUp .3s cubic-bezier(.16,1,.3,1)}
.panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.period-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.period-label::before{content:"";width:3px;height:14px;background:var(--green);border-radius:2px;display:block}
.period-label::after{content:"";flex:1;height:1px;background:var(--border)}
.summary-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 12px;position:relative;overflow:hidden;box-shadow:var(--sh-xs);transition:all .2s;animation:fadeUp .3s both}
.sum-card:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.sum-card-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.sum-val{font-family:var(--mono);font-size:22px;font-weight:600;line-height:1;margin-top:4px}
.sum-lbl{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:8px}
.sum-sub{font-size:9px;color:var(--muted);margin-top:3px;font-weight:500}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px;box-shadow:var(--sh);transition:box-shadow .2s}
.card:hover{box-shadow:var(--sh-md)}
.card-hd{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2)}
.card-title{font-size:11px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:8px}
.card-title-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:9px 14px;text-align:left;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;border-bottom:1px solid var(--border);background:var(--surface2)}
.tbl th.c,.tbl td.c{text-align:center}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2)}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px}
.bg{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.br{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.bb{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.bp{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.ba{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.av-lg{width:50px;height:50px;border-radius:13px;font-size:20px;font-weight:800}
.rate-bar{width:44px;height:3px;background:var(--page-bg);border-radius:2px;overflow:hidden;margin:4px auto 0}
.rate-fill{height:100%;border-radius:2px}
.rank-a{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block}
.rank-b{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block}
.sec-hd{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.sec-title{white-space:nowrap}
.sec-hd::after{content:"";flex:1;height:1px;background:var(--border)}
.pipe-stages{display:flex;gap:6px;height:110px}
.pipe-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 6px;gap:3px;border-radius:var(--r-sm)}
.ps-name{font-size:9px;font-weight:700;color:rgba(255,255,255,.85);text-align:center;line-height:1.2}
.ps-count{font-family:var(--mono);font-size:22px;font-weight:600;color:#fff}
.ps-amt{font-size:9px;color:rgba(255,255,255,.7);font-family:var(--mono)}
.pipe-cards-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:10px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-xs);transition:all .2s}
.pcard:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.pcard-top{padding:11px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--surface2)}
.pcard-body{padding:8px 12px}
.pdeal{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.pdeal:last-of-type{border-bottom:none}
.pdeal-name{font-size:10px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.pdeal-stage{font-size:8px;color:var(--muted);margin-top:1px}
.pdeal-amt{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text2)}
.coaching-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px}
.ccard{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;border-top:3px solid var(--cc,var(--green));transition:all .2s}
.ccard:hover{box-shadow:var(--sh)}
.ccard-rep{font-size:11px;font-weight:700;color:var(--cc,var(--green));display:flex;align-items:center;gap:6px;margin-bottom:9px}
.citem{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;margin-bottom:6px}
.citem:last-child{margin-bottom:0}
.citem-name{font-size:10px;font-weight:600;color:var(--text);display:flex;justify-content:space-between;margin-bottom:4px}
.citem-amt{font-family:var(--mono);font-size:9px;color:var(--muted)}
.citem-warn{font-size:9px;color:var(--amber);font-weight:600}
.leads-period-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.lperiod{background:var(--surface2);padding:16px 18px}
.lperiod-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.lperiod-val{font-family:var(--mono);font-size:26px;font-weight:500}
.lperiod-row{display:flex;gap:12px;margin-top:7px}
.lperiod-in{font-size:10px;font-weight:600}
.lperiod-out{font-size:10px;font-weight:600}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.deal-item{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 18px;gap:12px;border-bottom:1px solid var(--border);transition:background .15s}
.deal-item:last-child{border-bottom:none}
.deal-item:hover{background:var(--surface2)}
.deal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.deal-name{font-size:12px;font-weight:700;color:var(--text)}
.deal-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.deal-amt{font-family:var(--mono);font-size:16px;font-weight:700}
.news-item{display:flex;align-items:flex-start;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);transition:background .15s}
.news-item:last-child{border-bottom:none}
.news-item:hover{background:var(--surface2)}
.news-icon{font-size:18px;flex-shrink:0}
.news-text{font-size:11px;color:var(--text2);line-height:1.65;flex:1}
.news-meta{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.see-more{width:100%;padding:8px;text-align:center;font-size:10px;font-weight:600;color:var(--green);border:none;border-top:1px solid var(--border);background:none;cursor:pointer;font-family:var(--font);display:block;transition:background .15s}
.see-more:hover{background:var(--surface2)}
.stat-chips{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.schip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center;box-shadow:var(--sh-xs);transition:all .2s;position:relative;overflow:hidden}
.schip:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.schip-accent{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--sc2,var(--green))}
.schip-v{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--sc2,var(--green))}
.schip-l{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:6px}
.rep-hero{display:flex;align-items:center;gap:18px;padding:20px 24px;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);position:relative;overflow:hidden;box-shadow:var(--sh)}
.rep-hero-line{position:absolute;top:0;left:0;right:0;height:4px;background:var(--hc,var(--green))}
.rep-hero::after{content:"";position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;background:var(--hc,var(--green));opacity:.05}
.rep-hero-stats{display:flex;gap:24px;margin-left:auto}
.hstat-v{font-family:var(--mono);font-size:24px;font-weight:500}
.hstat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px;font-weight:700}
.loss-reasons-section{border-top:1px solid var(--border);margin-top:4px;padding:16px 18px;background:linear-gradient(180deg,rgba(220,38,38,0.02) 0%,transparent 100%)}
.loss-reasons-title{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.loss-reasons-title::before{content:"";width:3px;height:12px;background:var(--red);border-radius:2px;display:block}
.loss-reasons-title::after{content:"";flex:1;height:1px;background:var(--border)}
.loss-reason-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.loss-reason-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;border-left:3px solid var(--red);transition:all .2s}
.loss-reason-card:hover{transform:translateY(-1px);box-shadow:var(--sh)}
.loss-reason-name{font-size:11px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.3}
.loss-reason-stats{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.loss-reason-count{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--red)}
.loss-reason-amt{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text2)}
.loss-reason-bar{height:3px;background:var(--page-bg);border-radius:2px;margin-top:8px;overflow:hidden}
.loss-reason-bar-fill{height:100%;background:linear-gradient(90deg,var(--red),#f87171);border-radius:2px}
.deal-reason-badge{font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:18px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spinning .9s linear infinite}
.load-txt{font-size:13px;font-weight:600;color:var(--muted)}
/* ── Outreach Coverage ── */
.outreach-kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.outreach-kpi-box{background:var(--surface2);padding:14px 12px;text-align:center}
.outreach-kpi-val{font-family:var(--mono);font-size:22px;font-weight:600;line-height:1}
.outreach-kpi-lbl{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:7px}
.outreach-bar-wrap{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2)}
.outreach-bar-row{margin-bottom:12px}
.outreach-bar-row:last-child{margin-bottom:0}
.outreach-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.outreach-bar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.outreach-bar-rate{font-family:var(--mono);font-size:12px;font-weight:700}
.outreach-bar-track{height:7px;background:var(--page-bg);border-radius:4px;overflow:hidden}
.outreach-bar-fill{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.16,1,.3,1)}
.outreach-rep-section{padding:14px 18px;border-bottom:1px solid var(--border)}
@media(max-width:1200px){.summary-grid{grid-template-columns:repeat(4,1fr)}.pipe-cards-grid{grid-template-columns:repeat(3,1fr)}.coaching-grid{grid-template-columns:1fr 1fr}.loss-reason-grid{grid-template-columns:1fr}.outreach-kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.pipe-cards-grid{grid-template-columns:repeat(2,1fr)}.outreach-kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){:root{--sb-w:0px}.sidebar{display:none}.main-area{margin-left:0}.summary-grid{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.content{padding:14px 14px 60px}.coaching-grid{grid-template-columns:1fr}.rep-hero-stats{display:none}.leads-period-grid{grid-template-columns:1fr}.outreach-kpi-grid{grid-template-columns:repeat(2,1fr)}}

/* ═══════════════════════════════════════════
   COMMAND CENTER PREVIEW — CLEAN ADDON
   ═══════════════════════════════════════════ */
.command-preview{margin-bottom:20px;animation:fadeUp .35s cubic-bezier(.16,1,.3,1)}
.focus-strip{background:linear-gradient(135deg,var(--sb-bg) 0%,#12291c 100%);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px;box-shadow:0 4px 24px rgba(0,0,0,.18);border:1px solid rgba(61,214,140,.12)}

/* ═══════════════════════════════════════════
   LEGACY DESIGN TRANSPLANT FOR SUPABASE V2
   Source visual system: index (75).html
   Purpose: keep Supabase logic, make shell visually match legacy dashboard.
   ═══════════════════════════════════════════ */

/* Class aliases: current v4 shell -> legacy shell */
.side{width:var(--sb-w);background:var(--sb-bg);position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.brand{padding:16px 18px;display:flex;flex-direction:column;align-items:flex-start;gap:6px;border-bottom:1px solid var(--sb-border)}
.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--sb-accent),#0D9488);display:flex;align-items:center;justify-content:center;color:var(--sb-bg);font-size:15px;font-weight:800;box-shadow:none;border:0}
.brand b{font-size:14px;font-weight:800;color:#fff}
.brand small{font-size:9px;color:var(--sb-text);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.sec{padding:18px 18px 5px;font-size:9px;font-weight:700;color:rgba(139,173,138,.5);text-transform:uppercase;letter-spacing:.14em}
.nav{display:flex;align-items:center;gap:9px;padding:8px 10px;margin:1px 6px;border-radius:var(--r-sm);cursor:pointer;transition:all .15s;color:var(--sb-text);font-size:12px;font-weight:500;border:none;background:none;width:calc(100% - 12px);text-align:left;font-family:var(--font)}
.nav:hover{background:rgba(255,255,255,.06);color:#fff}
.nav.on{background:rgba(61,214,140,.12);color:var(--sb-accent);font-weight:600}
.nav span:first-child{width:16px;text-align:center;font-size:14px;flex-shrink:0}
.nav small{display:block;font-size:9px;color:var(--sb-text);margin-top:1px;font-weight:500;max-width:146px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main{margin-left:var(--sb-w);flex:1;display:flex;flex-direction:column;min-height:100vh;width:calc(100% - var(--sb-w))}
.top{height:60px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:var(--sh-xs)}
.tt{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.ts{font-size:11px;color:var(--muted);margin-top:2px}
.right{margin-left:auto;display:flex;align-items:center;gap:10px}
.live{display:flex;align-items:center;gap:6px;background:var(--green-bg);color:var(--green);font-size:10px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--green-bd);letter-spacing:.04em;text-transform:uppercase}
.live:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite}
.btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s;box-shadow:none}
.btn:hover{background:var(--primary-dk);transform:translateY(-1px);box-shadow:0 4px 12px rgba(22,163,74,.3)}
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;overflow-x:auto;scrollbar-width:none;height:auto;position:sticky;top:60px;z-index:90}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:0 14px;height:44px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.tab:hover{color:var(--text2);background:var(--surface2)}
.tab.on{color:var(--green);border-bottom-color:var(--green);font-weight:700;background:none}
.filters{padding:14px 24px 0;display:flex;gap:8px;flex-wrap:wrap}
.f{height:34px;border:1px solid var(--border);background:var(--surface);border-radius:var(--r-sm);padding:0 10px;color:var(--text2);font-size:11px;font-weight:700;outline:none}
.content{padding:20px 24px 80px}
.hero{display:flex;align-items:center;gap:18px;padding:20px 24px;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);position:relative;overflow:hidden;box-shadow:var(--sh)}
.hero:before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--green)}
.hero:after{content:"";position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;background:var(--green);opacity:.05}
.hero h1{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.03em}
.hero p{font-size:12px;color:var(--muted);line-height:1.6;margin-top:5px;max-width:760px;font-weight:500}
.hp{display:flex;gap:24px;margin-left:auto;position:relative;z-index:1}
.pillbox{text-align:center;min-width:70px;background:transparent;border:0;padding:0;border-radius:0}
.pillbox b{font-family:var(--mono);font-size:24px;font-weight:500;line-height:1;color:var(--x,var(--green))}
.pillbox span{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px;font-weight:700}
.kpis{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 12px;position:relative;overflow:hidden;box-shadow:var(--sh-xs);transition:all .2s;animation:fadeUp .3s both;text-align:left;min-height:auto;border-top:0}
.kpi:before{content:"";position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;background:var(--x,var(--green))}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.kpi b{font-family:var(--mono);font-size:22px;font-weight:600;line-height:1;margin-top:4px;color:var(--x,var(--green))}
.kpi span{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:8px}
.kpi small{font-size:9px;color:var(--muted);margin-top:3px;font-weight:500}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px;box-shadow:var(--sh);transition:box-shadow .2s}
.card:hover{box-shadow:var(--sh-md)}
.hd{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2)}
.hd h3{font-size:11px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0}
.hd p{font-size:10px;color:var(--muted);margin-top:3px}
.wrap{overflow:auto}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;border-bottom:1px solid var(--border);background:var(--surface2);position:sticky;top:0;z-index:1;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.tag{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px}
.green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.chip{border:1px solid var(--border);background:var(--surface2);border-radius:var(--r-sm);padding:6px 10px;font-size:10px;font-weight:700;color:var(--text2)}
.chip.on,.chip.active{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.actionsList{padding:14px}
.act{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.act:last-child{border-bottom:none}
.no{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px;font-family:var(--mono);background:var(--green-bg);color:var(--green)}
.no.red{background:var(--red-bg);color:var(--red)}
.no.amber{background:var(--amber-bg);color:var(--amber)}
.no.blue{background:var(--blue-bg);color:var(--blue)}
.no.purple{background:var(--purple-bg);color:var(--purple)}
.grow b{font-size:12px;font-weight:700;color:var(--text)}
.grow small{font-size:11px;color:var(--muted);line-height:1.55;margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.empty{padding:24px;color:var(--muted);text-align:center;font-size:12px;font-style:italic;font-weight:500}
.drawer{position:fixed;inset:0;background:rgba(15,26,20,.35);backdrop-filter:blur(7px);z-index:999;display:none}
.drawer.on{display:block}
.box{position:absolute;right:18px;top:18px;bottom:18px;width:min(1100px,calc(100vw - 36px));background:var(--surface);border-radius:18px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.22);display:flex;flex-direction:column}
.boxhd{display:flex;justify-content:space-between;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2)}
.boxhd b{font-size:16px}.boxhd small{display:block;color:var(--muted);margin-top:2px}
.x{width:34px;height:34px;border:1px solid var(--border);background:var(--surface2);border-radius:var(--r-sm);font-weight:900}.boxbody{overflow:auto;flex:1}
@media(max-width:1200px){.kpis{grid-template-columns:repeat(4,1fr)}.grid2{grid-template-columns:1fr}.hp{margin-left:0;margin-top:12px}.hero{display:block}}
@media(max-width:700px){:root{--sb-w:0px}.side{display:none}.main{margin-left:0;width:100%}.kpis{grid-template-columns:repeat(2,1fr)}.content{padding:14px 14px 60px}}

</style>

<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">T</div><div><b>Talentera</b><small>Sales Command Center</small></div></div>
    <div id="nav"></div>
    <div class="user"><div class="u"><div class="av">SM</div><div><b style="color:#102019;font-size:12px">Sales Manager</b><small style="display:block;color:#6f877b">Admin · Riyadh</small></div></div></div>
  </aside>

  <main class="main">
    <header class="top">
      <div><div class="tt" id="title">Talentera</div><div class="ts" id="sub">Loading…</div></div>
      <div class="right"><div class="live" id="live">Live · Supabase</div><button class="btn" onclick="loadAll()">↻ Refresh</button></div>
    </header>
    <nav class="tabs" id="tabs"></nav>
    <section class="filters" id="filters"></section>
    <section class="content" id="content"><div class="empty">Loading dashboard…</div></section>
  </main>
</div>

<div class="drawer" id="drawer">
  <div class="box">
    <div class="boxhd"><div><b id="dt">Details</b><small id="ds"></small></div><button class="x" onclick="closeDrawer()">✕</button></div>
    <div class="boxbody" id="db"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://czaxtwbmborxwzaboqxl.supabase.co';
const SUPABASE_KEY='sb_publishable_uVUdpVWggu1WvkSKCAi51w_9qsb-AjX';
const PORTAL='145742477';
const HS='https://app-eu1.hubspot.com';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const view={
  acqReps:'vw_acquisition_sidebar_reps',
  acqKpi:'vw_acquisition_kpi_snapshot_periods',
  acqRep:'vw_acquisition_rep_kpi_periods',
  acqTeam:'vw_acquisition_team_snapshot',
  rank:'vw_acquisition_rank_details',
  rankCov:'vw_acquisition_rank_coverage',
  need:'vw_acquisition_leads_need_contact_v2',
  pipe:'vw_acquisition_pipeline_snapshot',
  deals:'vw_acquisition_pipeline_details',
  stage:'vw_acquisition_pipeline_by_stage',
  stuck:'vw_acquisition_stuck_deals',
  cold:'vw_acquisition_cold_deals',
  src:'vw_acquisition_field_sources',
  ret:'vw_retention_renewal_logic',
  retSide:'vw_retention_sidebar_reps',
  retKpi:'vw_retention_kpi_snapshot',
  retCov:'vw_retention_coverage_quality',
  notBudget:'vw_retention_not_in_budget',
  pnl:'vw_pnl_advanced_summary',
  pnlM:'vw_pnl_monthly_advanced',
  pnlB:'vw_pnl_cost_breakdown',
  pnlC:'vw_pnl_year_comparison',
  upS:'vw_features_plan_dashboard_summary',
  upC:'vw_features_plan_company_summary'
};

const S={main:'retention',tab:'retTeam',f:{year:'2026',month:'all',product:'all',owner:'all',country:'all',rank:'all',q:''},d:{},time:null};
const ACQ_ACTIVITY_OWNERS=['Marita Chedid','Zein Fares','Ursula Waked','Ahmad Khawajah','Mohammad Khalid','Mohammad Jehad Al-Barqawi','Jehad Al-Barqawi'];
const ACQ_DEAL_ONLY_OWNERS=['Fadi Zanona','Mohammed Faizan','Mohammad Faizan'];
const RETENTION_OWNERS=['Fadi Zanona','Mohammad Jehad Al-Barqawi','Jehad Al-Barqawi','Mohammed Faizan','Mohammad Faizan','Darshna Suresh','Haia Al-Zo’ubi','Haia Al-Zoubi','Hatem Alawneh','Maryam Alfarra','Sarah Al-jarrah','Sara Al-jarrah'];
let C={},cid=0;
const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function el(x){return document.getElementById(x)}
function n(v){let x=Number(String(v??'').replace(/[^0-9.-]/g,''));return isFinite(x)?x:0}
function i(v){return Math.round(n(v)).toLocaleString()}
function money(v){let x=n(v),s=x<0?'-':'',a=Math.abs(x);return s+'$'+(a>=1e6?(a/1e6).toFixed(1)+'M':Math.round(a).toLocaleString())}
function pct(v){return (n(v)||0).toFixed(0)+'%'}
function norm(v){return String(v??'').trim().toLowerCase()}function allowed(list,name){return list.some(x=>norm(x)===norm(name))}
function sum(a,k){return (a||[]).reduce((x,r)=>x+n(r[k]),0)}
function rows(k){return S.d[k]||[]}
function esc(v){return String(v??'').replace(/[&<>"]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[x]))}
function uniq(a){return [...new Set((a||[]).filter(Boolean).map(String))].sort((x,y)=>x.localeCompare(y))}
function recordUrl(r){return r.hubspot_url||r.hubspot_search_url||r.company_url||r.deal_url||((r.company_name||r.dealname||r.name)?`${HS}/contacts/${PORTAL}/objects/0-2/views/all/list?query=${encodeURIComponent(r.company_name||r.dealname||r.name)}`:'')}
function linkCell(v,r){let u=recordUrl(r);return u?`<a class="link" target="_blank" rel="noopener" href="${esc(u)}">${esc(v)}</a>`:esc(v)}
function ok(r){
  let f=S.f;
  return (f.q===''||Object.values(r).join(' ').toLowerCase().includes(f.q.toLowerCase()))
  &&(f.year==='all'||!r.year||String(r.year)===String(f.year))
  &&(f.owner==='all'||norm(r.owner_name)===norm(f.owner)||norm(r.rm_owner)===norm(f.owner)||norm(r.csm_owner)===norm(f.owner))
  &&(f.country==='all'||norm(r.country)===norm(f.country))
  &&(f.rank==='all'||norm(r.rank)===norm(f.rank))
  &&(f.month==='all'||!r.month||norm(String(r.month).slice(0,3))===norm(f.month))
  &&(f.product==='all'||!r.product||norm(r.product)===norm(f.product));
}

async function loadAll(){
  el('live').textContent='Refreshing…';
  await Promise.all(Object.entries(view).map(async([k,v])=>{
    try{
      let {data,error}=await sb.from(v).select('*').limit(5000);
      if(error) throw error;
      S.d[k]=data||[];
    }catch(e){
      S.d[k]=[];
      console.warn('Supabase view failed',v,e.message||e);
    }
  }));
  S.time=new Date();
  el('live').textContent='Live · Supabase';
  render();
}

function setMain(x){S.main=x;S.tab=x==='acquisition'?'acqTeam':x==='retention'?'retTeam':'pnl';render()}
function setTab(x){S.tab=x;render()}
function setF(k,v){S.f[k]=v;render()}
function cache(r){let id='c'+(++cid);C[id]=r||[];return id}
function openRows(t,r,s=''){let id=cache(r);openCache(id,t,s)}
function openCache(id,t,s=''){el('dt').textContent=t;el('ds').textContent=s||`${(C[id]||[]).length} rows`;el('db').innerHTML=tbl(t,C[id]||[],null,true);el('drawer').classList.add('on')}
function closeDrawer(){el('drawer').classList.remove('on')}

function val(v,k,r){
  if(v==null||v==='')return '—';
  if(['company_name','dealname','name','account'].includes(k))return linkCell(v,r);
  if(/url/i.test(k)&&String(v).startsWith('http'))return `<a class="tag blue" target="_blank" rel="noopener" href="${esc(v)}">Open</a>`;
  if(/amount|value|cash|book|revenue|pipeline|cost|collection|renewal|profit|cogs|overheads/i.test(k))return `<span class="num">${money(v)}</span>`;
  if(/pct|rate|coverage|score|margin/i.test(k))return `<span class="num">${pct(v)}</span>`;
  let s=String(v);
  if(/lost|delayed|churn|cold|stuck|overdue|risk/i.test(s))return `<span class="tag red">${esc(s)}</span>`;
  if(/expected|upcoming|pending|unknown|missing/i.test(s))return `<span class="tag amber">${esc(s)}</span>`;
  if(/won|cash|booked|renewed|active|completed|healthy|contacted/i.test(s))return `<span class="tag green">${esc(s)}</span>`;
  return esc(s);
}

function tbl(t,r,cols,drawerMode=false){
  r=(r||[]).filter(ok);
  cols=cols||Object.keys(r[0]||{}).slice(0,11);
  let id=cache(r);
  return `<section class="card"><div class="hd"><div><h3>${esc(t)}</h3><p>${r.length.toLocaleString()} rows</p></div>${!drawerMode&&r.length?`<button class="chip" onclick="openCache('${id}','${esc(t)}','${r.length.toLocaleString()} rows')">Open All</button>`:''}</div><div class="wrap">${r.length?`<table><thead><tr>${cols.map(c=>`<th>${esc(c).replaceAll('_',' ')}</th>`).join('')}</tr></thead><tbody>${r.slice(0,drawerMode?999:120).map(x=>`<tr>${cols.map(c=>`<td>${val(x[c],c,x)}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'<div class="empty">No rows found</div>'}</div></section>`;
}

function kpi(l,v,s,c='g',r=null){
  const colorMap={g:'--g',b:'--b',p:'--p',a:'--a',r:'--r',c:'--c'};
  let id=r?cache(r):'';
  return `<button class="kpi" style="--x:var(${colorMap[c]||'--g'})" ${r?`onclick="openCache('${id}','${esc(l)}','${esc(s||'')}')"`:''}><b>${v}</b><span>${esc(l)}</span>${s?`<small>${esc(s)}</small>`:''}</button>`;
}

function sectionTitle(t){return `<div style="font-size:10px;font-weight:900;letter-spacing:.11em;text-transform:uppercase;color:#63776c;margin:15px 0 9px;display:flex;gap:8px;align-items:center"><span style="width:3px;height:14px;border-radius:2px;background:var(--green);display:inline-block"></span>${esc(t)}<span style="flex:1;height:1px;background:var(--line)"></span></div>`}
function hero(t,s,arr=[]){
  const colorMap={g:'--g',b:'--b',p:'--p',a:'--a',r:'--r',c:'--c'};
  return `<div class="hero"><div><h1>${esc(t)}</h1><p>${esc(s)}</p></div><div class="hp">${arr.map(x=>`<div class="pillbox" style="--x:var(${colorMap[x[3]]||'--g'})"><b>${x[1]}</b><span>${esc(x[0])}</span></div>`).join('')}</div></div>`;
}

function nav(){
  let h='<div class="sec">Main</div>';
  [['acquisition','📊','Acquisition'],['retention','🛡️','Retention'],['pnl','📊','P&L']].forEach(x=>h+=`<button class="nav ${S.main===x[0]?'on':''}" onclick="setMain('${x[0]}')"><span>${x[1]}</span><span>${x[2]}</span></button>`);
  if(S.main==='acquisition'){
    h+='<div class="sec">Acquisition Reps</div>';
    rows('acqReps').filter(r=>allowed(ACQ_ACTIVITY_OWNERS,r.owner_name)).forEach(r=>h+=`<button class="nav ${S.tab==='rep:'+r.owner_name?'on':''}" onclick="setTab('rep:${esc(r.owner_name)}')"><span>●</span><span>${esc(r.owner_name)}<small>${i(r.connected_calls)} connected · ${i(r.meetings_completed)} meetings</small></span><span class="badge">${i(r.connected_calls)}</span></button>`);
    rows('pipe').filter(r=>norm(r.owner_role)==='deals_only'||allowed(ACQ_DEAL_ONLY_OWNERS,r.owner_name)).forEach(r=>h+=`<button class="nav ${S.tab==='deal:'+r.owner_name?'on':''}" onclick="setTab('deal:${esc(r.owner_name)}')"><span>◆</span><span>${esc(r.owner_name)} <span class="viewTag">VIEW</span><small>${i(r.open_deals)} open · ${money(r.open_pipeline)}</small></span></button>`);
  }
  if(S.main==='retention'){
    h+='<div class="sec">Retention</div>';
    [['retTeam','Team Overview'],['retFinancial','Financial Details'],['features','Features Plan']].forEach(x=>h+=`<button class="nav ${S.tab===x[0]?'on':''}" onclick="setTab('${x[0]}')"><span>•</span><span>${x[1]}</span></button>`);
    h+='<div class="sec">Retention Team</div>';
    rows('retSide').filter(r=>allowed(RETENTION_OWNERS,r.owner_name)).forEach(r=>h+=`<button class="nav ${S.tab==='ret:'+r.owner_name?'on':''}" onclick="setTab('ret:${esc(r.owner_name)}')"><span>●</span><span>${esc(r.owner_name)} <span class="viewTag">${esc(r.role||'')}</span><small>${i(r.accounts)} accounts · ${money(r.renewal_value)}</small></span><span class="badge">${i(r.delayed_accounts)}</span></button>`);
  }
  el('nav').innerHTML=h;
}

function tabs(){
  let t=[];
  if(S.main==='acquisition')t=[['acqTeam','🏦 Team Overview'],['acqFinancial','💰 Financial Details'],...rows('acqReps').filter(r=>allowed(ACQ_ACTIVITY_OWNERS,r.owner_name)).map(r=>['rep:'+r.owner_name,r.owner_name]),...rows('pipe').filter(r=>norm(r.owner_role)==='deals_only'||allowed(ACQ_DEAL_ONLY_OWNERS,r.owner_name)).map(r=>['deal:'+r.owner_name,r.owner_name+' VIEW'])];
  else if(S.main==='retention')t=[['retTeam','🛡️ Team Overview'],['retFinancial','💰 Financial Details'],['features','✨ Features Plan'],...rows('retSide').filter(r=>allowed(RETENTION_OWNERS,r.owner_name)).map(r=>['ret:'+r.owner_name,r.owner_name])];
  else t=[['pnl','📊 P&L Dashboard'],['pnlDetails','Cost Breakdown']];
  el('tabs').innerHTML=t.map(x=>`<button class="tab ${S.tab===x[0]?'on':''}" onclick="setTab('${esc(x[0])}')">${esc(x[1])}</button>`).join('');
}

function filters(){
  let all=[...rows('rank'),...rows('need'),...rows('ret'),...rows('pnl'),...rows('pnlM'),...rows('upC')];
  let owners=uniq([...all.map(r=>r.owner_name),...all.map(r=>r.rm_owner),...all.map(r=>r.csm_owner)]);
  el('filters').innerHTML=`<input class="f" placeholder="Search…" value="${esc(S.f.q)}" oninput="setF('q',this.value)">
  <select class="f" onchange="setF('year',this.value)"><option value="all">All Years</option>${uniq(all.map(r=>r.year)).length?uniq(all.map(r=>r.year)).map(x=>`<option ${S.f.year==x?'selected':''}>${esc(x)}</option>`).join(''):`<option ${S.f.year==='2026'?'selected':''}>2026</option>`}</select>
  <select class="f" onchange="setF('month',this.value)"><option value="all">All Months</option>${M.map(x=>`<option ${S.f.month===x?'selected':''}>${x}</option>`).join('')}</select>
  <select class="f" onchange="setF('product',this.value)"><option value="all">All Products</option>${uniq(all.map(r=>r.product||r.product_line)).map(x=>`<option ${S.f.product===x?'selected':''}>${esc(x)}</option>`).join('')}</select>
  <select class="f" onchange="setF('owner',this.value)"><option value="all">All Owners</option>${owners.map(x=>`<option ${S.f.owner===x?'selected':''}>${esc(x)}</option>`).join('')}</select>
  <select class="f" onchange="setF('country',this.value)"><option value="all">All Countries</option>${uniq(all.map(r=>r.country)).map(x=>`<option ${S.f.country===x?'selected':''}>${esc(x)}</option>`).join('')}</select>
  <select class="f" onchange="setF('rank',this.value)"><option value="all">All Ranks</option>${uniq(all.map(r=>r.rank)).map(x=>`<option ${S.f.rank===x?'selected':''}>${esc(x)}</option>`).join('')}</select>
  <button class="chip" onclick="S.f={year:'2026',month:'all',product:'all',owner:'all',country:'all',rank:'all',q:''};render()">Reset</button>`;
}

function render(){
  nav();tabs();filters();
  let title='Talentera',html='';
  if(S.main==='acquisition'){
    title=S.tab.startsWith('rep:')?'Acquisition · '+S.tab.slice(4):S.tab==='acqFinancial'?'Acquisition · Financial Details':S.tab.startsWith('deal:')?'Acquisition · '+S.tab.slice(5):'Acquisition · Team Overview';
    html=S.tab==='acqFinancial'?acqFinancial():S.tab.startsWith('rep:')?acqRep(S.tab.slice(4)):S.tab.startsWith('deal:')?dealOwner(S.tab.slice(5)):acqTeam();
  }else if(S.main==='retention'){
    title=S.tab==='retFinancial'?'Retention · Financial Details':S.tab.startsWith('ret:')?'Retention · '+S.tab.slice(4):S.tab==='features'?'Retention · Features Plan':'Retention · Team Overview';
    html=S.tab==='retFinancial'?retFinancial():S.tab==='features'?features():S.tab.startsWith('ret:')?retOwner(S.tab.slice(4)):retTeam();
  }else{
    title='P&L';
    html=S.tab==='pnlDetails'?pnlDetails():pnl();
  }
  el('title').textContent=title;
  el('sub').textContent=`Updated ${S.time?S.time.toLocaleString():'--'} · Auto refresh 5min`;
  el('content').innerHTML=html;
}

function period(periodRows,fields){
  return `<section class="card"><div class="hd"><div><h3>📌 Yesterday · MTD · YTD summary</h3><p>Same visual block as legacy dashboard</p></div></div><div style="padding:12px">${['yesterday','mtd','ytd'].map(p=>{
    let r=periodRows.find(x=>norm(x.period)===p)||{};
    return `<div style="display:grid;grid-template-columns:90px repeat(${fields.length},1fr);gap:8px;margin-bottom:8px"><div class="card" style="padding:14px"><b style="font-size:11px;text-transform:uppercase">${p}</b><small style="display:block;color:var(--mut)">${p==='yesterday'?'daily execution':p==='mtd'?'current month':'current year'}</small></div>${fields.map(f=>kpi(f[0],f[2]?f[2](r):i(r[f[1]]),f[3]||'',f[4]||'b')).join('')}</div>`;
  }).join('')}</div></section>`;
}


function legacySectionTitle(t){
  return `<div class="period-label">${esc(t)}</div>`;
}
function managerFocusBlock(){
  const ret = S.main === 'retention';
  const needs = rows('need').filter(ok);
  const open = rows('deals').filter(r=>norm(r.deal_status)==='open');
  const rm = retMetrics ? retMetrics() : {del:[],book:[],cash:[],r:[]};
  if(ret){
    return `<div class="command-preview">
      <div class="focus-strip">
        <div class="focus-top"><div><div class="focus-title">Today’s Retention Focus</div><div class="focus-sub">Smart actions for delayed renewals and RM / CSM follow-up cadence.</div></div><div class="focus-date">Live Snapshot<br><span class="focus-date-val">${S.time?S.time.toLocaleString():'—'}</span></div></div>
        <div class="focus-grid">
          <div class="focus-pill" style="--fp-c:var(--red)"><div class="focus-pill-value">${i(rm.del.length)}</div><div class="focus-pill-label">Delayed Renewals</div><div class="focus-pill-sub">Need action</div></div>
          <div class="focus-pill" style="--fp-c:var(--amber)"><div class="focus-pill-value">${i(rm.del.length)}</div><div class="focus-pill-label">Tier A Overdue</div><div class="focus-pill-sub">Priority accounts</div></div>
          <div class="focus-pill" style="--fp-c:var(--purple)"><div class="focus-pill-value">${i(rows('retCov').length)}</div><div class="focus-pill-label">CSM Due</div><div class="focus-pill-sub">Follow-up cadence</div></div>
          <div class="focus-pill" style="--fp-c:var(--blue)"><div class="focus-pill-value">${i(rows('retSide').length)}</div><div class="focus-pill-label">RM Due</div><div class="focus-pill-sub">Commercial follow-up</div></div>
        </div>
        <div class="focus-focus-row"><span>▶</span><span><strong>Manager Focus:</strong> start with delayed renewals, then Tier A accounts with no recent touch.</span></div>
      </div>
    </div>`;
  }
  return `<div class="command-preview">
    <div class="focus-strip">
      <div class="focus-top"><div><div class="focus-title">Today’s Focus</div><div class="focus-sub">The most important acquisition actions based on Supabase views.</div></div><div class="focus-date">Live Snapshot<br><span class="focus-date-val">${S.time?S.time.toLocaleString():'—'}</span></div></div>
      <div class="focus-grid">
        <div class="focus-pill" style="--fp-c:var(--red)"><div class="focus-pill-value">${i(needs.length)}</div><div class="focus-pill-label">Leads need contact</div><div class="focus-pill-sub">Online / offline</div></div>
        <div class="focus-pill" style="--fp-c:var(--amber)"><div class="focus-pill-value">${i(rows('rank').filter(r=>ok(r)&&r.needs_contact).length)}</div><div class="focus-pill-label">Rank A/B untouched</div><div class="focus-pill-sub">Coverage gap</div></div>
        <div class="focus-pill" style="--fp-c:var(--purple)"><div class="focus-pill-value">${i(open.length)}</div><div class="focus-pill-label">Open deals</div><div class="focus-pill-sub">${money(sum(open,'amount'))}</div></div>
        <div class="focus-pill" style="--fp-c:var(--sb-accent)"><div class="focus-pill-value">${i(rows('acqReps').length)}</div><div class="focus-pill-label">Active reps</div><div class="focus-pill-sub">Owner-scoped</div></div>
      </div>
      <div class="focus-focus-row"><span>▶</span><span><strong>Manager Focus:</strong> clear high-rank untouched companies and open deals with no next action.</span></div>
    </div>
  </div>`;
}

function acqTeam(){
  let t=rows('acqTeam')[0]||{},rank=rows('rank').filter(ok),needs=rows('need').filter(ok),open=rows('deals').filter(r=>norm(r.deal_status)==='open'),won=rows('deals').filter(r=>norm(r.deal_status)==='won'),lost=rows('deals').filter(r=>norm(r.deal_status)==='lost');
  return managerFocusBlock()+hero('Acquisition Team Overview','Team KPIs, Rank A/B coverage, needs contact and pipeline.',[['Needs',i(needs.length),'','r'],['Open',i(open.length),'','p'],['Pipeline',money(sum(open,'amount')),'','g']])
  +`<div class="kpis">${kpi('Companies',i(t.total_companies),'allowed owners','g',rank)}${kpi('Contacted',i(t.contacted_companies),'owner scoped','b',rank.filter(r=>!r.needs_contact))}${kpi('Needs Contact',i(needs.length),'online/offline','r',needs)}${kpi('Rank A Coverage',pct(t.rank_a_coverage_pct),`${i(t.rank_a_contacted)} contacted`,'g',rank.filter(r=>['a','rank a'].includes(norm(r.rank))))}${kpi('Rank B Coverage',pct(t.rank_b_coverage_pct),`${i(t.rank_b_contacted)} contacted`,'a',rank.filter(r=>['b','rank b'].includes(norm(r.rank))))}${kpi('Open Pipeline',money(sum(open,'amount')),`${i(open.length)} deals`,'p',open)}${kpi('Won',i(won.length),money(sum(won,'amount')),'g',won)}${kpi('Lost',i(lost.length),money(sum(lost,'amount')),'r',lost)}</div>`
  +period(rows('acqKpi'),[['Calls','calls_logged'],['Connected','connected_calls'],['Rate','connection_rate',r=>pct(r.connection_rate),'connected/calls','r'],['Meetings','meetings_completed'],['Pipeline','open_pipeline',()=>money(sum(open,'amount')),'snapshot','g']])
  +`<div class="grid2">${tbl('Rank A/B Coverage',rows('rankCov'),['rank','country','owner_name','total_companies','touched_companies','untouched_companies','needs_contact','connected_calls','completed_meetings','coverage_pct'])}${tbl('Needs To Contact',needs,['company_name','owner_name','country','rank','source_type','connected_calls','completed_meetings','last_touch_at','hubspot_url'])}</div><div class="grid2">${tbl('Pipeline by Owner',rows('pipe'),['owner_name','owner_role','open_deals','open_pipeline','won_deals','won_amount','lost_deals','lost_amount'])}${tbl('Pipeline by Stage',rows('stage'),['dealstage','deals','amount','open_deals','open_amount'])}</div>${tbl('Field Sources / Logic',rows('src'),['metric_name','source_object','source_fields','logic'])}`;
}

function acqRep(name){
  let rep=rows('acqRep').find(r=>norm(r.owner_name)===norm(name))||{},details=rows('rank').filter(r=>ok(r)&&norm(r.owner_name)===norm(name)),needs=rows('need').filter(r=>ok(r)&&norm(r.owner_name)===norm(name)),deals=rows('deals').filter(r=>norm(r.owner_name)===norm(name)),open=deals.filter(r=>norm(r.deal_status)==='open'),stuck=rows('stuck').filter(r=>norm(r.owner_name)===norm(name));
  return hero(name,'Rep activity, needs contact, AI coaching, open deals, Rank A/B and stuck deals.',[['Calls',i(rep.calls_mtd),'','b'],['Rate',pct(rep.conn_rate_mtd),'','r'],['Meetings',i(rep.completed_mtd),'','p'],['Pipeline',money(sum(open,'amount')),'','g']])
  +period([{period:'yesterday',calls_logged:rep.calls_yesterday,connection_rate:rep.conn_rate_yesterday,meetings_completed:rep.completed_yesterday},{period:'mtd',calls_logged:rep.calls_mtd,connection_rate:rep.conn_rate_mtd,meetings_completed:rep.completed_mtd},{period:'ytd',calls_logged:rep.calls_ytd,connection_rate:rep.conn_rate_ytd,meetings_completed:rep.completed_ytd}], [['Calls','calls_logged'],['Conv. Rate','connection_rate',r=>pct(r.connection_rate),'','r'],['Meetings','meetings_completed'],['Leads','leads',()=>i(needs.length),'needs contact','c'],['Won','won',()=>i(deals.filter(x=>norm(x.deal_status)==='won').length),'','g'],['Lost','lost',()=>i(deals.filter(x=>norm(x.deal_status)==='lost').length),'','r']])
  +`<div class="grid2">${tbl('Online / Inbound Needs Contact',needs.filter(r=>norm(r.source_type)==='online'),['company_name','country','rank','source_type','connected_calls','completed_meetings','hubspot_url'])}${tbl('Offline / Outbound Needs Contact',needs.filter(r=>norm(r.source_type)!=='online'),['company_name','country','rank','source_type','connected_calls','completed_meetings','hubspot_url'])}</div>${tbl('AI Coaching / Attention Deals',[...stuck,...rows('cold').filter(r=>norm(r.owner_name)===norm(name))].filter((r,idx,arr)=>idx===arr.findIndex(x=>x.hubspot_deal_id===r.hubspot_deal_id)),['dealname','dealstage','amount','days_in_stage','days_since_modified','hubspot_url'])}<div class="grid2">${tbl('Open Deals',open,['dealname','dealstage','amount','product','closedate','hubspot_url'])}${rankCard(details)}</div>${tbl('Stuck Deals (>21 days)',stuck,['dealname','dealstage','amount','days_in_stage','days_since_modified','hubspot_url'])}`;
}

function rankCard(details){
  let arrA=details.filter(r=>['a','rank a'].includes(norm(r.rank))),arrB=details.filter(r=>['b','rank b'].includes(norm(r.rank)));
  return `<section class="card"><div class="hd"><div><h3>🎯 Rank A/B Coverage</h3><p>Same-owner activity only</p></div></div><div class="kpis" style="padding:12px;grid-template-columns:repeat(5,1fr)">${kpi('A untouched',i(arrA.filter(r=>r.needs_contact).length),'','r',arrA.filter(r=>r.needs_contact))}${kpi('A touched',i(arrA.filter(r=>!r.needs_contact).length),'','g',arrA.filter(r=>!r.needs_contact))}${kpi('Meetings',i(sum(details,'completed_meetings')),'','p',details.filter(r=>n(r.completed_meetings)>0))}${kpi('B untouched',i(arrB.filter(r=>r.needs_contact).length),'','a',arrB.filter(r=>r.needs_contact))}${kpi('B touched',i(arrB.filter(r=>!r.needs_contact).length),'','g',arrB.filter(r=>!r.needs_contact))}</div><div class="rank"><h4>Rank A — ${i(arrA.length)}</h4>${arrA.slice(0,6).map(r=>`<div class="minirow"><div>${linkCell(r.company_name,r)}</div><span class="tag red">Rank A</span></div>`).join('')||'<div class="empty">No Rank A</div>'}<h4 style="color:var(--a)">Rank B — ${i(arrB.length)}</h4>${arrB.slice(0,6).map(r=>`<div class="minirow"><div>${linkCell(r.company_name,r)}</div><span class="tag amber">Rank B</span></div>`).join('')||'<div class="empty">No Rank B</div>'}</div></section>`;
}

function dealOwner(name){
  let d=rows('deals').filter(r=>norm(r.owner_name)===norm(name)),open=d.filter(r=>norm(r.deal_status)==='open'),won=d.filter(r=>norm(r.deal_status)==='won'),lost=d.filter(r=>norm(r.deal_status)==='lost');
  return hero(name,'Acquisition deal-owner view only: activity KPIs intentionally hidden.',[['Open',i(open.length),'','p'],['Won',i(won.length),'','g'],['Lost',i(lost.length),'','r']])
  +`<div class="kpis">${kpi('Open Deals',i(open.length),money(sum(open,'amount')),'p',open)}${kpi('Won Deals',i(won.length),money(sum(won,'amount')),'g',won)}${kpi('Lost Deals',i(lost.length),money(sum(lost,'amount')),'r',lost)}</div>${tbl('Deal Owner Pipeline',d,['dealname','dealstage','deal_status','amount','product','closedate','hubspot_url'])}`;
}

function acqFinancial(){
  let won=rows('deals').filter(r=>norm(r.deal_status)==='won'),signed=rows('deals').filter(r=>norm(r.deal_status)==='open');
  return hero('Financial Details','Cashing revenue, signed contract and pending to cash.',[])
  +`<div class="kpis" style="grid-template-columns:repeat(3,1fr)">${kpi('Cashing Revenue',money(sum(won,'amount')),`${i(won.length)} closed won deals`,'g',won)}${kpi('Signed Contract',money(sum(signed,'amount')),`${i(signed.length)} open deals`,'a',signed)}${kpi('Pending To Cash',money(sum(signed,'amount')),'same as signed','b',signed)}</div><div class="grid2">${tbl('Cashing',won,['dealname','owner_name','amount','closedate','dealstage','hubspot_url'])}${tbl('Signed / Booking',signed,['dealname','owner_name','amount','closedate','dealstage','deal_status','hubspot_url'])}</div>`;
}

function retMetrics(){
  let r=rows('ret').filter(ok),del=r.filter(x=>/delayed/i.test(String(x.renewal_status||x.status||''))),book=r.filter(x=>n(x.booked_value)>0),cash=r.filter(x=>n(x.collected_value||x.cash_collected)>0);
  return{r,del,book,cash,renewal:sum(r,'renewal_value'),bookVal:sum(r,'booked_value'),cashVal:sum(r,'collected_value'),remain:sum(r,'remaining_collection_value')};
}

function retTeam(){
  let x=retMetrics();
  let tierDue=rows('retCov').length;
  return managerFocusBlock()+hero('Retention Team Overview','Full retention command center: smart actions, KPI snapshots, renewal pipeline, and owner follow-up.',[
    ['Delayed',i(x.del.length),'','r'],['Tier A Overdue',i(x.del.length),'','a'],['CSM Due',i(tierDue),'','p'],['RM Due',i(rows('retSide').length),'','b']
  ])
  +`<section class="card"><div class="hd"><div><h3>⚡ Smart Actions</h3><p>Prioritized retention actions for today</p></div><span class="tag blue">Retention manager view</span></div><div class="actionsList">
    <div class="act"><div class="no red">1</div><div class="grow"><b>Work ${i(x.del.length)} delayed renewals</b><small>Renewal date passed and no same-company current-year booked/cashed movement detected.</small></div><b class="num" style="color:var(--red)">${i(x.del.length)}</b></div>
    <div class="act"><div class="no amber">2</div><div class="grow"><b>Clear Tier A follow-ups</b><small>High-value accounts should not wait beyond cadence.</small></div><b class="num" style="color:var(--amber)">${i(x.del.length)}</b></div>
    <div class="act"><div class="no purple">3</div><div class="grow"><b>CSM follow-up due</b><small>Accounts requiring CSM touch based on tier cadence.</small></div><b class="num" style="color:var(--purple)">${i(tierDue)}</b></div>
    <div class="act"><div class="no blue">4</div><div class="grow"><b>RM follow-up due</b><small>Renewal owners needing commercial follow-up.</small></div><b class="num" style="color:var(--blue)">${i(rows('retSide').length)}</b></div>
  </div></section>`
  +sectionTitle('Retention KPI Snapshots')
  +period(rows('retKpi'),[['Calls Connected','connected_calls'],['Meetings Completed','meetings_completed'],['Renewed','renewed_count'],['Booked','booked_count'],['Cashed','cashed_count'],['Churned','churned_count'],['Delayed','delayed_count']])
  +sectionTitle('Monthly Renewal Pipeline')
  +monthly()
  +sectionTitle('Renewal Management')
  +`<div class="grid2"><div>${tbl('Unified Renewal Table',x.r,['company_name','tier','renewal_value','month','renewal_date','rm_owner','csm_owner','renewal_status','hubspot_search_url'])}</div><div>${tbl('Coverage Quality',rows('retCov'),['role','owner_name','accounts','delayed_accounts','calls_logged','connected_calls','meetings_logged','meetings_completed','coverage_status'])}${tbl('Churn Reasons',x.r.filter(r=>/lost|churn/i.test(String(r.renewal_status||r.status||''))),['company_name','product','renewal_value','renewal_status','rm_owner','csm_owner'])}</div></div>`
  +sectionTitle('RM / CSM Follow-up Metrics by Tier')
  +tbl('Follow-up Metrics by Tier',x.r,['company_name','tier','rm_owner','csm_owner','renewal_status'])
  +`<div class="grid2"><section class="card"><div class="hd"><div><h3>RM View</h3><p>Commercial owner summary</p></div></div><div class="kpis" style="padding:12px;grid-template-columns:repeat(4,1fr)">${kpi('Accounts',i(x.r.length),'','b',x.r)}${kpi('Delayed',i(x.del.length),'','r',x.del)}${kpi('Booked',money(x.bookVal),'','p',x.book)}${kpi('Cash',money(x.cashVal),'','g',x.cash)}</div></section><section class="card"><div class="hd"><div><h3>CSM View</h3><p>Customer success summary</p></div></div><div class="kpis" style="padding:12px;grid-template-columns:repeat(4,1fr)">${kpi('Accounts',i(x.r.length),'','b',x.r)}${kpi('Follow-ups',i(tierDue),'','a',rows('retCov'))}${kpi('Meetings',i(sum(rows('retCov'),'meetings_completed')),'','p',rows('retCov'))}${kpi('Connected',i(sum(rows('retCov'),'connected_calls')),'','g',rows('retCov'))}</div></section></div>`;
}

function monthly(){
  let map={};
  rows('ret').filter(ok).forEach(r=>{
    let mo=String(r.month||'Unknown').slice(0,3)||'Unknown';
    map[mo]=map[mo]||{month:mo,due:0,renewed:0,booked:0,cashed:0,delayed:0,value:0,what_happens:''};
    let o=map[mo];o.due++;o.value+=n(r.renewal_value);
    if(n(r.booked_value)>0)o.booked++;
    if(n(r.collected_value)>0)o.cashed++;
    if(/delayed/i.test(String(r.renewal_status||r.status||'')))o.delayed++;
    if(n(r.booked_value)>0||n(r.collected_value)>0)o.renewed++;
    o.what_happens=o.delayed?`${o.delayed} delayed renewal(s) need action`:`${o.renewed} renewed`;
  });
  return tbl('Monthly Renewal Pipeline',Object.values(map),['month','due','renewed','booked','cashed','delayed','value','what_happens']);
}

function retFinancial(){
  let x=retMetrics(),not=rows('notBudget'),lost=x.r.filter(r=>/lost|churn/i.test(String(r.renewal_status||r.status||'')));
  return hero('Retention Financial Details','Budget, booking, collection, not-in-budget and renewal status split.',[])
  +`<div class="kpis">${kpi('Budget Renewal',money(x.renewal),`${i(x.r.length)} rows`,'b',x.r)}${kpi('Booked Total',money(x.bookVal),`${i(x.book.length)} booked`,'p',x.book)}${kpi('Cash Collected',money(x.cashVal),`${i(x.cash.length)} cashed`,'g',x.cash)}${kpi('Remaining',money(x.remain),'open collection','b',x.r.filter(r=>n(r.remaining_collection_value)>0))}${kpi('Delayed',i(x.del.length),'needs action','r',x.del)}${kpi('Not in Budget',i(not.length),'outside budget','a',not)}</div>${tbl('Owner Financial Summary',rows('retSide'),['owner_name','role','accounts','renewal_value','booked_value','cash_collected','delayed_accounts'])}${tbl('Booked Value Total',x.book,['company_name','rm_owner','csm_owner','product','month','renewal_value','booked_value','collected_value','remaining_collection_value','renewal_status'])}${tbl('Cash Collected',x.cash,['company_name','rm_owner','csm_owner','product','month','renewal_value','booked_value','collected_value','remaining_collection_value','renewal_status'])}${tbl('Delayed',x.del,['company_name','rm_owner','csm_owner','product','month','renewal_value','booked_value','collected_value','remaining_collection_value','renewal_status'])}${tbl('Lost',lost,['company_name','rm_owner','csm_owner','product','month','renewal_value','renewal_status'])}${tbl('Not In Budget',not)}`;
}

function retOwner(name){
  let r=rows('ret').filter(x=>ok(x)&&(norm(x.rm_owner)===norm(name)||norm(x.csm_owner)===norm(name)||norm(x.owner_name)===norm(name)));
  return hero(name,'Retention owner view: renewal rows, action items and financial exposure.',[])
  +`<div class="kpis">${kpi('Accounts',i(r.length),'','b',r)}${kpi('Renewal Value',money(sum(r,'renewal_value')),'','g',r)}${kpi('Booked',money(sum(r,'booked_value')),'','p',r.filter(x=>n(x.booked_value)>0))}${kpi('Cash',money(sum(r,'collected_value')),'','g',r.filter(x=>n(x.collected_value)>0))}${kpi('Delayed',i(r.filter(x=>/delayed/i.test(String(x.renewal_status||x.status||''))).length),'','r',r.filter(x=>/delayed/i.test(String(x.renewal_status||x.status||''))))}</div>${tbl('Owner Renewal Rows',r,['company_name','tier','product','month','renewal_value','booked_value','collected_value','remaining_collection_value','rm_owner','csm_owner','renewal_status','hubspot_search_url'])}`;
}

function features(){
  return hero('Features Plan for Upselling','Company-level feature plan and status.',[])
  +`<div class="grid2">${tbl('Features Plan Summary',rows('upS'))}${tbl('Company Summary',rows('upC'))}</div>`;
}

function pnl(){
  let r=rows('pnl').filter(ok),mm=rows('pnlM').filter(ok),b=rows('pnlB').filter(ok);
  return hero('Executive P&L Dashboard','Booking, cashing, cost breakdown and margin views.',[])
  +`<div class="kpis">${kpi('Booking',money(sum(r,'booking')),'','g',mm)}${kpi('Cashing',money(sum(r,'cashing')),'','b',mm)}${kpi('COGS',money(sum(r,'cogs')),'','r',b)}${kpi('Overheads',money(sum(r,'overheads')),'','a',b)}${kpi('Support Allocation',money(sum(r,'support_allocation')),'','p',b)}${kpi('Total Cost',money(sum(r,'total_cost')),'','r',b)}${kpi('Net Cash',money(sum(r,'net_cash_position')),'','g',mm)}</div><div class="grid2">${tbl('P&L Product Summary',r)}${tbl('Year Comparison',rows('pnlC'))}</div>${tbl('Monthly P&L',mm)}`;
}

function pnlDetails(){
  return hero('P&L Cost Breakdown','COGS, overheads and support allocation by month/product.',[])
  +tbl('Cost Breakdown',rows('pnlB').filter(ok))
  +tbl('Monthly Advanced',rows('pnlM').filter(ok));
}

loadAll();
setInterval(loadAll,300000);
</script>
