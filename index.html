sc(s)}</span>`;return esc(s)}function table(title,rows,cols=null,sub=''){rows=rows||[];cols=cols||Object.keys(rows[0]||{}).slice(0,10);const id=rows.length?cacheRows(rows):'';return `<section class="card"><div class="head"><div><h3>${esc(title)}</h3><p>${rows.length.toLocaleString()} rows${sub?' · '+esc(sub):''}</p></div>${rows.length?`<button class="chip" onclick="openCache('${id}','${esc(title)}','${rows.length.toLocaleString()} rows')">Open All</button>`:''}</div><div class="wrap">${rows.length?`<table><thead><tr>${cols.map(c=>`<th>${esc(c).replaceAll('_',' ')}</th>`).join('')}</tr></thead><tbody>${rows.slice(0,160).map(r=>`<tr>${cols.map(c=>`<td>${cell(r[c],c,r)}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'<div class="empty">No rows found.</div>'}</div></section>`}function health(){const ok=DIAG.filter(x=>x.status==='Loaded').length,bad=DIAG.length-ok;return `<div class="health-row"><span>Loaded Sources</span><b>${ok}</b></div><div class="health-row"><span>Failed Sources</span><b>${bad}</b></div><div class="health-row"><span>Last Refresh</span><b>${S.loadedAt?S.loadedAt.toLocaleTimeString():'—'}</b></div>`}function hero(title,sub,side=''){return `<div class="hero"><section class="panel"><span class="eyebrow">Live Snapshot</span><h1>${esc(title)}</h1><p>${esc(sub)}</p></section><section class="health">${side||health()}</section></div>`}function nav(){let h='<div class="sec">Main</div>';[['acquisition','🎯','Acquisition'],['retention','🛡️','Retention'],['pnl','💰','P&L'],['upsell','✨','Upselling'],['marketing','📣','Marketing'],['quality','🧰','Data Quality']].forEach(([id,ic,label])=>{const active=S.active===id||(id==='acquisition'&&S.active==='acqRep')||(id==='retention'&&S.active==='retRep');h+=`<button class="nav ${active?'active':''}" onclick="setPage('${id}')"><span>${ic}</span><span>${label}</span></button>`});if(S.active==='acquisition'||S.active==='acqRep'){h+='<div class="sec">Acquisition Pages</div>';[['overview','Team Overview'],['kpi','KPI Snapshot'],['rank','Rank A/B Coverage'],['needs','Leads Need Contact'],['pipeline','Pipeline Summary'],['sources','Field Sources']].forEach(([id,label])=>h+=`<button class="nav ${S.active==='acquisition'&&S.acqTab===id?'active':''}" onclick="setAcqTab('${id}')"><span>•</span><span>${label}</span></button>`);h+='<div class="sec">Acquisition Reps</div>';cur('acqSidebar').forEach(r=>h+=`<button class="nav ${S.active==='acqRep'&&S.rep===r.owner_name?'active':''}" onclick="setRep('acqRep','${esc(r.owner_name)}','activity')"><span>●</span><span>${esc(r.owner_name)}<small>${int(r.connected_calls)} connected · ${int(r.meetings_completed)} meetings</small></span><span class="badge">${int(r.connected_calls)}</span></button>`);const deals=cur('acqPipe').filter(r=>r.owner_role==='deals_only'||r.role==='deals_only');if(deals.length){h+='<div class="sec">Deal Owners</div>';deals.forEach(r=>h+=`<button class="nav ${S.active==='acqRep'&&S.rep===r.owner_name?'active':''}" onclick="setRep('acqRep','${esc(r.owner_name)}','deals_only')"><span>◆</span><span>${esc(r.owner_name)}<small>${int(r.open_deals)} open · ${money(r.open_pipeline)}</small></span><span class="badge">${int(r.open_deals)}</span></button>`)}}if(S.active==='retention'||S.active==='retRep'){h+='<div class="sec">Retention Pages</div>';[['team','Team Overview'],['financial','Financial Details']].forEach(([id,label])=>h+=`<button class="nav ${S.active==='retention'&&S.retTab===id?'active':''}" onclick="setRetTab('${id}')"><span>•</span><span>${label}</span></button>`);['RM','CSM'].forEach(role=>{h+=`<div class="sec">Retention ${role}</div>`;cur('retSidebar').filter(r=>r.role===role).forEach(r=>h+=`<button class="nav ${S.active==='retRep'&&S.rep===r.owner_name&&S.repRole===role?'active':''}" onclick="setRep('retRep','${esc(r.owner_name)}','${role}')"><span>●</span><span>${esc(r.owner_name)}<small>${int(r.accounts)} accounts · ${money(r.renewal_value)}</small></span><span class="badge">${int(r.delayed_accounts)}</span></button>`)})}document.getElementById('nav').innerHTML=h}function filters(){const acq=[...cur('acqRank'),...cur('acqRankDetails'),...cur('acqNeeds')],rr=cur('retLogic'),pnl=[...cur('pnl'),...cur('pnlMonthly')];const years=uniq([...rr.map(r=>r.year),...pnl.map(r=>r.year)]),products=uniq([...rr.map(r=>r.product),...pnl.map(r=>r.product),...cur('upsellCompanies').map(r=>r.product_line)]);let h=`<input class="search" value="${esc(S.search)}" oninput="setFilter('search',this.value)" placeholder="Search visible data…"><select class="sel" onchange="setFilter('year',this.value)"><option value="all">All Years</option>${(years.length?years:['2026']).map(y=>`<option ${S.year==y?'selected':''}>${esc(y)}</option>`).join('')}</select>`;if(S.active==='pnl'||S.active==='retention'||S.active==='retRep')h+=`<select class="sel" onchange="setFilter('month',this.value)"><option value="all">All Months</option>${MONTHS.map(m=>`<option ${S.month===m?'selected':''}>${m}</option>`).join('')}</select><select class="sel" onchange="setFilter('product',this.value)"><option value="all">All Products</option>${products.map(p=>`<option ${S.product===p?'selected':''}>${esc(p)}</option>`).join('')}</select>`;if(S.active==='acquisition'||S.active==='acqRep')h+=`<select class="sel" onchange="setFilter('owner',this.value)"><option value="all">All Owners</option>${uniq(acq.map(r=>r.owner_name)).map(o=>`<option ${S.owner===o?'selected':''}>${esc(o)}</option>`).join('')}</select><select class="sel" onchange="setFilter('country',this.value)"><option value="all">All Countries</option>${uniq(acq.map(r=>r.country)).map(c=>`<option ${S.country===c?'selected':''}>${esc(c)}</option>`).join('')}</select><select class="sel" onchange="setFilter('rank',this.value)"><option value="all">All Ranks</option>${uniq(acq.map(r=>r.rank)).map(r=>`<option ${S.rank===r?'selected':''}>${esc(r)}</option>`).join('')}</select>`;h+=`<button class="btn alt" onclick="resetFilters()">Reset filters</button>`;document.getElementById('filters').innerHTML=h}function render(){nav();filters();const titles={acquisition:['Acquisition','Team overview, KPI snapshot, Rank A/B coverage, needs contact, pipeline, and field sources.'],acqRep:[`Acquisition · ${S.rep||''}`,'Rep-level acquisition details.'],retention:['Retention','Retention team, financials, RM/CSM views.'],retRep:[`Retention ${S.repRole||''} · ${S.rep||''}`,'Rep-level renewal action details.'],pnl:['P&L Advanced','Booking, cashing, COGS, overheads, support allocation, total cost and margins.'],upsell:['Upselling / Features Plan','Company-level feature plan and status.'],marketing:['Marketing','Marketing overview and source split.'],quality:['Data Quality','Sources, sync and data health.']};const [t,s]=titles[S.active]||titles.acquisition;$('title').textContent=t;$('subtitle').textContent=s;let html='';if(S.active==='acquisition')html=renderAcq();else if(S.active==='acqRep')html=renderAcqRep();else if(S.active==='retention')html=renderRetention();else if(S.active==='retRep')html=renderRetRep();else if(S.active==='pnl')html=renderPnl();else if(S.active==='upsell')html=renderUpsell();else if(S.active==='marketing')html=hero('Marketing','Marketing overview and source split.')+table('Marketing Overview',cur('marketing'));else if(S.active==='quality')html=hero('Data Quality & Sync Monitor','Source status, sync runs and failed views.',health())+table('Source Diagnostics',DIAG)+table('Sync State',cur('syncState'))+table('Sync Runs',cur('syncRuns'));$('content').innerHTML=html}function acqTeam(){const t=cur('acqTeam')[0]||{},p=cur('acqPipe');return {t,open:sum(p,'open_deals'),openVal:sum(p,'open_pipeline'),wonM:sum(p,'won_mtd')||sum(p,'won_deals'),lostM:sum(p,'lost_mtd')||sum(p,'lost_deals'),wonY:sum(p,'won_ytd')||sum(p,'won_deals'),lostY:sum(p,'lost_ytd')||sum(p,'lost_deals')}}function acqKpis(){const a=acqTeam(),t=a.t,details=activeAcq(cur('acqRankDetails')),needs=activeAcq(cur('acqNeeds')),rankA=details.filter(r=>['a','rank a'].includes(norm(r.rank))),rankB=details.filter(r=>['b','rank b'].includes(norm(r.rank))),openDeals=cur('acqPipeDetails').filter(r=>r.deal_status==='open'),wonDeals=cur('acqPipeDetails').filter(r=>r.deal_status==='won'),lostDeals=cur('acqPipeDetails').filter(r=>r.deal_status==='lost');return `<div class="kpis">${kpi('Companies',int(t.total_companies),'Allowed acquisition owners','green',details)}${kpi('Contacted',int(t.contacted_companies),'Same owner connected call OR completed meeting','cyan',details.filter(r=>!r.needs_contact))}${kpi('Needs Contact',int(t.needs_contact_companies),'No connected call and no completed meeting','red',needs)}${kpi('Rank A Coverage',pct(t.rank_a_coverage_pct),`${int(t.rank_a_contacted)} / ${int(t.rank_a_total)} contacted`,'green',rankA)}${kpi('Rank B Coverage',pct(t.rank_b_coverage_pct),`${int(t.rank_b_contacted)} / ${int(t.rank_b_total)} contacted`,'blue',rankB)}${kpi('Open Pipeline',money(a.openVal),`${int(a.open)} open deals`,'purple',openDeals)}${kpi('Won MTD',int(a.wonM),`${int(a.wonY)} won YTD`,'green',wonDeals)}${kpi('Lost MTD',int(a.lostM),`${int(a.lostY)} lost YTD`,'red',lostDeals)}</div>`}function sectionTabs(){return `<section class="card"><div class="head"><div><h3>Acquisition Sections</h3><p>Old-style sections, Supabase-backed</p></div><div class="tabs">${[['overview','Overview'],['kpi','KPI Snapshot'],['rank','Rank A/B'],['needs','Needs Contact'],['pipeline','Pipeline'],['sources','Field Sources']].map(([id,label])=>`<button class="chip ${S.acqTab===id?'active':''}" onclick="setAcqTab('${id}')">${label}</button>`).join('')}</div></div></section>`}function renderAcq(){const top=hero('Acquisition Team Overview','Owner-scoped activity: calls and meetings count only for the displayed company owner. Fadi/Faizan appear as deal owners only.')+sectionTabs()+acqKpis();if(S.acqTab==='kpi')return top+renderAcqKpi();if(S.acqTab==='rank')return top+renderRank();if(S.acqTab==='needs')return top+renderNeeds();if(S.acqTab==='pipeline')return top+renderPipeline();if(S.acqTab==='sources')return top+table('Acquisition Field Sources',cur('acqSources'));return top+`<div class="grid2">${table('Acquisition Reps',cur('acqSidebar'),['owner_name','hubspot_owner_id','calls_logged','connected_calls','meetings_logged','meetings_completed','last_activity_at'])}${table('Pipeline by Owner',cur('acqPipe'),['owner_name','owner_role','open_deals','open_pipeline','won_deals','won_amount','lost_deals','lost_amount'])}</div><div class="grid2">${table('Rank A/B Coverage',activeAcq(cur('acqRank')),['rank','country','owner_name','total_companies','touched_companies','untouched_companies','needs_contact','connected_calls','completed_meetings','coverage_pct'])}${table('Needs Contact',activeAcq(cur('acqNeeds')),['company_name','owner_name','country','rank','source_type','connected_calls','completed_meetings','last_touch_at','hubspot_url'])}</div>`}function renderAcqKpi(){const rows=cur('acqKpi'),cards=rows.map(r=>`<section class="card"><div class="head"><div><h3>${esc(String(r.period).toUpperCase())}</h3><p>Team activity snapshot</p></div></div><div class="kpis" style="padding:14px;margin:0;grid-template-columns:repeat(5,minmax(0,1fr))">${kpi('Calls Logged',int(r.calls_logged),'','blue')}${kpi('Connected Calls',int(r.connected_calls),'','cyan')}${kpi('Connection Rate',pct(r.connection_rate),'','green')}${kpi('Meetings Logged',int(r.meetings_logged),'','purple')}${kpi('Meetings Completed',int(r.meetings_completed),'','green')}</div></section>`).join('');return cards+table('Rep KPI Periods',cur('acqRepKpi'),['owner_name','calls_yesterday','connected_yesterday','conn_rate_yesterday','calls_mtd','connected_mtd','conn_rate_mtd','calls_ytd','connected_ytd','conn_rate_ytd','completed_mtd','completed_ytd'])}function renderRank(){const details=activeAcq(cur('acqRankDetails'));return `<div class="grid2">${table('Rank A/B Coverage by Country & Owner',activeAcq(cur('acqRank')),['rank','country','owner_name','total_companies','touched_companies','untouched_companies','needs_contac s in stage','amber',cur('acqStuck'))}${kpi('Cold Deals',int(cur('acqCold').length),'21+ days since modified','red',cur('acqCold'))}</div><div class="grid2">${table('Pipeline by Owner',cur('acqPipe'),['owner_name','owner_role','open_deals','open_pipeline','won_deals','won_amount','lost_deals','lost_amount'])}${table('Pipeline by Stage',cur('acqPipeStage'),['dealstage','deals','amount','open_deals','open_amount'])}</div>${table('Deal Details',cur('acqPipeDetails'),['dealname','owner_name','owner_role','dealstage','deal_status','amount','product','closedate','hubspot_url'])}`}function renderAcqRep(){const name=S.rep,dealOnly=S.repRole==='deals_only';const repK=cur('acqRepKpi').find(r=>norm(r.owner_name)===norm(name))||{},rank=activeAcq(cur('acqRank')).filter(r=>norm(r.owner_name)===norm(name)),details=activeAcq(cur('acqRankDetails')).filter(r=>norm(r.owner_name)===norm(name)),needs=activeAcq(cur('acqNeeds')).filter(r=>norm(r.owner_name)===norm(name)),deals=cur('acqPipeDetails').filter(r=>norm(r.owner_name)===norm(name));if(dealOnly)return hero(`Deal Owner · ${name}`,'Acquisition deal owner only: pipeline, won/lost/open deals. No activity coverage is shown.')+`<div class="kpis">${kpi('Open Deals',int(deals.filter(r=>r.deal_status==='open').length),money(sum(deals.filter(r=>r.deal_status==='open'),'amount')),'purple',deals.filter(r=>r.deal_status==='open'))}${kpi('Won Deals',int(deals.filter(r=>r.deal_status==='won').length),money(sum(deals.filter(r=>r.deal_status==='won'),'amount')),'green',deals.filter(r=>r.deal_status==='won'))}${kpi('Lost Deals',int(deals.filter(r=>r.deal_status==='lost').length),money(sum(deals.filter(r=>r.deal_status==='lost'),'amount')),'red',deals.filter(r=>r.deal_status==='lost'))}</div>${table('Deal Owner Pipeline',deals,['dealname','dealstage','deal_status','amount','product','closedate','hubspot_url'])}`;return hero(`Acquisition Rep · ${name}`,'Activity, coverage, needs contact and pipeline for this rep only.')+`<div class="kpis">${kpi('Calls rm(r.csm_owner)===norm(S.rep));return hero(`Retention ${S.repRole} · ${S.rep}`,'Filtered renewal rows and action items.')+table('Rep Renewal Rows',rows,['company_name','product','month','renewal_value','booked_value','collected_value','booked_not_cash_value','remaining_collection_value','rm_owner','csm_owner','renewal_status','hubspot_search_url'])}function renderPnl(){const rows=activePnl(cur('pnl')),monthly=activePnl(cur('pnlMonthly')),breakdown=activePnl(cur('pnlBreakdown')),tot={booking:sum(rows,'booking'),cashing:sum(rows,'cashing'),cogs:sum(rows,'cogs'),overheads:sum(rows,'overheads'),support:sum(rows,'support_allocation'),cost:sum(rows,'total_cost'),net:sum(rows,'net_cash_position')};return hero('P&L Advanced','Booking, cashing, cost breakdown and year comparison.')+`<div class="kpis">${kpi('Booking',money(tot.booking),'','green',monthly)}${kpi('Cashing',money(tot.cashing),'','cyan',monthly)}${kpi('COGS',money(tot.cogs),'','red',breakdown)}${kpi('Overheads',money(tot.overheads),'','amber',breakdown)}${kpi('Support Allocate',money(tot.support),'','purple',breakdown)}${kpi('Total Cost',money(tot.cost),'','red',breakdown)}${kpi('Net Cash',money(tot.net),'','blue',monthly)}</div><div class="grid2">${table('P&L Product Summary',rows)}${table('Year Comparison',cur('pnlCompare'))}</div><div class="grid2">${table('Monthly P&L',monthly)}${table('Cost Breakdown',breakdown)}</div>`}function renderUpsell(){return hero('Upselling / Features Plan','Company-level feature plan and status.')+`<div class="grid2">${table('Upsell Summary',cur('upsellSummary'))}${table('Upsell Companies',cur('upsellCompanies'))}</div>`}function openCache(id,title,sub){openDrawer(title,CACHE[id]||[],sub)}function openDrawer(title,rows,sub){$('dt').textContent=title;$('ds').textContent=sub||`${(rows||[]).length} rows`;$('db').innerHTML=table(title,rows||[]).replace('<section class="card">','<section class="card" style="box-shadow:none;border:0;border-radius:0">');$('drawer').classList.add('open')}function closeDrawer(){$('drawer').classList.remove('open')}loadAll();</script></body></html>
