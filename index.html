<style>
:root{

*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{min-height:100vh;font-family:var(--font);color:var(--text);background:radial-gradient(circle at 10% 8%,rgba(22,163,74,.18),transparent 30%),radial-gradient(circle at 86% 14%,rgba(8,145,178,.13),transparent 28%),radial-gradient(circle at 72% 86%,rgba(217,119,6,.08),transparent 26%),linear-gradient(135deg,#f8fcfa 0%,#eef6f1 46%,#e7f1ec 100%);-webkit-font-smoothing:antialiased;overflow-x:hidden}body:after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.16;background-image:linear-gradient(rgba(15,122,60,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(15,122,60,.18) 1px,transparent 1px);background-size:36px 36px;mask-image:radial-gradient(circle at center,black 14%,transparent 78%)}button,input,select{font-family:inherit}button{cursor:pointer}::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(38,60,49,.18);border-radius:99px}.app{display:flex;min-height:100vh}.sidebar{position:fixed;inset:0 auto 0 0;width:var(--side);padding:14px 12px;display:flex;flex-direction:column;gap:10px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.34)),radial-gradient(circle at 20% 0%,rgba(22,163,74,.12),transparent 34%);border-right:1px solid var(--line);box-shadow:inset -1px 0 rgba(255,255,255,.55),0 18px 55px rgba(17,47,31,.08);backdrop-filter:blur(26px) saturate(165%);z-index:100;overflow:auto}.brand{display:flex;align-items:center;gap:12px;padding:12px 10px 16px;border-bottom:1px solid var(--line)}.brand-mark{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:24px;background:linear-gradient(135deg,var(--green),var(--cyan));box-shadow:0 14px 32px rgba(22,163,74,.24)}.brand-name{font-weight:900;font-size:16px;letter-spacing:-.03em}.brand-sub{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.09em;margin-top:2px}.nav-section{padding:14px 10px 4px;font-size:9px;font-weight:900;color:rgba(38,60,49,.45);text-transform:uppercase;letter-spacing:.16em}.nav{display:flex;align-items:center;gap:10px;width:100%;min-height:38px;border:1px solid transparent;border-radius:15px;background:transparent;color:var(--text2);font-size:12px;font-weight:800;text-align:left;padding:8px 10px;transition:.15s}.nav:hover{background:rgba(255,255,255,.58);border-color:var(--line);transform:translateY(-1px)}.nav.active{color:var(--green2);background:linear-gradient(135deg,rgba(255,255,255,.92),rgba(255,255,255,.58));border-color:rgba(22,163,74,.2);box-shadow:0 10px 24px rgba(17,47,31,.08),inset 0 1px rgba(255,255,255,.8)}.nav-icon{width:20px;text-align:center;font-size:15px}.nav-badge{margin-left:auto;min-width:22px;text-align:center;font-family:var(--mono);font-size:10px;color:#b91c1c;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.16);border-radius:999px;padding:3px 7px}.nav-sub{display:block;font-size:9px;color:var(--muted);font-weight:800;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}.sidebar-foot{margin-top:auto;padding:10px;border-top:1px solid var(--line);font-size:10px;color:var(--muted);font-weight:800;line-height:1.6}.main{margin-left:var(--side);width:calc(100% - var(--side));padding:14px 18px 60px}.topbar{position:sticky;top:14px;z-index:50;display:flex;align-items:center;gap:12px;justify-content:space-between;padding:14px 18px;margin-bottom:14px;border:1px solid var(--line);border-radius:var(--r2);background:linear-gradient(180deg,rgba(255,255,255,.78),rgba(255,255,255,.48));box-shadow:0 10px 30px rgba(17,47,31,.08);backdrop-filter:blur(18px) saturate(160%)}.top-title{font-size:18px;font-weight:900;letter-spacing:-.04em}.top-sub{font-size:11px;color:var(--muted);font-weight:700;margin-top:3px}.top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}.live{display:flex;align-items:center;gap:7px;border:1px solid rgba(22,163,74,.18);background:rgba(22,163,74,.09);color:var(--green2);border-radius:999px;font-size:10px;font-weight:900;padding:7px 12px}.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.8s ease infinite}@keyframes pulse{50%{opacity:.4;transform:scale(.78)}}.btn{border:0;border-radius:14px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;font-size:12px;font-weight:900;padding:10px 14px;box-shadow:0 12px 26px rgba(22,163,74,.22);transition:.15s}.btn:hover{transform:translateY(-1px);box-shadow:0 16px 32px rgba(22,163,74,.30)}.btn.secondary{background:rgba(255,255,255,.56);color:var(--text2);border:1px solid var(--line);box-shadow:none}.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.select{height:38px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.68);padding:0 12px;color:var(--text2);font-size:12px;font-weight:850;outline:none}.hero{display:grid;grid-template-columns:1.25fr .75fr;gap:14px;margin-bottom:14px}.hero-card,.card,.kpi,.mini-card,.drawer-card{background:linear-gradient(180deg,rgba(255,255,255,.76),rgba(255,255,255,.46));border:1px solid var(--line);border-radius:var(--r2);box-shadow:var(--shadow);backdrop-filter:blur(18px) saturate(155%)}.hero-card{padding:22px 24px;position:relative;overflow:hidden}.hero-card:after{content:"";position:absolute;right:-60px;top:-80px;width:220px;height:220px;border-radius:50%;background:var(--green);opacity:.06}.eyebrow{font-size:10px;font-weight:950;letter-spacing:.14em;text-transform:uppercase;color:var(--green2)}.hero h2{font-size:28px;line-height:1.1;font-weight:950;letter-spacing:-.06em;margin-top:8px}.hero p{font-size:13px;color:var(--muted);font-weight:650;line-height:1.7;margin-top:8px;max-width:780px}.health-card{padding:18px;display:grid;gap:10px}.health-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.44)}.health-k{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:900}.health-v{font-family:var(--mono);font-size:13px;font-weight:900}.kpi-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px;margin-bottom:14px}.kpi{min-height:112px;padding:15px 14px;border-top:4px solid var(--tone,var(--green));text-align:left;transition:.15s}.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow2)}.kpi.clickable:after{content:"Open details";float:right;font-size:8px;font-weight:950;text-transform:uppercase;color:var(--tone,var(--green));opacity:.65}.kpi-value{font-family:var(--mono);font-size:25px;font-weight:900;color:var(--tone,var(--green));line-height:1}.kpi-title{font-size:9px;text-transform:uppercase;letter-spacing:.105em;color:var(--muted);font-weight:950;margin-top:9px}.kpi-sub{font-size:10px;color:var(--text2);font-weight:750;margin-top:5px;line-height:1.4}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{overflow:hidden;margin-bottom:14px}.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.42)}.card-title{font-size:12px;font-weight:950;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:8px}.card-sub{font-size:10px;color:var(--muted);font-weight:800;margin-top:4px}.tabs{display:flex;gap:7px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:rgba(255,255,255,.54);color:var(--text2);border-radius:999px;padding:7px 10px;font-size:10px;font-weight:900}.chip.active{background:rgba(22,163,74,.10);border-color:rgba(22,163,74,.22);color:var(--green2)}.table-wrap{overflow:auto;max-height:650px}.table{width:100%;border-collapse:collapse}.table th{position:sticky;top:0;background:rgba(255,255,255,.72);z-index:2;font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:950;text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}.table td{font-size:12px;color:var(--text2);font-weight:650;padding:11px 12px;border-bottom:1px solid rgba(22,64,42,.08);vertical-align:top}.table tr:hover td{background:rgba(22,163,74,.045)}.num{font-family:var(--mono);font-weight:850}.badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 8px;font-size:9px;font-weight:950;border:1px solid var(--line);white-space:nowrap}.badge.green{color:var(--green2);background:rgba(22,163,74,.09);border-color:rgba(22,163,74,.18)}.badge.red{color:var(--red);background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.16)}.badge.amber{color:var(--amber);background:rgba(217,119,6,.08);border-color:rgba(217,119,6,.16)}.badge.blue{color:var(--blue);background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.16)}.empty{padding:26px;text-align:center;color:var(--muted);font-size:13px;font-weight:700}.error{border-left:4px solid var(--red);padding:12px 14px;margin-bottom:12px;background:rgba(220,38,38,.07);border-radius:16px;color:#991b1b;font-size:12px;font-weight:800}.loading{min-height:55vh;display:grid;place-items:center;color:var(--muted);font-weight:900}.spinner{width:42px;height:42px;border-radius:50%;border:4px solid rgba(22,64,42,.10);border-top-color:var(--green);animation:spin .8s linear infinite;margin:auto auto 14px}@keyframes spin{to{transform:rotate(360deg)}}.drawer{position:fixed;inset:0;z-index:500;display:none}.drawer.open{display:block}.drawer-bg{position:absolute;inset:0;background:rgba(17,47,31,.28);backdrop-filter:blur(9px)}.drawer-card{position:absolute;right:18px;top:18px;bottom:18px;width:min(1080px,calc(100vw - 36px));overflow:hidden;display:flex;flex-direction:column}.drawer-head{display:flex;justify-content:space-between;gap:14px;padding:16px 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.56)}.drawer-title{font-size:16px;font-weight:950}.drawer-sub{font-size:11px;color:var(--muted);font-weight:750;margin-top:4px}.drawer-body{overflow:auto;flex:1}.close{width:36px;height:36px;border:1px solid var(--line);background:rgba(255,255,255,.55);border-radius:12px;color:var(--text2);font-weight:950}.mobile-menu{display:none}.hidden{display:none!important}@media(max-width:1250px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.hero,.grid2,.grid3{grid-template-columns:1fr}}@media(max-width:760px){:root{--side:0px}.sidebar{transform:translateX(-102%);transition:.2s}.sidebar.open{transform:translateX(0);width:290px}.main{margin-left:0;width:100%;padding:10px}.mobile-menu{display:inline-flex}.topbar{top:8px;border-radius:20px}.kpi-grid{grid-template-columns:1fr 1fr}.hero h2{font-size:22px}.top-actions{justify-content:flex-start}.drawer-card{right:8px;top:8px;bottom:8px;width:calc(100vw - 16px)}}@media(max-width:520px){.kpi-grid{grid-template-columns:1fr}.hero-card{padding:18px}.brand{padding-right:44px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">T</div>
      <div><div class="brand-name">Talentera</div><div class="brand-sub">Sales Command Center</div></div>
    </div>
    <div id="sideNav"></div>
    <div class="sidebar-foot"><strong>Supabase Live</strong><br><span id="sideSync">Loading sync state…</span></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <button class="btn secondary mobile-menu" onclick="toggleSidebar()">☰</button>
      <div><div class="top-title" id="pageTitle">Talentera Command Center</div><div class="top-sub" id="pageSub">Glass dashboard · Supabase views · n8n sync engine</div></div>
      <div class="top-actions"><div class="live"><span class="dot"></span><span id="liveText">Connecting</span></div><button class="btn secondary" onclick="openDrawer('Loaded Data Sources', DATA_DIAGNOSTICS, 'Supabase read status by table/view')">Sources</button><button class="btn" onclick="loadAll(true)">Refresh</button></div>
    </header>
    <section class="filters" id="filters"></section>
    <section id="appContent"><div class="loading"><div><div class="spinner"></div>Loading Supabase dashboard…</div></div></section>
  </main>
</div>
<div class="drawer" id="drawer"><div class="drawer-bg" onclick="closeDrawer()"></div><div class="drawer-card"><div class="drawer-head"><div><div class="drawer-title" id="drawerTitle">Details</div><div class="drawer-sub" id="drawerSub"></div></div><button class="close" onclick="closeDrawer()">✕</button></div><div class="drawer-body" id="drawerBody"></div></div></div>
<script>
const SUPABASE_URL='https://czaxtwbmborxwzaboqxl.supabase.co';
const SUPABASE_KEY='sb_publishable_uVUdpVWggu1WvkSKCAi51w_9qsb-AjX';
const client=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const VIEW_LIMIT=5000;
const VIEWS={
  dashboardKpis:'vw_dashboard_global_kpis',
  retentionSummary:'vw_retention_dashboard_summary',
  retentionOwners:'vw_retention_owner_summary',
  retentionLogic:'vw_retention_renewal_logic',
  retentionNotBudget:'vw_retention_not_in_budget',
  acqSummary:'vw_acquisition_dashboard_summary',
  acqCountry:'vw_acquisition_country_coverage',
  acqOwner:'vw_acquisition_owner_coverage',
  acqDeals:'vw_acquisition_deal_summary',
  acqNeeds:'vw_acquisition_needs_contact',
  ownerPeriods:'vw_owner_activity_periods',
  pipeline:'vw_deal_pipeline_summary',
  pnlSummary:'vw_pnl_dashboard_summary',
  pnlMonthly:'vw_pnl_monthly',
  upsellSummary:'vw_features_plan_dashboard_summary',
  upsellCompanies:'vw_features_plan_company_summary',
  marketingOverview:'vw_marketing_overview',
  marketingSource:'vw_marketing_source_region',
  quality:'vw_data_quality_dashboard',
  syncState:'sync_state',
  syncRuns:'sync_runs'
};
const state={active:'executive',year:'2026',product:'all',rep:null,actionTab:'delayed',data:{},errors:{},loadedAt:null};
let DATA_DIAGNOSTICS=[];
function byId(id){return document.getElementById(id)}
function num(v){const n=Number(v);return Number.isFinite(n)?n:0}
function sum(rows,key){return rows.reduce((a,r)=>a+num(r[key]),0)}
function money(v){const n=num(v);const sign=n<0?'-':'';const x=Math.abs(n);if(x>=1000000)return sign+'$'+(x/1000000).toFixed(1)+'M';if(x>=1000)return sign+'$'+Math.round(x).toLocaleString();return sign+'$'+Math.round(x).toLocaleString()}
function int(v){return Math.round(num(v)).toLocaleString()}
function pct(v){return (num(v)||0).toFixed(1)+'%'}
function tone(c){return {'green':'--green','cyan':'--cyan','blue':'--blue','purple':'--purple','amber':'--amber','red':'--red'}[c]||'--green'}
function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function norm(v){return String(v??'').trim().toLowerCase()}
function hasText(row,words){const s=Object.values(row||{}).join(' ').toLowerCase();return words.some(w=>s.includes(w))}
function currentRows(name){return state.data[name]||[]}
function applyCommonFilters(rows){return rows.filter(r=>{const y=String(r.year??r.renewal_year??'');const p=String(r.product??r.product_line??'').toLowerCase();if(state.year!=='all'&&y&&y!==state.year)return false;if(state.product!=='all'&&p&&p!==state.product.toLowerCase())return false;return true})}
function aggregateSummary(rows){const r=applyCommonFilters(rows);return {accounts:sum(r,'accounts'),renewal_value:sum(r,'renewal_value'),booked_value:sum(r,'booked_value'),cash_collected:sum(r,'cash_collected'),booked_not_cash:sum(r,'booked_not_cash'),remaining_collection:sum(r,'remaining_collection'),upcoming_accounts:sum(r,'upcoming_accounts'),delayed_accounts:sum(r,'delayed_accounts'),lost_accounts:sum(r,'lost_accounts'),renewed_late_accounts:sum(r,'renewed_late_accounts'),cashed_accounts:sum(r,'cashed_accounts'),cash_collection_pct:sum(r,'renewal_value')?sum(r,'cash_collected')/sum(r,'renewal_value')*100:0,booking_coverage_pct:sum(r,'renewal_value')?sum(r,'booked_value')/sum(r,'renewal_value')*100:0}}
async function fetchView(key,name,limit=VIEW_LIMIT){try{const {data,error}=await client.from(name).select('*').limit(limit);if(error)throw error;state.data[key]=data||[];state.errors[key]=null;return data||[]}catch(e){state.data[key]=[];state.errors[key]=e.message||String(e);return []}}
async function loadAll(manual=false){byId('liveText').textContent=manual?'Refreshing':'Connecting';const tasks=Object.entries(VIEWS).map(([k,v])=>fetchView(k,v,k==='syncRuns'?80:VIEW_LIMIT));await Promise.all(tasks);state.loadedAt=new Date();DATA_DIAGNOSTICS=Object.entries(VIEWS).map(([k,v])=>({source:k,view:v,rows:(state.data[k]||[]).length,status:state.errors[k]?'Failed':'Loaded',error:state.errors[k]||''}));byId('liveText').textContent='Live';const sync=currentRows('syncState');byId('sideSync').textContent=sync.length?`${sync.length} sync jobs monitored · ${state.loadedAt.toLocaleTimeString()}`:`Updated ${state.loadedAt.toLocaleTimeString()}`;renderAll()}
function setActive(active,rep){state.active=active;state.rep=rep||null;state.actionTab='delayed';renderAll();if(innerWidth<760)byId('sidebar').classList.remove('open')}
function setFilter(k,v){state[k]=v;renderAll()}
function toggleSidebar(){byId('sidebar').classList.toggle('open')}
function products(){const set=new Set();[...currentRows('retentionSummary'),...currentRows('pnlMonthly'),...currentRows('upsellCompanies')].forEach(r=>{const p=r.product||r.product_line;if(p)set.add(String(p))});return [...set].sort()}
function years(){const set=new Set(['2026']);Object.values(state.data).flat().forEach(r=>{if(r&&r.year)set.add(String(r.year))});return [...set].sort()}
function repItems(){const map=new Map();currentRows('retentionOwners').forEach(r=>{['rm_owner','csm_owner','owner_name'].forEach(k=>{const name=String(r[k]||'').trim();if(!name||name.toLowerCase()==='unknown')return;const o=map.get(name)||{name,accounts:0,delayed:0,value:0,cash:0};o.accounts+=num(r.accounts);o.delayed+=num(r.delayed_accounts);o.value+=num(r.renewal_value);o.cash+=num(r.cash_collected);map.set(name,o)})});return [...map.values()].sort((a,b)=>b.delayed-a.delayed||b.value-a.value)}
function renderSidebar(){const reps=repItems();const nav=[['executive','🏠','Executive Overview'],['acquisition','🎯','Acquisition'],['retentionTeam','🛡️','Retention'],['pnl','💰','P&L'],['upsell','✨','Upselling'],['marketing','📣','Marketing'],['quality','🧰','Data Quality']];let h='<div class="nav-section">Main</div>';nav.forEach(([id,ic,label])=>{h+=`<button class="nav ${state.active===id?'active':''}" onclick="setActive('${id}')"><span class="nav-icon">${ic}</span><span>${label}</span></button>`});h+='<div class="nav-section">Retention</div>';h+=`<button class="nav ${state.active==='retentionTeam'?'active':''}" onclick="setActive('retentionTeam')"><span class="nav-icon">📊</span><span>Team Overview<span class="nav-sub">Budget · Booked · Cash</span></span></button>`;h+=`<button class="nav ${state.active==='retentionFinancial'?'active':''}" onclick="setActive('retentionFinancial')"><span class="nav-icon">📘</span><span>Financial Details<span class="nav-sub">Budget vs Booking vs Cash</span></span></button>`;h+='<div class="nav-section">Retention Reps</div>';if(!reps.length)h+='<div class="empty" style="padding:12px">No reps loaded</div>';reps.forEach(r=>{h+=`<button class="nav ${state.active==='retentionRep'&&state.rep===r.name?'active':''}" onclick="setActive('retentionRep','${esc(r.name)}')"><span class="nav-icon">●</span><span>${esc(r.name)}<span class="nav-sub">${int(r.accounts)} accounts · ${money(r.value)}</span></span><span class="nav-badge">${int(r.delayed)}</span></button>`});byId('sideNav').innerHTML=h}
function renderFilters(){const p=products();let h=`<select class="select" onchange="setFilter('year',this.value)"><option value="all">All Years</option>${years().map(y=>`<option ${state.year===y?'selected':''} value="${esc(y)}">${esc(y)}</option>`).join('')}</select>`;h+=`<select class="select" onchange="setFilter('product',this.value)"><option value="all">All Products</option>${p.map(x=>`<option ${state.product===x?'selected':''} value="${esc(x)}">${esc(x)}</option>`).join('')}</select>`;h+=`<button class="btn secondary" onclick="setFilter('year','2026');setFilter('product','all')">Reset filters</button>`;byId('filters').innerHTML=h}
function kpi(title,value,sub,t='green',rows=null){const js=rows?` onclick="openDrawer('${esc(title)}', getDrawerRows('${rows}'), '${esc(sub||'Click-through details')}')"`:'';return `<button class="kpi ${rows?'clickable':''}" style="--tone:var(${tone(t)})"${js}><div class="kpi-value">${value}</div><div class="kpi-title">${esc(title)}</div>${sub?`<div class="kpi-sub">${esc(sub)}</div>`:''}</button>`}
function table(title,rows,cols=null,sub=''){rows=rows||[];const columns=cols||Object.keys(rows[0]||{}).slice(0,9);return `<section class="card"><div class="card-head"><div><div class="card-title">${esc(title)}</div><div class="card-sub">${rows.length.toLocaleString()} rows${sub?' · '+esc(sub):''}</div></div>${rows.length?`<button class="chip" onclick="openDrawer('${esc(title)}', TABLE_CACHE['${cacheRows(rows)}'], '${rows.length.toLocaleString()} total rows')">Open All</button>`:''}</div><div class="table-wrap">${rows.length?`<table class="table"><thead><tr>${columns.map(c=>`<th>${esc(c).replaceAll('_',' ')}</th>`).join('')}</tr></thead><tbody>${rows.slice(0,120).map(r=>`<tr>${columns.map(c=>`<td>${formatCell(r[c],c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`:`<div class="empty">No rows found.</div>`}</div></section>`}
const TABLE_CACHE={};let cacheId=0;function cacheRows(rows){const id='r'+(++cacheId);TABLE_CACHE[id]=rows;return id}
function formatCell(v,key){if(v===null||v===undefined||v==='')return '—';if(typeof v==='number')return `<span class="num">${int(v)}</span>`;const s=String(v);if(key&&/(value|amount|revenue|cash|booked|cost|profit|collection)/i.test(key))return `<span class="num">${money(v)}</span>`;if(key&&/(pct|percent|rate)/i.test(key))return `<span class="num">${pct(v)}</span>`;if(/lost|delayed|risk|churn/i.test(s))return `<span class="badge red">${esc(s)}</span>`;if(/expected|upcoming|pending|not in budget/i.test(s))return `<span class="badge amber">${esc(s)}</span>`;if(/cash|booked|renewed|active|completed|loaded|success/i.test(s))return `<span class="badge green">${esc(s)}</span>`;if(/^https?:\/\//.test(s))return `<a class="badge blue" target="_blank" href="${esc(s)}">Open</a>`;return esc(s)}
function renderAll(){renderSidebar();renderFilters();const titles={executive:['Executive Overview','One live command center for acquisition, retention, P&L, upselling, marketing, and data quality.'],acquisition:['Acquisition Intelligence','Country coverage, owner performance, pipeline, needs contact, and outreach.'],retentionTeam:['Retention Team Overview','Budget, booking, cash collection, delayed accounts, and renewal actions.'],retentionFinancial:['Retention Financial Details','Budget vs booking vs collection with not-in-budget visibility.'],retentionRep:[`Retention · ${state.rep||''}`,'Rep-level renewal, cash, delayed and action details.'],pnl:['P&L','Revenue, COGS, overheads, super allocation, cost and profitability.'],upsell:['Upselling / Features Plan','Features plan grouped by company with proposal, interest and value tracking.'],marketing:['Marketing','Marketing source, campaign and funnel visibility from Supabase.'],quality:['Data Quality & Sync Monitor','Sync runs, failed views, missing data and dashboard health.']};const [t,s]=titles[state.active]||titles.executive;byId('pageTitle').textContent=t;byId('pageSub').textContent=s;let html='';if(state.errors.retentionSummary&&state.active.includes('retention'))html+=`<div class="error">Retention source error: ${esc(state.errors.retentionSummary)}</div>`;if(state.active==='executive')html+=renderExecutive();if(state.active==='acquisition')html+=renderAcquisition();if(state.active==='retentionTeam')html+=renderRetentionTeam();if(state.active==='retentionFinancial')html+=renderRetentionFinancial();if(state.active==='retentionRep')html+=renderRetentionRep(state.rep);if(state.active==='pnl')html+=renderPnl();if(state.active==='upsell')html+=renderUpsell();if(state.active==='marketing')html+=renderMarketing();if(state.active==='quality')html+=renderQuality();byId('appContent').innerHTML=html}
function hero(title,sub,side=''){return `<div class="hero"><div class="hero-card"><span class="eyebrow">Live Snapshot</span><h2>${esc(title)}</h2><p>${esc(sub)}</p></div><div class="health-card">${side||renderHealthRows()}</div></div>`}
function renderHealthRows(){const loaded=DATA_DIAGNOSTICS.filter(x=>x.status==='Loaded').length,failed=DATA_DIAGNOSTICS.filter(x=>x.status==='Failed').length;return `<div class="health-row"><span class="health-k">Loaded Sources</span><span class="health-v">${loaded}</span></div><div class="health-row"><span class="health-k">Failed Sources</span><span class="health-v">${failed}</span></div><div class="health-row"><span class="health-k">Last Refresh</span><span class="health-v">${state.loadedAt?state.loadedAt.toLocaleTimeString():'—'}</span></div>`}
function renderExecutive(){const r=aggregateSummary(currentRows('retentionSummary'));const g=currentRows('dashboardKpis')[0]||{};return hero('Talentera Command Center','Management view for sales, retention, revenue, upselling and operational health.',`<div class="health-row"><span class="health-k">Companies</span><span class="health-v">${int(g.total_companies||g.companies)}</span></div><div class="health-row"><span class="health-k">Contacts</span><span class="health-v">${int(g.total_contacts||g.contacts)}</span></div><div class="health-row"><span class="health-k">Coverage</span><span class="health-v">${pct(g.coverage_rate||g.coverage_percent)}</span></div>`)+`<div class="kpi-grid">${kpi('Renewal Value',money(r.renewal_value),'Retention budget','green')}${kpi('Cash Collected',money(r.cash_collected),pct(r.cash_collection_pct)+' collection','cyan')}${kpi('Booked Value',money(r.booked_value),pct(r.booking_coverage_pct)+' coverage','blue')}${kpi('Booked Not Cash',money(r.booked_not_cash),'Collection risk','amber')}${kpi('Delayed Accounts',int(r.delayed_accounts),'Renewal action needed','red')}${kpi('Data Issues',int(currentRows('quality').length),'Quality monitor','purple')}</div><div class="grid2">${table('Retention Product Summary',applyCommonFilters(currentRows('retentionSummary')))}${table('Acquisition Country Coverage',currentRows('acqCountry'))}</div>`}
function renderRetentionTeam(){const r=aggregateSummary(currentRows('retentionSummary'));return hero('Retention Team Overview','Clean manager view for renewal value, booked value, cash collected, delayed accounts and owner accountability.')+`<div class="kpi-grid">${kpi('Renewal Value',money(r.renewal_value),'Budget total','green','retentionAll')}${kpi('Booked Value',money(r.booked_value),pct(r.booking_coverage_pct),'blue','booked')}${kpi('Cash Collected',money(r.cash_collected),pct(r.cash_collection_pct),'cyan','cashed')}${kpi('Booked Not Cash',money(r.booked_not_cash),'Needs collection','amber','bookedNotCash')}${kpi('Remaining Collection',money(r.remaining_collection),'Budget remaining','purple','remaining')}${kpi('Delayed Accounts',int(r.delayed_accounts),'Excludes final lost','red','delayed')}${kpi('Upcoming Accounts',int(r.upcoming_accounts),'Future renewals','blue','upcoming')}${kpi('Lost Accounts',int(r.lost_accounts),'Churned / final lost','red','lost')}${kpi('Renewed Late',int(r.renewed_late_accounts),'Renewed after due date','amber','late')}${kpi('Cashed Accounts',int(r.cashed_accounts),'Collection completed','green','cashed')}</div>${renderActionCenter()}<div class="grid2">${table('Product Renewal Summary',applyCommonFilters(currentRows('retentionSummary')))}${table('Owner Summary',applyCommonFilters(currentRows('retentionOwners')),['rm_owner','csm_owner','product','accounts','renewal_value','booked_value','cash_collected','booked_not_cash','delayed_accounts','renewed_late_accounts'])}</div>`}
function renderActionCenter(){const tabs=[['delayed','Delayed'],['upcoming','Upcoming'],['bookedNotCash','Booked Not Cash'],['late','Renewed Late'],['lost','Lost'],['expected','Expected Lost'],['notBudget','Not In Budget']];const rows=getDrawerRows(state.actionTab);return `<section class="card"><div class="card-head"><div><div class="card-title">⚡ Retention Action Center</div><div class="card-sub">Filtered from renewal logic and not-in-budget views</div></div><div class="tabs">${tabs.map(([id,l])=>`<button class="chip ${state.actionTab===id?'active':''}" onclick="state.actionTab='${id}';renderAll()">${l}</button>`).join('')}</div></div>${table('Action Center · '+(tabs.find(x=>x[0]===state.actionTab)||[])[1],rows).replace('<section class="card">','<section>').replace('</section>','</section>')}</section>`}
function renderRetentionFinancial(){const r=aggregateSummary(currentRows('retentionSummary'));return hero('Retention Financial Details','Budget, booked, cash, remaining collection, not-in-budget rows and product split.')+`<div class="kpi-grid">${kpi('Budget Renewal',money(r.renewal_value),'Budget 2026 rows','green')}${kpi('Booked Total',money(r.booked_value),'Booking sheet','blue')}${kpi('Cash Collected',money(r.cash_collected),'Collection sheet','cyan')}${kpi('Booked Not Cash',money(r.booked_not_cash),'Booked - cash','amber')}${kpi('Remaining',money(r.remaining_collection),'Open collection','purple')}${kpi('Not In Budget',int(currentRows('retentionNotBudget').length),'Booked/cashed outside budget','red','notBudget')}</div><div class="grid2">${table('Budget / Booking / Collection by Product',applyCommonFilters(currentRows('retentionSummary')))}${table('Not In Budget Rows',currentRows('retentionNotBudget'))}</div>`}
function renderRetentionRep(rep){const ownerRows=applyCommonFilters(currentRows('retentionOwners')).filter(r=>norm(r.rm_owner)===norm(rep)||norm(r.csm_owner)===norm(rep)||norm(r.owner_name)===norm(rep));const detailRows=applyCommonFilters(currentRows('retentionLogic')).filter(r=>Object.values(r).some(v=>norm(v)===norm(rep)||norm(v).includes(norm(rep))));const a={accounts:sum(ownerRows,'accounts'),renewal_value:sum(ownerRows,'renewal_value'),booked_value:sum(ownerRows,'booked_value'),cash_collected:sum(ownerRows,'cash_collected'),booked_not_cash:sum(ownerRows,'booked_not_cash'),delayed_accounts:sum(ownerRows,'delayed_accounts'),renewed_late_accounts:sum(ownerRows,'renewed_late_accounts')};return hero(`Retention · ${rep}`,'Rep-level snapshot from owner summary, filtered renewal logic, and action rows.')+`<div class="kpi-grid">${kpi('Accounts',int(a.accounts),'Owned / shared','green')}${kpi('Renewal Value',money(a.renewal_value),'Budget value','green')}${kpi('Booked',money(a.booked_value),'Booked value','blue')}${kpi('Cash',money(a.cash_collected),'Collected value','cyan')}${kpi('Booked Not Cash',money(a.booked_not_cash),'Collection gap','amber')}${kpi('Delayed',int(a.delayed_accounts),'Needs action','red')}${kpi('Renewed Late',int(a.renewed_late_accounts),'Late renewals','amber')}</div><div class="grid2">${table('Rep Owner Summary',ownerRows)}${table('Rep Renewal Details',detailRows)}</div>`}
function renderAcquisition(){return hero('Acquisition Intelligence','Country coverage, owner activity, pipeline summary and accounts needing contact.')+`<div class="grid2">${table('Acquisition Dashboard Summary',currentRows('acqSummary'))}${table('Owner Coverage',currentRows('acqOwner'))}</div><div class="grid2">${table('Country Coverage',currentRows('acqCountry'))}${table('Needs Contact',currentRows('acqNeeds'))}</div>${table('Deal Pipeline Summary',currentRows('pipeline').length?currentRows('pipeline'):currentRows('acqDeals'))}`}
function renderPnl(){const rows=applyCommonFilters(currentRows('pnlMonthly'));const total=sum(rows,'amount');const revenue=rows.filter(r=>/revenue|income|sales/i.test(String(r.category||r.subcategory||''))).reduce((a,r)=>a+num(r.amount),0);const costs=rows.filter(r=>/cogs|overhead|super|cost|expense/i.test(String(r.category||r.subcategory||''))).reduce((a,r)=>a+num(r.amount),0);return hero('P&L','Revenue, COGS, overheads, super allocation, total cost and profitability. Negative values remain negative.')+`<div class="kpi-grid">${kpi('Revenue',money(revenue),'Revenue rows','green')}${kpi('Total Cost',money(costs),'COGS + Overheads + Super','red')}${kpi('Net',money(revenue+costs),'Revenue plus signed cost rows','blue')}${kpi('Rows',int(rows.length),'P&L rows','purple')}</div><div class="grid2">${table('P&L Dashboard Summary',currentRows('pnlSummary'))}${table('P&L Monthly Rows',rows)}</div>`}
function renderUpsell(){const s=currentRows('upsellSummary')[0]||{};return hero('Upselling / Features Plan','Proposal sent, interested, not interested, upsell value, renewal value, and company-level feature tracking.')+`<div class="kpi-grid">${kpi('Clients',int(s.clients),'Unique companies','green')}${kpi('Feature Rows',int(s.feature_rows),'Features tracked','blue')}${kpi('Proposal Sent',int(s.proposal_sent),'Proposal sent count','purple')}${kpi('Interested',int(s.interested),'Interested features','cyan')}${kpi('Not Interested',int(s.not_interested),'Rejected features','red')}${kpi('Upsell Value',money(s.upsell_value_total),'Potential upsell','amber')}</div><div class="grid2">${table('Upsell Summary',currentRows('upsellSummary'))}${table('Upsell Company Summary',currentRows('upsellCompanies'))}</div>`}
function renderMarketing(){return hero('Marketing','Marketing overview, source/region split and funnel visibility when synced.')+`<div class="grid2">${table('Marketing Overview',currentRows('marketingOverview'))}${table('Marketing Source / Region',currentRows('marketingSource'))}</div>`}
function renderQuality(){return hero('Data Quality & Sync Monitor','Source status, sync runs, sync state, and failed Supabase views.',renderHealthRows())+`<div class="kpi-grid">${kpi('Loaded Sources',int(DATA_DIAGNOSTICS.filter(x=>x.status==='Loaded').length),'Supabase reads','green')}${kpi('Failed Sources',int(DATA_DIAGNOSTICS.filter(x=>x.status==='Failed').length),'Check permissions/views','red')}${kpi('Sync Jobs',int(currentRows('syncState').length),'sync_state','blue')}${kpi('Recent Runs',int(currentRows('syncRuns').length),'sync_runs','purple')}</div><div class="grid2">${table('Dashboard Source Diagnostics',DATA_DIAGNOSTICS)}${table('Sync State',currentRows('syncState'))}</div>${table('Recent Sync Runs',currentRows('syncRuns'))}`}
function getDrawerRows(type){const all=applyCommonFilters(currentRows('retentionLogic'));if(type==='retentionAll')return all.length?all:applyCommonFilters(currentRows('retentionSummary'));if(type==='notBudget')return currentRows('retentionNotBudget');if(type==='delayed')return all.filter(r=>hasText(r,['delayed','overdue'])||num(r.days_delayed)>0);if(type==='upcoming')return all.filter(r=>hasText(r,['upcoming','future','due']));if(type==='booked'||type==='cashed')return all.filter(r=>hasText(r,[type,'booked','cash','cashed']));if(type==='bookedNotCash')return all.filter(r=>hasText(r,['booked not cash','not cash'])||num(r.booked_not_cash)>0);if(type==='remaining')return all.filter(r=>num(r.remaining_collection)>0);if(type==='late')return all.filter(r=>hasText(r,['renewed late','late']));if(type==='lost')return all.filter(r=>hasText(r,['lost','churn']));if(type==='expected')return all.filter(r=>hasText(r,['expected to be lost','expected lost']));return all}
function openDrawer(title,rows,sub){rows=rows||[];byId('drawerTitle').textContent=title;byId('drawerSub').textContent=sub||`${rows.length.toLocaleString()} rows`;byId('drawerBody').innerHTML=table(title,rows).replace('<section class="card">','<section>').replace('</section>','</section>');byId('drawer').classList.add('open')}
function closeDrawer(){byId('drawer').classList.remove('open')}
loadAll();
</script>
</body>
