async function fetchView(k,v,limit=LIMIT){try{const {data,error}=await client.from(v).select('*').limit(limit);if(error)throw error;state.data[k]=data||[];state.errors[k]=null;return data||[]}catch(e){state.data[k]=[];state.errors[k]=e.message||String(e);return []}}async function loadAll(manual=false){$('liveText').textContent=manual?'Refreshing':'Connecting';await Promise.all(Object.entries(VIEWS).map(([k,v])=>fetchView(k,v,k==='syncRuns'?100:LIMIT)));state.loadedAt=new Date();DATA_DIAGNOSTICS=Object.entries(VIEWS).map(([k,v])=>({source:k,view:v,rows:(state.data[k]||[]).length,status:state.errors[k]?'Failed':'Loaded',error:state.errors[k]||''}));$('liveText').textContent='Live';$('sideSync').textContent=`${DATA_DIAGNOSTICS.filter(x=>x.status==='Loaded').length} sources loaded · ${state.loadedAt.toLocaleTimeString()}`;renderAll()}
function toggleSidebar(){$('sidebar').classList.toggle('open')}function setActive(active,rep,role){state.active=active;state.rep=rep||null;state.repRole=role||null;state.actionTab='delayed';renderAll();if(innerWidth<760)$('sidebar').classList.remove('open')}function setFilter(k,v){state[k]=v;renderAll()}function resetFilters(){state.year='2026';state.product='all';state.month='all';state.rm='all';state.csm='all';state.status='all';renderAll()}

function renderSidebar(){const main=[['executive','🏠','Executive Overview'],['acquisition','🎯','Acquisition'],['retentionTeam','🛡️','Retention'],['pnl','💰','P&L'],['upsell','✨','Upselling'],['marketing','📣','Marketing'],['quality','🧰','Data Quality']];let h='<div class="nav-section">Main</div>';main.forEach(([id,ic,label])=>{const active=(state.active===id)||(id==='retentionTeam'&&isRetentionActive())||(id==='acquisition'&&isAcqActive());h+=`<button class="nav ${active?'active':''}" onclick="setActive('${id}')"><span class="nav-icon">${ic}</span><span>${label}</span></button>`});if(isAcqActive()){h+='<div class="nav-section">Acquisition Reps</div>';acqSidebar().forEach(r=>h+=`<button class="nav ${state.active==='acquisitionRep'&&state.rep===r.owner_name?'active':''}" onclick="setActive('acquisitionRep','${esc(r.owner_name)}','Acquisition')"><span class="nav-icon">●</span><span>${esc(r.owner_name)}<span class="nav-sub">${int(r.connected_calls)} connected · ${int(r.meetings_completed)} meetings</span></span><span class="nav-badge green">${int(r.connected_calls)}</span></button>`)}if(isRetentionActive()){h+='<div class="nav-section">Retention</div>';h+=`<button class="nav ${state.active==='retentionTeam'?'active':''}" onclick="setActive('retentionTeam')"><span class="nav-icon">📊</span><span>Team Overview<span class="nav-sub">Delayed · KPI Snapshot</span></span></button>`;h+=`<button class="nav ${state.active==='retentionFinancial'?'active':''}" onclick="setActive('retentionFinancial')"><span class="nav-icon">📘</span><span>Financial Details<span class="nav-sub">Budget vs Booking vs Cash</span></span></button>`;h+='<div class="nav-section">Retention RM</div>';retentionSidebar('RM').forEach(r=>h+=`<button class="nav ${state.active==='retentionRep'&&state.rep===r.owner_name&&state.repRole==='RM'?'active':''}" onclick="setActive('retentionRep','${esc(r.owner_name)}','RM')"><span class="nav-icon">●</span><span>${esc(r.owner_name)}<span class="nav-sub">${int(r.accounts)} accounts · ${money(r.renewal_value)}</span></span><span class="nav-badge">${int(r.delayed_accounts)}</span></button>`);h+='<div class="nav-section">Retention CSM</div>';retentionSidebar('CSM').forEach(r=>h+=`<button class="nav ${state.active==='retentionRep'&&state.rep===r.owner_name&&state.repRole==='CSM'?'active':''}" onclick="setActive('retentionRep','${esc(r.owner_name)}','CSM')"><span class="nav-icon">●</span><span>${esc(r.owner_name)}<span class="nav-sub">${int(r.accounts)} accounts · ${money(r.renewal_value)}</span></span><span class="nav-badge">${int(r.delayed_accounts)}</span></button>`)}$('sideNav').innerHTML=h}
function filterOptions(){const rows=current('retentionLogic');const years=uniq(rows.map(r=>r.year)).length?uniq(rows.map(r=>r.year)):['2026'];const products=uniq([...rows.map(r=>r.product),...current('pnlMonthly').map(r=>r.product),...current('upsellCompanies').map(r=>r.product_line)]);const rms=uniq(rows.map(r=>r.rm_owner));const csms=uniq(rows.map(r=>r.csm_owner));return {years,products,rms,csms}}function renderFilters(){const o=filterOptions();let h=`<select class="select" onchange="setFilter('year',this.value)"><option value="all">All Years</option>${o.years.map(y=>`<option ${state.year==String(y)?'selected':''} value="${esc(y)}">${esc(y)}</option>`).join('')}</select>`;h+=`<select class="select" onchange="setFilter('month',this.value)"><option value="all">All Months</option>${MONTHS.map(m=>`<option ${state.month===m?'selected':''} value="${m}">${m}</option>`).join('')}</select>`;h+=`<select class="select" onchange="setFilter('product',this.value)"><option value="all">All Products</option>${o.products.map(x=>`<option ${state.product===x?'selected':''} value="${esc(x)}">${esc(x)}</option>`).join('')}</select>`;if(isRetentionActive()){h+=`<select class="select" onchange="setFilter('rm',this.value)"><option value="all">All RM</option>${o.rms.map(x=>`<option ${state.rm===x?'selected':''} value="${esc(x)}">${esc(x)}</option>`).join('')}</select>`;h+=`<select class="select" onchange="setFilter('csm',this.value)"><option value="all">All CSM</option>${o.csms.map(x=>`<option ${state.csm===x?'selected':''} value="${esc(x)}">${esc(x)}</option>`).join('')}</select>`;h+=`<select class="select" onchange="setFilter('status',this.value)"><option value="all">All Status</option><option ${state.status==='delayed'?'selected':''} value="delayed">Delayed</option><option ${state.status==='upcoming'?'selected':''} value="upcoming">Upcoming</option><option ${state.status==='booked'?'selected':''} value="booked">Booked</option><option ${state.status==='cashed'?'selected':''} value="cashe function cacheRows(rows){const id='r'+(++cacheId);TABLE_CACHE[id]=rows;return id}function formatCell(v,key,row){if(v===null||v===undefined||v==='')return '—';if(key==='company_name'||key==='companyName'||key==='clientName'||key==='name')return linkName(v,hubspotUrl(row));if(/url/i.test(key)&&String(v).startsWith('http'))return `<a class="badge blue" target="_blank" href="${esc(v)}">Open</a>`;if(/value|amount|revenue|cash|cost|profit|collection/i.test(key))return `<span class="num">${money(v)}</span>`;if(/booked_value/i.test(key))return `<span class="num">${money(v)}</span>`;if(/pct|percent|rate/i.test(key))return `<span class="num">${pct(v)}</span>`;const s=String(v);if(/lost|delayed|risk|churn/i.test(s))return `<span class="badge red">${esc(s)}</span>`;if(/expected|upcoming|pending|not in budget/i.test(s))return `<span class="badge amber">${esc(s)}</span>`;if(/cash|booked|renewed|active|completed|loaded|success/i.test(s))return `<span class="badge green">${esc(s)}</span>`;return esc(s)}function table(title,rows,cols=null,sub=''){rows=rows||[];const columns=cols||Object.keys(rows[0]||{}).slice(0,10);const id=rows.length?cacheRows(rows):'';return `<section class="card"><div class="card-head"><div><div class="card-title">${esc(title)}</div><div class="card-sub">${rows.length.toLocaleString()} rows${sub?' · '+esc(sub):''}</div></div>${rows.length?`<button class="chip" onclick="openDrawer('${esc(title)}',TABLE_CACHE['${id}'],'${rows.length.toLocaleString()} total rows')">Open All</button>`:''}</div><div class="table-wrap">${rows.length?`<table class="table"><thead><tr>${columns.map(c=>`<th>${esc(c).replaceAll('_',' ')}</th>`).join('')}</tr></thead><tbody>${rows.slice(0,120).map(r=>`<tr>${columns.map(c=>`<td>${formatCell(r[c],c,r)}</td>`).join('')}</tr>`).join('')}</tbody></table>`:`<div class="empty">No rows found.</div>`}</div></section>`}
function kpi(title,value,sub,t='green',kind=null){return `<button class="kpi ${kind?'clickable':''}" style="--tone:var(${tone(t)})" ${kind?`onclick="openDrawer('${esc(title)}',detailRows('${kind}'),'${esc(sub||'Details')}')"`:''}><div class="kpi-value">${value}</div><div class="kpi-title">${esc(title)}</div>${sub?`<div class="kpi-sub">${esc(sub)}</div>`:''}</button>`}function hero(title,sub,side=''){return `<div class="hero"><div class="hero-card"><span class="eyebrow">Live Snapshot</span><h2>${esc(title)}</h2><p>${esc(sub)}</p></div><div class="health-card">${side||renderHealthRows()}</div></div>`}function renderHealthRows(){const loaded=DATA_DIAGNOSTICS.filter(x=>x.status==='Loaded').length,failed=DATA_DIAGNOSTICS.filter(x=>x.status==='Failed').length;return `<div class="health-row"><span class="health-k">Loaded Sources</span><span class="health-v">${loaded}</span></div><div class="health-row"><span class="health-k">Failed Sources</span><span class="health-v">${failed}</span></div><div class="health-row"><span class="health-k">Last Refresh</span><span class="health-v">${state.loadedAt?state.loadedAt.toLocaleTimeString():'—'}</span></div>`}
function detailRows(kind){const rows=filteredRetentionRows();if(kind==='all')return rows;if(kind==='delayed')return rows.filter(isDelayed);if(kind==='upcoming')return rows.filter(isUpcoming);if(kind==='booked')return rows.filter(isBooked);if(kind==='cashed')return rows.filter(isCashed);if(kind==='bookedNotCash')return rows.filter(r=>r.bookedNotCash>0);if(kind==='remaining')return rows.filter(r=>r.remainingCollection>0);if(kind==='late')return rows.filter(isLate);if(kind==='lost')return rows.filter(isFinalLost);if(kind==='expected')return rows.filter(isExpectedLost);if(kind==='notBudget')return current('retentionNotBudget');return rows}
function renderAll(){renderSidebar();renderFilters();const titles={executive:['Executive Overview','One live command center for acquisition, retention, P&L, upselling, marketing, and data quality.'],acquisition:['Acquisition · Team Overview','Rep performance, connected calls, completed meetings, coverage, needs contact, and pipeline.'],acquisitionRep:[`Acquisition · ${state.rep||''}`,'Rep-level acquisition activity and coverage.'],retentionTeam:['Retention · Team Overview','Delayed renewals, KPI snapshot, monthly pipeline, coverage quality, and action center.'],retentionFinancial:['Retention Financial Details','Budget vs booking vs collection with not-in-budget visibility.'],retentionRep:[`Retention ${state.repRole||''} · ${state.rep||''}`,'Rep-level renewal, cash, delayed and action details.'],pnl:['P&L','Revenue, COGS, overheads, super allocation, cost and profitability.'],upsell:['Upselling / Features Plan','Features plan grouped by company with proposal, interest and value tracking.'],marketing:['Marketing','Marketing source, campaign and funnel visibility from Supabase.'],quality:['Data Quality & Sync Monitor','Sync runs, failed views, missing data and dashboard health.']};const [t,s]=titles[state.active]||titles.executive;$('pageTitle').textContent=t;$('pageSub').textContent=s;let html='';if(state.active==='executive')html=renderExecutive();if(state.active==='acquisition')html=renderAcquisition();if(state.active==='acquisitionRep')html=renderAcquisitionRep(state.rep);if(state.active==='retentionTeam')html=renderRetentionTeam();if(state.active==='retentionFinancial')html=renderRetentionFinancial();if(state.active==='retentionRep')html=renderRetentionRep(state.rep,state.repRole);if(state.active==='pnl')html=renderPnl();if(state.active==='upsell')html=renderUpsell();if(state.active==='marketing')html=renderMarketing();if(state.active==='quality')html=renderQuality();$('appContent').innerHTML=html}
function productSummary(){const map={};filteredRetentionRows().forEach(r=>{const p=r.product||'Unknown';map[p]=map[p]||{product:p,accounts:0,renewal_value:0,booked_value:0,cash_collected:0,booked_not_cash:0,remaining_collection:0,delayed_accounts:0,upcoming_accounts:0,lost_accounts:0,renewed_late_accounts:0};const o=map[p];o.accounts++;o.renewal_value+=r.renewalValue;o.booked_value+=r.bookedValue;o.cash_collected+=r.cashCollected;o.booked_not_cash+=r.bookedNotCash;o.remaining_collection+=r.remainingCollection;o.delayed_accounts+=isDelayed(r)?1:0;o.upcoming_accounts+=isUpcoming(r)?1:0;o.lost_accounts+=isFinalLost(r)?1:0;o.renewed_late_accounts+=isLate(r)?1:0});return Object.values(map)}function renderExecutive(){const r=summaryFromRows(),g=current('dashboardKpis')[0]||{};return hero('Talentera Command Center','Management view for sales, retention, revenue, upselling and operational health.',`<div class="health-row"><span class="health-k">Companies</span><span class="health-v">${int(g.total_companies||g.companies)}</span></div><div class="health-row"><span class="health-k">Contacts</span><span class="health-v">${int(g.total_contacts||g.contacts)}</span></div><div class="health-row"><span class="health-k">Retention Rows</span><span class="health-v">${int(filteredRetentionRows().length)}</span></div>`)+`<div class="kpi-grid">${kpi('Renewal Value',money(r.renewal_value),'Budget total','green','all')}${kpi('Cash Collected',money(r.cash_collected),pct(r.cash_collection_pct)+' collection','cyan','cashed')}${kpi('Booked Value',money(r.booked_value),pct(r.booking_coverage_pct)+' coverage','blue','booked')}${kpi('Booked Not Cash',money(r.booked_not_cash),'Collection gap','amber','bookedNotCash')}${kpi('Delayed Accounts',int(r.delayed_accounts),'Renewal action needed','red','delayed')}${kpi('Data Issues',int(current('quality').length),'Quality monitor','purple')}</div><div class="grid2">${table('Retention Product Summary',productSummary())}${table('Acquisition Reps',current('acqSidebar'))}</div>`}
function renderRetentionKpiSnapshot(){const rows=current('retentionKpi');const cards=rows.map(r=>`<section class="card"><div class="card-head"><div><div class="card-title">${esc(String(r.period).toUpperCase())}</div><div class="card-sub">Activity + renewal KPI snapshot</div></div></div><div class="kpi-grid" style="padding:14px;margin:0;grid-template-columns:repeat(4,minmax(0,1fr))">${kpi('Calls Logged',int(r.calls_logged),'HubSpot activities','blue')}${kpi('Connected Calls',int(r.connected_calls),'Connected only','cyan')}${kpi('Meetings Logged',int(r.meetings_logged),'Meetings logged','purple')}${kpi('Meetings Completed',int(r.meetings_completed),'Completed meetings','green')}${kpi('Booked',int(r.booked_count),money(r.booked_value),'blue')}${kpi('Cashed',int(r.cashed_count),money(r.cash_collected),'green')}${kpi('Churned',int(r.churned_count),'Lost / churned','red')}${kpi('Delayed',int(r.delayed_count),'Delayed by period','amber')}</div></section>`).join('');return `<section class="card"><div class="card-head"><div><div class="card-title">📌 Retention KPI Snapshot</div><div class="card-sub">Yesterday / MTD / YTD view from Supabase logic views</div></div></div><div style="padding:14px">${cards||'<div class="empty">No KPI snapshot rows found.</div>'}</div></section>`}

function renderMonthlyPipeline(){const display=monthlyPipeline().map(r=>({month:r.month,due:r.due,renewed:r.renewed,booked:r.booked,cashed:r.cashed,delayed:r.delayed,upcoming:r.upcoming,value:r.value}));return table('Monthly Renewal Pipeline',display,['month','due','renewed','booked','cashed','delayed','upcoming','value'],'contract_renewal_date month')}function renderActionCenter(){const tabs=[['delayed','Delayed'],['upcoming','Upcoming'],['bookedNotCash','Booked Not Cash'],['late','Renewed Late'],['lost','Lost'],['expected','Expected Lost'],['notBudget','Not In Budget']];const rows=detailRows(state.actionTab);return `<section class="card"><div class="card-head"><div><div class="card-title">⚡ Retention Action Center</div><div class="card-sub">Clickable account list · names open HubSpot search/record when available</div></div><div class="tabs">${tabs.map(([id,l])=>`<button class="chip ${state.actionTab===id?'active':''}" onclick="state.actionTab='${id}';renderAll()">${l}</button>`).join('')}</div></div>${table('Action Center · '+(tabs.find(x=>x[0]===state.actionTab)||[])[1],rows,retentionColumns()).replace('<section class="card">','<section>').replace('</section>','</section>')}</section>`}function retentionColumns(){return ['company_name','gid','product','month','renewal_date','renewal_value','booked_value','collected_value','booked_not_cash_value','remaining_collection_value','rm_owner','csm_owner','status','renewal_status','hubspot_search_url']}

function renderRetentionRep(rep,role){const rows=filteredRetentionRows().filter(r=>role==='RM'?norm(r.rm_owner)===norm(rep):norm(r.csm_owner)===norm(rep));const r=summaryFromRows(rows);const sidebar=current('retentionSidebar').find(x=>x.role===role&&norm(x.owner_name)===norm(rep))||{};return hero(`Retention ${role} · ${rep}`,'Rep-level snapshot filtered by RM/CSM ownership, with HubSpot click-throughs.',`<div class="health-row"><span class="health-k">Role</span><span class="health-v">${esc(role||'—')}</span></div><div class="health-row"><span class="health-k">Health</span><span class="health-v">${esc(sidebar.health_status||'—')}</span></div><div class="health-row"><span class="health-k">Delayed</span><span class="health-v">${int(r.delayed_accounts)}</span></div>`)+`<div class="kpi-grid">${kpi('Accounts',int(r.accounts),'Owned/shared','green')}${kpi('Renewal Value',money(r.renewal_value),'Budget value','green')}${kpi('Booked',money(r.booked_value),'Booked value','blue')}${kpi('Cash',money(r.cash_collected),'Collected value','cyan')}${kpi('Booked Not Cash',money(r.booked_not_cash),'Collection gap','amber')}${kpi('Delayed',int(r.delayed_accounts),'Needs action','red')}</div><div class="grid2">${table('Rep Renewal Details',rows,retentionColumns())}${table('Rep Action Items',rows.filter(x=>isDelayed(x)||x.bookedNotCash>0||isExpectedLost(x)),retentionColumns())}</div>`}
function renderAcquisition(){const reps=current('acqSidebar');const totals={calls:sum(reps,'calls_logged'),connected:sum(reps,'connected_calls'),meetings:sum(reps,'meetings_logged'),completed:sum(reps,'meetings_completed')};return hero('Acquisition Team Overview','Acquisition reps, connected calls, completed meetings, coverage, needs contact and pipeline views.')+`<div class="kpi-grid">${kpi('Calls Logged',int(totals.calls),'All acquisition reps','blue')}${kpi('Connected Calls',int(totals.connected),'Connected only','cyan')}${kpi('Meetings Logged',int(totals.meetings),'Logged meetings','purple')}${kpi('Meetings Completed',int(totals.completed),'Completed outcomes','green')}${kpi('Needs Contact',int(current('acqNeeds').length),'Accounts list','amber')}${kpi('Pipeline Rows',int(current('pipeline').length),'Deal pipeline','green')}</div><div class="grid2">${table('Acquisition Reps',reps,['owner_name','calls_logged','connected_calls','meetings_logged','meetings_completed','last_activity_at'])}${table('Owner Coverage',current('acqOwner'))}</div><div class="grid2">${table('Country Coverage',current('acqCountry'))}${table('Needs Contact',current('acqNeeds'))}</div>${table('Deal Pipeline Summary',current('pipeline').length?current('pipeline'):current('acqDeals'))}`}
function renderAcquisitionRep(rep){const activity=current('ownerPeriods').filter(r=>norm(r.owner_name)===norm(rep));const summary=current('acqSidebar').find(r=>norm(r.owner_name)===norm(rep))||{};return hero(`Acquisition · ${rep}`,'Rep-level activity, calls, meetings and acquisition source tables.')+`<div class="kpi-grid">${kpi('Calls Logged',int(summary.calls_logged),'Total calls','blue')}${kpi('Connected Calls',int(summary.connected_calls),'Connected calls','cyan')}${kpi('Meetings Logged',int(summary.meetings_logged),'Total meetings','purple')}${kpi('Meetings Completed',int(summary.meetings_completed),'Completed meetings','green')}</div><div class="grid2">${table('Rep Activity Periods',activity)}${table('Needs Contact',current('acqNeeds'))}</div>`}
function renderPnl(){const rows=current('pnlMonthly').filter(r=>{if(state.year!=='all'&&has(r.year)&&String(r.year)!==state.year)return false;if(state.product!=='all'&&has(r.product)&&norm(r.product)!==norm(state.product))return false;return true});const revenue=rows.filter(r=>/revenue|income|sales/i.test(String(r.category||r.subcategory||''))).reduce((a,r)=>a+n(r.amount),0),cogs=rows.filter(r=>/cogs/i.test(String(r.category||r.subcategory||''))).reduce((a,r)=>a+n(r.amount),0),overheads=rows.filter(r=>/overhead/i.test(String(r.category||r.subcategory||''))).reduce((a,r)=>a+n(r.amount),0),superAlloc=rows.filter(r=>/super/i.test(String(r.category||r.subcategory||''))).reduce((a,r)=>a+n(r.amount),0),cost=cogs+overheads+superAlloc;return hero('P&L','Revenue, COGS, overheads, super allocation, total cost and profitability. Negative values stay signed.')+`<div class="kpi-grid">${kpi('Revenue',money(revenue),'Revenue rows','green')}${kpi('COGS',money(cogs),'Cost of goods','red')}${kpi('Overheads',money(overheads),'Overheads','amber')}${kpi('Super Allocate',money(superAlloc),'Super allocation','purple')}${kpi('Total Cost',money(cost),'COGS + Overheads + Super','red')}${kpi('Net',money(revenue+cost),'Signed calculation','blue')}</div><div class="grid2">${table('P&L Dashboard Summary',current('pnlSummary'))}${table('P&L Monthly Rows',rows)}</div>`}
function renderUpsell(){const s=current('upsellSummary')[0]||{};return hero('Upselling / Features Plan','Proposal sent, interested, not interested, upsell value, renewal value, and company-level feature tracking.')+`<div class="kpi-grid">${kpi('Clients',int(s.clients),'Unique companies','green')}${kpi('Feature Rows',int(s.feature_rows),'Features tracked','blue')}${kpi('Proposal Sent',int(s.proposal_sent),'Proposal sent','purple')}${kpi('Interested',int(s.interested),'Interested','cyan')}${kpi('Not Interested',int(s.not_interested),'Rejected','red')}${kpi('Upsell Value',money(s.upsell_value_total),'Potential upsell','amber')}</div><div class="grid2">${table('Upsell Summary',current('upsellSummary'))}${table('Upsell Company Summary',current('upsellCompanies'))}</div>`}function renderMarketing(){return hero('Marketing','Marketing overview, source/region split and funnel visibility when synced.')+`<div class="grid2">${table('Marketing Overview',current('marketingOverview'))}${table('Marketing Source / Region',current('marketingSource'))}</div>`}function renderQuality(){return hero('Data Quality & Sync Monitor','Source status, sync runs, sync state, and failed Supabase views.',renderHealthRows())+`<div class="kpi-grid">${kpi('Loaded Sources',int(DATA_DIAGNOSTICS.filter(x=>x.status==='Loaded').length),'Supabase reads','green')}${kpi('Failed Sources',int(DATA_DIAGNOSTICS.filter(x=>x.status==='Failed').length),'Check permissions/views','red')}${kpi('Sync Jobs',int(current('syncState').length),'sync_state','blue')}${kpi('Recent Runs',int(current('syncRuns').length),'sync_runs','purple')}</div><div class="grid2">${table('Dashboard Source Diagnostics',DATA_DIAGNOSTICS)}${table('Sync State',current('syncState'))}</div>${table('Recent Sync Runs',current('syncRuns'))}`}
function openDrawer(title,rows,sub){rows=rows||[];$('drawerTitle').textContent=title;$('drawerSub').textContent=sub||`${rows.length.toLocaleString()} rows`;$('drawerBody').innerHTML=table(title,rows,rows[0]&&('company_name'in rows[0])?retentionColumns():null).replace('<section class="card">','<section>').replace('</section>','</section>');$('drawer').classList.add('open')}function closeDrawer(){$('drawer').classList.remove('open')}
loadAll();
</script>
