</button></div><div class="drawer-body" id="db"></div></div></div><script>const SUPABASE_URL='https://czaxtwbmborxwzaboqxl.supabase.co';const SUPABASE_KEY='sb_publishable_uVUdpVWggu1WvkSKCAi51w_9qsb-AjX';const PORTAL='145742477';const HS='https://app-eu1.hubspot.com';const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);const VIEWS={retLogic:'vw_retention_renewal_logic',retNotBudget:'vw_retention_not_in_budget',retSidebar:'vw_retention_sidebar_reps',retKpi:'vw_retention_kpi_snapshot',retCoverage:'vw_retention_coverage_quality',acqSidebar:'vw_acquisition_sidebar_reps',acqKpi:'vw_acquisition_kpi_snapshot',acqTeam:'vw_acquisition_team_snapshot',acqRank:'vw_acquisition_rank_coverage',acqRankDetails:'vw_acquisition_rank_details',acqNeeds:'vw_acquisition_leads_need_contact_v2',acqPipe:'vw_acquisition_pipeline_snapshot',acqPipeDetails:'vw_acquisition_pipeline_details',acqSources:'vw_acquisition_field_sources',pnl:'vw_pnl_advanced_summary',pnlMonthly:'vw_pnl_monthly_advanced',pnlBreakdown:'vw_pnl_cost_breakdown',pnlCompare:'vw_pnl_year_comparison',upsellSummary:'vw_features_plan_dashboard_summary',upsellCompanies:'vw_features_plan_company_summary',marketing:'vw_marketing_overview',quality:'vw_data_quality_dashboard',syncState:'sync_state',syncRuns:'sync_runs'};const S={active:'acquisition',acqTab:'overview',retTab:'team',year:'2026',month:'all',product:'all',country:'all',rank:'all',owner:'all',rep:null,repRole:null,data:{},err:{},loadedAt:null};let DIAG=[],CACHE={},cid=0;const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];function $(id){return document.getElementById(id)}function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function n(v){const x=Number(String(v??'').replace(/[^0-9.-]/g,''));return Number.isFinite(x)?x:0}function int(v){return Math.round(n(v)).toLocaleString()}function money(v){const x=n(v),s=x<0?'-':'',a=Math.abs(x);return s+'$'+(a>=1e6?(a/1e6).toFixed(1)+'M':Math.round(a).toLocaleString())}function pct(v){return (n(v)||0).toFixed(1)+'%'}function norm(v){return String(v??'').trim().toLowerCase()}function sum(rows,k){return (rows||[]).reduce((a,r)=>a+n(r[k]),0)}function uniq(arr){return [...new Set((arr||[]).filter(Boolean).map(String))].sort((a,b)=>a.localeCompare(b))}function cur(k){return S.data[k]||[]}function tone(c){return {green:'--g',cyan:'--c',blue:'--b',purple:'--p',amber:'--a',red:'--r'}[c]||'--g'}function companyUrl(name){return name?`${HS}/contacts/${PORTAL}/objects/0-2/views/all/list?query=${encodeURIComponent(name)}`:''}function rowUrl(r){return r.hubspot_url||r.hubspot_search_url||r.company_url||r.deal_url||r.url||companyUrl(r.company_name||r.dealname||r.name)}function link(v,r){const u=rowUrl(r);return u?`<a class="link" target="_blank" href="${esc(u)}">${esc(v||'Open')}</a>`:esc(v||'—')}function activeAcq(rows){return (rows||[]).filter(r=>(S.country==='all'||norm(r.country)===norm(S.country))&&(S.rank==='all'||norm(r.rank)===norm(S.rank))&&(S.owner==='all'||norm(r.owner_name)===norm(S.owner))&&(!S.rep||S.active!=='acqRep'||norm(r.owner_name)===norm(S.rep)))}function activePnl(rows){return (rows||[]).filter(r=>(S.year==='all'||!r.year||String(r.year)===S.year)&&(S.month==='all'||!r.month||norm(String(r.month).slice(0,3))===norm(S.month))&&(S.product==='all'||!r.product||norm(r.product)===norm(S.product)))}function retRows(){return cur('retLogic').filter(r=>(S.year==='all'||!r.year||String(r.year)===S.year)&&(S.month==='all'||!r.month||norm(String(r.month).slice(0,3))===norm(S.month))&&(S.product==='all'||!r.product||norm(r.product)===norm(S.product)))}async function fetchView(key,view){try{const {data,error}=await sb.from(view).select('*').limit(key==='syncRuns'?100:5000);if(error)throw error;S.data[key]=data||[];S.err[key]='';return data||[]}catch(e){S.data[key]=[];S.err[key]=e.message||String(e);return []}}async function loadAll(manual=false){$('live').textContent=manual?'Refreshing':'Connecting';try{await Promise.all(Object.entries(VIEWS).map(([k,v])=>fetchView(k,v)));S.loadedAt=new Date();DIAG=Object.entries(VIEWS).map(([k,v])=>({source:k,view:v,rows:cur(k).length,status:S.err[k]?'Failed':'Loaded',error:S.err[k]||''}));$('live').textContent='Live';$('sync').textContent=`${DIAG.filter(x=>x.status==='Loaded').length} sources · ${S.loadedAt.toLocaleTimeString()}`;render()}catch(e){$('content').innerHTML='<div class="empty">Load failed: '+esc(e.message||e)+'</div>'}}function setPage(p){S.active=p;S.rep=null;render()}function setAcqTab(t){S.active='acquisition';S.acqTab=t;S.rep=null;render()}function setRetTab(t){S.active='retention';S.retTab=t;S.rep=null;render()}function setRep(page,name,role){S.active=page;S.rep=name;S.repRole=role;render()}function setFilter(k,v){S[k]=v;render()}function resetFilters(){S.year='2026';S.month='all';S.product='all';S.country='all';S.rank='all';S.owner='all';render()}function cacheRows(rows){const id='c'+(++cid);CACHE[id]=rows||[];return id}function kpi(title,value,sub,color='green',rows=null){const id=rows?cacheRows(rows):'';return `<button class="kpi" style="--tone:var(${tone(color)})" ${rows?`onclick="openCache('${id}','${esc(title)}','${esc(sub||'Details')}')"`:''}><div class="v">${value}</div><div class="k">${esc(title)}</div>${sub?`<div class="s">${esc(sub)}</div>`:''}</button>`}function cell(v,k,r){if(v==null||v==='')return '—';if(['company_name','dealname','name'].includes(k))return link(v,r);if(/url/i.test(k)&&String(v).startsWith('http'))return `<a class="pill blue" target="_blank" href="${esc(v)}">Open</a>`;if(/value|amount|cash|booking|cogs|overheads|support|cost|profit|collection|position|delta|pipeline/i.test(k))return `<span class="num">${money(v)}</span>`;if(/pct|score|margin/i.test(k))return `<span class="num">${pct(v)}</span>`;const s=String(v);if(/lost|delayed|critical|risk|churn/i.test(s))return `<span class="pill red">${esc(s)}</span>`;if(/expected|upcoming|pending|watch|needs/i.test(s))return `<span class="pill amber">${esc(s)}</span>`;if(/cash|booked|renewed|active|completed|loaded|success|healthy|contacted/i.test(s))return `<span class="pill green">${esc(s)}</span>`;return esc(s)}function table(title,rows,cols=null,sub=''){rows=rows||[];cols=cols||Object.keys(rows[0]||{}).slice(0,10);const id=rows.length?cacheRows(rows):'';return `<section class="card"><div class="head"><div><h3>${esc(title)}</h3><p>${rows.length.toLocaleString()} rows${sub?' · '+esc(sub):''}</p></div>${rows.length?`<button class="chip" onclick="openCache('${id}','${esc(title)}','${rows.length.toLocaleString()} rows')">Open All</button>`:''}</div><div class="wrap">${rows.length?`<table><thead><tr>${cols.map(c=>`<th>${esc(c).replaceAll('_',' ')}</th>`).join('')}</tr></thead><tbody>${rows.slice(0,160).map(r=>`<tr>${cols.map(c=>`<td>${cell(r[c],c,r)}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'<div class="empty">No rows found.</div>'}</div></section>`}function health(){const ok=DIAG.filter(x=>x.status==='Loaded').length,bad=DIAG.length-ok;return `<div class="health-row"><span>Loaded Sources</span><b>${ok}</b></div><div class="health-row"><span>Failed Sources</span><b>${bad}</b></div><div class="health-row"><span>Last Refresh</span><b>${S.loadedAt?S.loadedAt.toLocaleTimeString():'—'}</b></div>`}function hero(title,sub,side=''){return `<div class="hero"><section class="panel"><span class="eyebrow">Live Snapshot</span><h1>${esc(title)}</h1><p>${esc(sub)}</p></section><section class="health">${side||health()}</section></div>`}function nav(){let h='<div class="sec">Main</div>';[['acquisition','🎯','Acquisition'],['retention','🛡️','Retention'],['pnl','💰','P&L'],['upsell','✨','Upselling'],['marketing','📣','Marketing'],['quality','🧰','Data Quality']].forEach(([id,ic,label])=>{const active=S.active===id||(id==='acquisition'&&S.active==='acqRep')||(id==='retention'&&S.active==='retRep');h+=`<button class="nav ${active?'active':''}" onclick="setPage('${id}')"><span>${ic}</span><span>${label}</span></button>`});if(S.active==='acquisition'||S.active==='acqRep'){h+='<div class="sec">Acquisition Pages</div>';[['overview','Team Overview'],['kpi','KPI Snapshot'],['rank','Rank A/B Coverage'],['needs','Leads Need Contact'],['pipeline','Pipeline Summary'],['sources','Field Sources']].forEach(([id,label])=>h+=`<button class="nav ${S.active==='acquisition'&&S.acqTab===id?'active':''}" onclick="setAcqTab('${id}')"><span>•</span><span>${label}</span></button>`);h+='<div class="sec">Acquisition Reps</div>';cur('acqSidebar').forEach(r=>h+=`<button class="nav ${S.active==='acqRep'&&S.rep===r.owner_name?'active':''}" onclick="setRep('acqRep','${esc(r.owner_name)}','activity')"><span>●</span><span>${esc(r.owner_name)}<small>${int(r.connected_calls)} connected · ${int(r.meetings_completed)} meetings</small></span><span class="badge">${int(r.connected_calls)}</span></button>`);const deals=cur('acqPipe').filter(r=>r.role==='deals_only');if(deals.length){h+='<div class="sec">Deal Owners</div>';deals.forEach(r=>h+=`<button class="nav ${S.active==='acqRep'&&S.rep===r.owner_name?'active':''}" onclick="setRep('acqRep','${esc(r.owner_name)}','deals_only')"><span>◆</span><span>${esc(r.owner_name)}<small>${int(r.open_deals)} open · ${money(r.open_pipeline_value)}</small></span><span class="badge">${int(r.open_deals)}</span></button>`)}}if(S.active==='retention'||S.active==='retRep'){h+='<div class="sec">Retention Pages</div>';[['team','Team Overview'],['financial','Financial Details']].forEach(([id,label])=>h+=`<button class="nav ${S.active==='retention'&&S.retTab===id?'active':''}" onclick="setRetTab('${id}')"><span>•</span><span>${label}</span></button>`);['RM','CSM'].forEach(role=>{h+=`<div class="sec">Retention ${role}</div>`;cur('retSidebar').filter(r=>r.role===role).forEach(r=>h+=`<button class="nav ${S.active==='retRep'&&S.rep===r.owner_name&&S.repRole===role?'active':''}" onclick="setRep('retRep','${esc(r.owner_name)}','${role}')"><span>●</span><span>${esc(r.owner_name)}<small>${int(r.accounts)} accounts · ${money(r.renewal_value)}</small></span><span class="badge">${int(r.delayed_accounts)}</span></button>`)})}document.getElementById('nav').innerHTML=h}function filters(){const acq=[...cur('acqRank'),...cur('acqRankDetails'),...cur('acqNeeds')],rr=cur('retLogic'),pnl=[...cur('pnl'),...cur('pnlMonthly')];const years=uniq([...rr.map(r=>r.year),...pnl.map(r=>r.year)]),products=uniq([...rr.map(r=>r.product),...pnl.map(r=>r.product),...cur('upsellCompanies').map(r=>r.product_line)]);let h=`<select class="sel" onchange="setFilter('year',this.value)"><option value="all">All Years</option>${(years.length?years:['2026']).map(y=>`<option ${S.year==y?'selected':''}>${esc(y)}</option>`).join('')}</select>`;if(S.active==='pnl'||S.active==='retention'||S.active==='retRep')h+=`<select class="sel" onchange="setFilter('month',this.value)"><option value="all">All Months</option>${MONTHS.map(m=>`<option ${S.month===m?'selected':''}>${m}</option>`).join('')}</select><select class="sel" onchange="setFilter('product',this.value)"><option value="all">All Products</option>${products.map(p=>`<option ${S.product===p?'selected':''}>${esc(p)}</option>`).join('')}</select>`;if(S.active==='acquisition'||S.active==='acqRep')h+=`<select class="sel" onchange="setFilter('owner',this.value)"><option value="all">All Owners</option>${uniq(acq.map(r=>r.owner_name)).map(o=>`<option ${S.owner===o?'selected':''}>${esc(o)}</option>`).join('')}</select><select class="sel" onchange="setFilter('country',this.value)"><option value="all">All Countries</option>${uniq(acq.map(r=>r.country)).map(c=>`<option ${S.country===c?'selected':''}>${esc(c)}</option>`).join('')}</select><select class="sel" onchange="setFilter('rank',this.value)"><option value="all">All Ranks</option>${uniq(acq.map(r=>r.rank)).map(r=>`<option ${S.rank===r?'selected':''}>${esc(r)}</option>`).join('')}</select>`;h+=`<button class="btn alt" onclick="resetFilters()">Reset filters</button>`;document.getElementById('filters').innerHTML=h}function render(){nav();filters();const titles={acquisition:['Acquisition','Team overview, KPI snapshot, Rank A/B coverage, needs contact, pipeline, and field sources.'],acqRep:[`Acquisition · ${S.rep||''}`,'Rep-level acquisition details.'],retention:['Retention','Retention team, financials, RM/CSM views.'],retRep:[`Retention ${S.repRole||''} · ${S.rep||''}`,'Rep-level renewal action details.'],pnl:['P&L Advanced','Booking, cashing, COGS, overheads, support allocation, total cost and margins.'],upsell:['Upselling / Features Plan','Company-level feature plan and status.'],marketing:['Marketing','Marketing overview and source split.'],quality:['Data Quality','Sources, sync and data health.']};const [t,s]=titles[S.active]||titles.acquisition;$('title').textContent=t;$('subtitle').textContent=s;let html='';if(S.active==='acquisition')html=renderAcq();else if(S.active==='acqRep')html=renderAcqRep();else if(S.active==='retention')html=renderRetention();else if(S.active==='retRep')html=renderRetRep();else if(S.active==='pnl')html=renderPnl();else if(S.active==='upsell')html=renderUpsell();else if(S.active==='marketing')html=hero('Marketing','Marketing overview and source split.')+table('Marketing Overview',cur('marketing'));else if(S.active==='quality')html=hero('Data Quality & Sync Monitor','Source status, sync runs and failed views.',health())+table('Source Diagnostics',DIAG)+table('Sync State',cur('syncState'))+table('Sync Runs',cur('syncRuns'));$('content').innerHTML=html}function acqTeam(){const t=cur('acqTeam')[0]||{},p=cur('acqPipe');return {t,open:sum(p,'open_deals'),openVal:sum(p,'open_pipeline_value'),wonM:sum(p,'won_mtd'),lostM:sum(p,'lost_mtd'),wonY:sum(p,'won_ytd'),lostY:sum(p,'lost_ytd')}}function acqKpis(){const a=acqTeam(),t=a.t,details=activeAcq(cur('acqRankDetails')),needs=activeAcq(cur('acqNeeds')),rankA=details.filter(r=>['a','rank a'].includes(norm(r.rank))),rankB=details.filter(r=>['b','rank b'].includes(norm(r.rank))),openDeals=cur('acqPipeDetails').filter(r=>r.deal_status==='open'),wonDeals=cur('acqPipeDetails').filter(r=>r.deal_status==='won'),lostDeals=cur('acqPipeDetails').filter(r=>r.deal_status==='lost');return `<div class="kpis">${kpi('Companies',int(t.total_companies),'Allowed acquisition owners','green')}${kpi('Contacted',int(t.contacted_companies),'Connected call OR completed meeting','cyan',details.filter(r=>!r.needs_contact))}${kpi('Needs Contact',int(t.needs_contact_companies),'No connected call and no completed meeting','red',needs)}${kpi('Rank A Coverage',pct(t.rank_a_coverage_pct),'Contacted / Rank A total','green',rankA)}${kpi('Rank B Coverage',pct(t.rank_b_coverage_pct),'Contacted / Rank B total','blue',rankB)}${kpi('Open Pipeline',money(a.openVal),`${int(a.open)} open deals`,'purple',openDeals)}${kpi('Won MTD',int(a.wonM),`${int(a.wonY)} won YTD`,'green',wonDeals)}${kpi('Lost MTD',int(a.lostM),`${int(a.lostY)} lost YTD`,'red',lostDeals)}</div>`}function sectionTabs(){return `<section class="card"><div class="head"><div><h3>Acquisition Sections</h3><p>Open one section at a time</p></div><div class="tabs">${[['overview','Overview'],['kpi','KPI Snapshot'],['rank','Rank A/B'],['needs','Needs Contact'],['pipeline','Pipeline'],['sources','Field Sources']].map(([id,label])=>`<button class="chip ${S.acqTab===id?'active':''}" onclick="setAcqTab('${id}')">${label}</button>`).join('')}</div></div></section>`}function renderAcq(){const base=hero('Acquisition Team Overview','Contacted means the same company owner has at least one connected call or one completed meeting.');const tabs=sectionTabs();const rank=activeAcq(cur('acqRank')),details=activeAcq(cur('acqRankDetails')),needs=activeAcq(cur('acqNeeds')),pipe=cur('acqPipe'),pd=cur('acqPipeDetails');if(S.acqTab==='overview')return base+tabs+acqKpis()+`<div class="grid2">${table('Acquisition Reps',cur('acqSidebar'),['owner_name','calls_logged','connected_calls','meetings_logged','meetings_completed','last_activity_at'])}${table('Pipeline Snapshot',pipe,['owner_name','role','open_deals','open_pipeline_value','won_mtd','won_mtd_value','won_ytd','won_ytd_value','lost_mtd','lost_ytd'])}</div>${table('Rank A/B Coverage Summary',rank,['rank','country','owner_name','total_companies','touched_companies','untouched_companies','needs_contact','connected_calls','completed_meetings','coverage_pct'])}`;if(S.acqTab==='kpi')return base+tabs+acqKpis()+table('Acquisition KPI Snapshot',cur('acqKpi'));if(S.acqTab==='rank')return base+tabs+acqKpis()+`<div class="grid2">${table('Rank A/B Coverage by Country & Owner',rank,['rank','country','owner_name','total_companies','touched_companies','untouched_companies','needs_contact','connected_calls','completed_meetings','coverage_pct'])}${table('Rank Company Details',details,['company_name','country','rank','company_tier','owner_name','calls_logged','connected_calls','meetings_logged','completed_meetings','needs_contact','last_touch_at','hubspot_url'])}</div>`;if(S.acqTab==='needs')return base+tabs+acqKpis()+table('Leads Need Contact',needs,['company_name','country','rank','company_tier','owner_name','calls_logged','connected_calls','meetings_logged','completed_meetings','needs_contact','last_touch_at','hubspot_url'],'No connected call and no completed meeting from the same company owner');if(S.acqTab==='pipeline')return base+tabs+`<div class="grid2">${table('Pipeline Snapshot',pipe,['owner_name','role','open_deals','open_pipeline_value','won_mtd','won_mtd_value','won_ytd','won_ytd_value','lost_mtd','lost_ytd'])}${table('Pipeline Details',pd,['dealname','owner_name','role','deal_status','amount','amount_in_home_currency','pipeline','dealstage','product','closedate','hubspot_url'])}</div>`;return base+tabs+table('Field Sources',cur('acqSources'),['metric','source_table','logic'])}function renderAcqRep(){const owner=S.rep,role=S.repRole;const details=activeAcq(cur('acqRankDetails')).filter(r=>norm(r.owner_name)===norm(owner)),needs=activeAcq(cur('acqNeeds')).filter(r=>norm(r.owner_name)===norm(owner)),pipe=cur('acqPipe').filter(r=>norm(r.owner_name)===norm(owner)),pd=cur('acqPipeDetails').filter(r=>norm(r.owner_name)===norm(owner)),act=cur('acqSidebar').find(r=>norm(r.owner_name)===norm(owner))||{};return hero(`Acquisition · ${owner}`,role==='deals_only'?'Deals-only owner: activity coverage is not counted here.':'Activity owner: coverage is person-scoped to company owner.')+`<div class="kpis">${kpi('Connected Calls',int(act.connected_calls),'Same owner only','cyan')}${kpi('Completed Meetings',int(act.meetings_completed),'Same owner only','green')}${kpi('Needs Contact',int(needs.length),'No connected/completed','red',needs)}${kpi('Open Pipeline',money(sum(pipe,'open_pipeline_value')),`${int(sum(pipe,'open_deals'))} open deals`,'purple',pd.filter(r=>r.deal_status==='open'))}</div><div class="grid2">${table('Rep Rank Company Details',details,['company_name','country','rank','company_tier','calls_logged','connected_calls','meetings_logged','completed_meetings','needs_contact','last_touch_at','hubspot_url'])}${table('Rep Needs Contact',needs,['company_name','country','rank','company_tier','calls_logged','connected_calls','meetings_logged','completed_meetings','needs_contact','last_touch_at','hubspot_url'])}</div>${table('Rep Pipeline Deals',pd,['dealname','deal_status','amount','amount_in_home_currency','pipeline','dealstage','product','closedate','hubspot_url'])}`}function retSummary(){const rows=retRows();return {renewal:sum(rows,'renewal_value'),booked:sum(rows,'booked_value'),cash:sum(rows,'collected_value'),bnc:sum(rows,'booked_not_cash_value'),rem:sum(rows,'remaining_collection_value'),delayed:rows.filter(r=>r.is_delayed===true||String(r.is_delayed)==='true').length}}function renderRetention(){const s=retSummary();if(S.retTab==='financial')return hero('Retention Financial Details','Budget, booking, cash collection and action tables.')+`<div class="kpis">${kpi('Renewal Value',money(s.renewal),'Budget','green')}${kpi('Booked',money(s.booked),'Booked value','blue')}${kpi('Cash',money(s.cash),'Collected','cyan')}${kpi('Booked Not Cash',money(s.bnc),'Collection gap','amber')}${kpi('Remaining',money(s.rem),'Remaining collection','purple')}${kpi('Delayed',int(s.delayed),'Accounts','red')}</div><div class="grid2">${table('Retention Rows',retRows(),['company_name','product','month','renewal_value','booked_value','collected_value','booked_not_cash_value','remaining_collection_value','rm_owner','csm_owner','hubspot_search_url'])}${table('Not In Budget',cur('retNotBudget'))}</div>`;return hero('Retention Team Overview','Retention snapshot, KPI periods and coverage quality.')+`<div class="kpis">${kpi('Renewal Value',money(s.renewal),'Budget','green')}${kpi('Cash',money(s.cash),'Collected','cyan')}${kpi('Delayed',int(s.delayed),'Accounts','red')}</div>${table('Retention KPI Snapshot',cur('retKpi'))}<div class="grid2">${table('Retention Coverage Quality',cur('retCoverage'))}${table('Retention Sidebar Summary',cur('retSidebar'))}</div>`}function renderRetRep(){const rows=retRows().filter(r=>S.repRole==='RM'?norm(r.rm_owner)===norm(S.rep):norm(r.csm_owner)===norm(S.rep));return hero(`Retention ${S.repRole} · ${S.rep}`,'Rep-level renewal actions.')+table('Rep Renewal Rows',rows,['company_name','product','month','renewal_value','booked_value','collected_value','booked_not_cash_value','remaining_collection_value','status','renewal_status','hubspot_search_url'])}function renderPnl(){const rows=activePnl(cur('pnl')),monthly=activePnl(cur('pnlMonthly')),breakdown=activePnl(cur('pnlBreakdown')),comp=S.year==='all'?cur('pnlCompare'):cur('pnlCompare').filter(r=>String(r.year)===S.year);const totals={booking:sum(rows,'booking'),cashing:sum(rows,'cashing'),cogs:sum(rows,'cogs'),overheads:sum(rows,'overheads'),support:sum(rows,'support_allocation'),cost:sum(rows,'total_cost'),net:sum(rows,'net_cash_position')};return hero('P&L Advanced','Dynamic P&L from Supabase views.')+`<div class="kpis">${kpi('Booking',money(totals.booking),'Booked
