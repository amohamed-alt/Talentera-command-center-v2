<style>
:root{--green:#16A34A;--blue:#2563EB;--purple:#7C3AED;--amber:#D97706;--red:#DC2626;--cyan:#0891B2;--bg:#F0F4F2;--card:#fff;--card2:#F7FAF8;--line:#E4EBE7;--ink:#0D1F16;--ink2:#33483C;--muted:#6B877A;--side:#0F1A14;--sideText:#8BAD8A;--sideMuted:#6E8D79;--sideAccent:#3DD68C;--font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;--shadow:0 2px 8px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);--shadow2:0 8px 28px rgba(0,0,0,.09)}
*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100%}body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}body:before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.36;background:radial-gradient(circle at 76% 7%,rgba(8,145,178,.12),transparent 25%),radial-gradient(circle at 18% 5%,rgba(22,163,74,.11),transparent 30%),linear-gradient(90deg,rgba(22,163,74,.045) 1px,transparent 1px),linear-gradient(rgba(22,163,74,.045) 1px,transparent 1px);background-size:auto,auto,34px 34px,34px 34px}button,input,select{font-family:inherit}button{cursor:pointer}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#C9D7D0;border-radius:99px}.app{display:flex;min-height:100vh}.side{position:fixed;inset:0 auto 0 0;width:230px;background:var(--side);color:var(--sideText);overflow:auto;z-index:300;display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(15,26,20,.08)}.brand{padding:16px 18px;border-bottom:1px solid rgba(61,214,140,.10);display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,rgba(255,255,255,.03),transparent)}.logo{width:33px;height:33px;border-radius:50%;background:#fff;border:3px solid #F5C542;color:var(--side);display:grid;place-items:center;font-size:15px;font-weight:900;box-shadow:0 3px 10px rgba(0,0,0,.16)}.brand b{display:block;color:#fff;font-size:15px;font-weight:900;letter-spacing:-.02em}.brand small{font-size:9px;color:var(--sideText);font-weight:700;text-transform:uppercase;letter-spacing:.06em}.sec{padding:18px 18px 5px;font-size:9px;font-weight:800;color:rgba(139,173,138,.55);letter-spacing:.14em;text-transform:uppercase}.nav{width:calc(100% - 12px);margin:1px 6px;padding:8px 10px;border:0;border-radius:8px;background:transparent;color:var(--sideText);font-size:12px;font-weight:650;text-align:left;display:flex;align-items:center;gap:9px;transition:.14s}.nav:hover{background:rgba(255,255,255,.06);color:#fff}.nav.on{background:rgba(61,214,140,.12);color:var(--sideAccent);font-weight:800}.nav small{display:block;margin-top:2px;font-size:9px;line-height:1.14;color:var(--sideMuted);font-weight:650;max-width:148px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.badge{margin-left:auto;background:rgba(220,38,38,.25);color:#FCA5A5;border-radius:8px;padding:2px 6px;font:800 9px var(--mono)}.viewTag{display:inline-flex;border:1px solid rgba(8,145,178,.25);background:rgba(8,145,178,.15);color:#22D3EE;border-radius:4px;padding:1px 5px;font-size:8px;font-weight:900;margin-left:4px;vertical-align:middle}.user{margin-top:auto;position:sticky;bottom:0;padding:12px 8px;background:linear-gradient(transparent,#0F1A14 24%)}.u{display:flex;align-items:center;gap:9px;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px;background:rgba(255,255,255,.035)}.av{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--sideAccent),#0D9488);display:grid;place-items:center;color:var(--side);font-size:11px;font-weight:900}.main{margin-left:230px;width:calc(100% - 230px);min-height:100vh}.top{height:60px;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:200;box-shadow:0 1px 3px rgba(0,0,0,.04)}.tt{font-size:15px;font-weight:900;letter-spacing:-.02em}.ts{margin-top:2px;font-size:11px;color:var(--muted);font-weight:650}.right{margin-left:auto;display:flex;align-items:center;gap:10px}.live{border:1px solid rgba(22,163,74,.22);background:rgba(22,163,74,.08);color:var(--green);font-size:10px;text-transform:uppercase;font-weight:900;border-radius:999px;padding:5px 12px}.live:before{content:"";display:inline-block;width:6px;height:6px;border-radius:99px;background:var(--green);margin-right:6px}.btn{border:0;background:var(--green);color:#fff;font-size:11px;font-weight:900;border-radius:8px;padding:8px 13px;box-shadow:0 6px 16px rgba(22,163,74,.18)}.tabs{height:45px;background:rgba(255,255,255,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:2px;padding:0 24px;position:sticky;top:60px;z-index:180;overflow:auto}.tab{height:45px;border:0;background:transparent;color:var(--muted);font-size:11px;font-weight:850;padding:0 13px;border-bottom:2.5px solid transparent;white-space:nowrap;transition:.12s}.tab:hover{background:var(--card2);color:var(--ink2)}.tab.on{color:var(--green);border-bottom-color:var(--green)}.filters{padding:14px 24px 0;display:flex;gap:8px;flex-wrap:wrap}.f{height:34px;border:1px solid var(--line);background:rgba(255,255,255,.76);border-radius:8px;padding:0 10px;color:var(--ink2);font-size:11px;font-weight:800;outline:none;box-shadow:0 1px 2px rgba(0,0,0,.02)}.content{padding:16px 24px 72px}.hero,.card,.kpi{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);backdrop-filter:blur(12px)}.hero{padding:18px 22px;margin-bottom:14px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}.hero h1{font-size:22px;font-weight:900;letter-spacing:-.04em;line-height:1.12}.hero p{margin-top:5px;color:var(--muted);font-size:12px;font-weight:700;line-height:1.55;max-width:880px}.hp{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pillbox{min-width:86px;background:var(--card2);border-left:3px solid var(--x,var(--green));border-radius:10px;text-align:center;padding:8px 10px}.pillbox b{display:block;color:var(--x,var(--green));font:900 18px var(--mono)}.pillbox span{font-size:8px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.04em}.kpis{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:10px;margin-bottom:14px}.kpi{border-top:3px solid var(--x,var(--green));text-align:left;padding:14px 12px;min-height:92px;transition:.14s}.kpi:hover{transform:translateY(-1px);box-shadow:var(--shadow2)}.kpi b{display:block;color:var(--x,var(--green));font:900 22px var(--mono);line-height:1}.kpi span{display:block;margin-top:8px;font-size:9px;font-weight:900;text-transform:uppercase;color:var(--muted);letter-spacing:.055em}.kpi small{display:block;color:var(--ink2);font-size:10px;font-weight:700;line-height:1.35;margin-top:4px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{overflow:hidden;margin-bottom:14px}.hd{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);background:rgba(247,250,248,.88)}.hd h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2);font-weight:900}.hd p{margin-top:3px;color:var(--muted);font-size:10px;font-weight:700}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 9px;color:var(--ink2);font-size:10px;font-weight:900}.chip.on{background:var(--green);border-color:var(--green);color:#fff}.wrap{overflow:auto;max-height:640px}table{width:100%;border-collapse:collapse}th{position:sticky;top:0;background:#fff;z-index:1;text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);font-size:9px;color:var(--muted);font-weight:900;text-transform:uppercase;white-space:nowrap;letter-spacing:.05em}td{padding:10px 12px;border-bottom:1px solid #EDF2EF;color:var(--ink2);font-size:11px;font-weight:650;vertical-align:top}tr:hover td{background:rgba(22,163,74,.035)}.num{font-family:var(--mono);font-weight:900}.link{font-weight:900;color:#101F16;text-decoration:none}.link:hover{color:var(--green);text-decoration:underline}.tag{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:3px 7px;font-size:9px;font-weight:900;white-space:nowrap}.green{color:var(--green);background:rgba(22,163,74,.08);border-color:rgba(22,163,74,.2)}.red{color:var(--red);background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.2)}.amber{color:var(--amber);background:rgba(217,119,6,.08);border-color:rgba(217,119,6,.2)}.blue{color:var(--blue);background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.2)}.purple{color:var(--purple);background:rgba(124,58,237,.08);border-color:rgba(124,58,237,.2)}.actionsList{padding:12px 16px}.act{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #EDF2EF}.act:last-child{border-bottom:0}.no{width:22px;height:22px;border-radius:8px;display:grid;place-items:center;font-size:10px;font-weight:900}.grow{flex:1}.grow b{font-size:12px}.grow small{display:block;margin-top:2px;color:var(--muted);font-size:10px}.rank{padding:14px 16px}.rank h4{font-size:11px;color:var(--red);margin:10px 0 8px}.minirow{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #EDF2EF}.empty{padding:24px;text-align:center;color:var(--muted);font-weight:800;font-size:12px}.drawer{position:fixed;inset:0;background:rgba(15,26,20,.35);backdrop-filter:blur(7px);z-index:999;display:none}.drawer.on{display:block}.box{position:absolute;right:18px;top:18px;bottom:18px;width:min(1100px,calc(100vw - 36px));background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.22);display:flex;flex-direction:column}.boxhd{display:flex;justify-content:space-between;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line)}.boxhd b{font-size:16px}.boxhd small{display:block;color:var(--muted);margin-top:2px}.x{width:34px;height:34px;border:1px solid var(--line);background:var(--card2);border-radius:10px;font-weight:900}.boxbody{overflow:auto;flex:1}@media(max-width:1300px){.kpis{grid-template-columns:repeat(4,1fr)}.grid2,.grid3{grid-template-columns:1fr}.hero{display:block}.hp{justify-content:flex-start;margin-top:12px}}@media(max-width:760px){.side{display:none}.main{margin-left:0;width:100%}.kpis{grid-template-columns:1fr 1fr}.content,.filters,.tabs{padding-left:12px;padding-right:12px}.top{padding-left:12px;padding-right:12px}}
</style>

<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">T</div><div><b>Talentera</b><small>Sales Command Center</small></div></div>
    <div id="nav"></div>
    <div class="user"><div class="u"><div class="av">SM</div><div><b style="color:#102019;font-size:12px">Sales Manager</b><small style="display:block;color:#6f877b">Admin · Riyadh</small></div></div></div>
  </aside>

  <main class="main">
    <header class="top">
      <div><div class="tt" id="title">Talentera</div><div class="ts" id="sub">Loading…</div></div>
      <div class="right"><div class="live" id="live">Live · Supabase</div><button class="btn" onclick="loadAll()">↻ Refresh</button></div>
    </header>
    <nav class="tabs" id="tabs"></nav>
    <section class="filters" id="filters"></section>
    <section class="content" id="content"><div class="empty">Loading dashboard…</div></section>
  </main>
</div>

<div class="drawer" id="drawer">
  <div class="box">
    <div class="boxhd"><div><b id="dt">Details</b><small id="ds"></small></div><button class="x" onclick="closeDrawer()">✕</button></div>
    <div class="boxbody" id="db"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://czaxtwbmborxwzaboqxl.supabase.co';
const SUPABASE_KEY='sb_publishable_uVUdpVWggu1WvkSKCAi51w_9qsb-AjX';
const PORTAL='145742477';
const HS='https://app-eu1.hubspot.com';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const view={
  acqReps:'vw_acquisition_sidebar_reps',
  acqKpi:'vw_acquisition_kpi_snapshot_periods',
  acqRep:'vw_acquisition_rep_kpi_periods',
  acqTeam:'vw_acquisition_team_snapshot',
  rank:'vw_acquisition_rank_details',
  rankCov:'vw_acquisition_rank_coverage',
  need:'vw_acquisition_leads_need_contact_v2',
  pipe:'vw_acquisition_pipeline_snapshot',
  deals:'vw_acquisition_pipeline_details',
  stage:'vw_acquisition_pipeline_by_stage',
  stuck:'vw_acquisition_stuck_deals',
  cold:'vw_acquisition_cold_deals',
  src:'vw_acquisition_field_sources',
  ret:'vw_retention_renewal_logic',
  retSide:'vw_retention_sidebar_reps',
  retKpi:'vw_retention_kpi_snapshot',
  retCov:'vw_retention_coverage_quality',
  notBudget:'vw_retention_not_in_budget',
  pnl:'vw_pnl_advanced_summary',
  pnlM:'vw_pnl_monthly_advanced',
  pnlB:'vw_pnl_cost_breakdown',
  pnlC:'vw_pnl_year_comparison',
  upS:'vw_features_plan_dashboard_summary',
  upC:'vw_features_plan_company_summary'
};

const S={main:'retention',tab:'retTeam',f:{year:'2026',month:'all',product:'all',owner:'all',country:'all',rank:'all',q:''},d:{},time:null};
const ACQ_ACTIVITY_OWNERS=['Marita Chedid','Zein Fares','Ursula Waked','Ahmad Khawajah','Mohammad Khalid','Mohammad Jehad Al-Barqawi','Jehad Al-Barqawi'];
const ACQ_DEAL_ONLY_OWNERS=['Fadi Zanona','Mohammed Faizan','Mohammad Faizan'];
const RETENTION_OWNERS=['Fadi Zanona','Mohammad Jehad Al-Barqawi','Jehad Al-Barqawi','Mohammed Faizan','Mohammad Faizan','Darshna Suresh','Haia Al-Zo’ubi','Haia Al-Zoubi','Hatem Alawneh','Maryam Alfarra','Sarah Al-jarrah','Sara Al-jarrah'];
let C={},cid=0;
const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function el(x){return document.getElementById(x)}
function n(v){let x=Number(String(v??'').replace(/[^0-9.-]/g,''));return isFinite(x)?x:0}
function i(v){return Math.round(n(v)).toLocaleString()}
function money(v){let x=n(v),s=x<0?'-':'',a=Math.abs(x);return s+'$'+(a>=1e6?(a/1e6).toFixed(1)+'M':Math.round(a).toLocaleString())}
function pct(v){return (n(v)||0).toFixed(0)+'%'}
function norm(v){return String(v??'').trim().toLowerCase()}function allowed(list,name){return list.some(x=>norm(x)===norm(name))}
function sum(a,k){return (a||[]).reduce((x,r)=>x+n(r[k]),0)}
function rows(k){return S.d[k]||[]}
function esc(v){return String(v??'').replace(/[&<>"]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[x]))}
function uniq(a){return [...new Set((a||[]).filter(Boolean).map(String))].sort((x,y)=>x.localeCompare(y))}
function recordUrl(r){return r.hubspot_url||r.hubspot_search_url||r.company_url||r.deal_url||((r.company_name||r.dealname||r.name)?`${HS}/contacts/${PORTAL}/objects/0-2/views/all/list?query=${encodeURIComponent(r.company_name||r.dealname||r.name)}`:'')}
function linkCell(v,r){let u=recordUrl(r);return u?`<a class="link" target="_blank" rel="noopener" href="${esc(u)}">${esc(v)}</a>`:esc(v)}
function ok(r){
  let f=S.f;
  return (f.q===''||Object.values(r).join(' ').toLowerCase().includes(f.q.toLowerCase()))
  &&(f.year==='all'||!r.year||String(r.year)===String(f.year))
  &&(f.owner==='all'||norm(r.owner_name)===norm(f.owner)||norm(r.rm_owner)===norm(f.owner)||norm(r.csm_owner)===norm(f.owner))
  &&(f.country==='all'||norm(r.country)===norm(f.country))
  &&(f.rank==='all'||norm(r.rank)===norm(f.rank))
  &&(f.month==='all'||!r.month||norm(String(r.month).slice(0,3))===norm(f.month))
  &&(f.product==='all'||!r.product||norm(r.product)===norm(f.product));
}

async function loadAll(){
  el('live').textContent='Refreshing…';
  await Promise.all(Object.entries(view).map(async([k,v])=>{
    try{
      let {data,error}=await sb.from(v).select('*').limit(5000);
      if(error) throw error;
      S.d[k]=data||[];
    }catch(e){
      S.d[k]=[];
      console.warn('Supabase view failed',v,e.message||e);
    }
  }));
  S.time=new Date();
  el('live').textContent='Live · Supabase';
  render();
}

function setMain(x){S.main=x;S.tab=x==='acquisition'?'acqTeam':x==='retention'?'retTeam':'pnl';render()}
function setTab(x){S.tab=x;render()}
function setF(k,v){S.f[k]=v;render()}
function cache(r){let id='c'+(++cid);C[id]=r||[];return id}
function openRows(t,r,s=''){let id=cache(r);openCache(id,t,s)}
function openCache(id,t,s=''){el('dt').textContent=t;el('ds').textContent=s||`${(C[id]||[]).length} rows`;el('db').innerHTML=tbl(t,C[id]||[],null,true);el('drawer').classList.add('on')}
function closeDrawer(){el('drawer').classList.remove('on')}

function val(v,k,r){
  if(v==null||v==='')return '—';
  if(['company_name','dealname','name','account'].includes(k))return linkCell(v,r);
  if(/url/i.test(k)&&String(v).startsWith('http'))return `<a class="tag blue" target="_blank" rel="noopener" href="${esc(v)}">Open</a>`;
  if(/amount|value|cash|book|revenue|pipeline|cost|collection|renewal|profit|cogs|overheads/i.test(k))return `<span class="num">${money(v)}</span>`;
  if(/pct|rate|coverage|score|margin/i.test(k))return `<span class="num">${pct(v)}</span>`;
  let s=String(v);
  if(/lost|delayed|churn|cold|stuck|overdue|risk/i.test(s))return `<span class="tag red">${esc(s)}</span>`;
  if(/expected|upcoming|pending|unknown|missing/i.test(s))return `<span class="tag amber">${esc(s)}</span>`;
  if(/won|cash|booked|renewed|active|completed|healthy|contacted/i.test(s))return `<span class="tag green">${esc(s)}</span>`;
  return esc(s);
}

function tbl(t,r,cols,drawerMode=false){
  r=(r||[]).filter(ok);
  cols=cols||Object.keys(r[0]||{}).slice(0,11);
  let id=cache(r);
  return `<section class="card"><div class="hd"><div><h3>${esc(t)}</h3><p>${r.length.toLocaleString()} rows</p></div>${!drawerMode&&r.length?`<button class="chip" onclick="openCache('${id}','${esc(t)}','${r.length.toLocaleString()} rows')">Open All</button>`:''}</div><div class="wrap">${r.length?`<table><thead><tr>${cols.map(c=>`<th>${esc(c).replaceAll('_',' ')}</th>`).join('')}</tr></thead><tbody>${r.slice(0,drawerMode?999:120).map(x=>`<tr>${cols.map(c=>`<td>${val(x[c],c,x)}</td>`).join('')}</tr>`).join('')}</tbody></table>`:'<div class="empty">No rows found</div>'}</div></section>`;
}

function kpi(l,v,s,c='g',r=null){
  const colorMap={g:'--g',b:'--b',p:'--p',a:'--a',r:'--r',c:'--c'};
  let id=r?cache(r):'';
  return `<button class="kpi" style="--x:var(${colorMap[c]||'--g'})" ${r?`onclick="openCache('${id}','${esc(l)}','${esc(s||'')}')"`:''}><b>${v}</b><span>${esc(l)}</span>${s?`<small>${esc(s)}</small>`:''}</button>`;
}

function sectionTitle(t){return `<div style="font-size:10px;font-weight:900;letter-spacing:.11em;text-transform:uppercase;color:#63776c;margin:15px 0 9px;display:flex;gap:8px;align-items:center"><span style="width:3px;height:14px;border-radius:2px;background:var(--green);display:inline-block"></span>${esc(t)}<span style="flex:1;height:1px;background:var(--line)"></span></div>`}
function hero(t,s,arr=[]){
  const colorMap={g:'--g',b:'--b',p:'--p',a:'--a',r:'--r',c:'--c'};
  return `<div class="hero"><div><h1>${esc(t)}</h1><p>${esc(s)}</p></div><div class="hp">${arr.map(x=>`<div class="pillbox" style="--x:var(${colorMap[x[3]]||'--g'})"><b>${x[1]}</b><span>${esc(x[0])}</span></div>`).join('')}</div></div>`;
}

function nav(){
  let h='<div class="sec">Main</div>';
  [['acquisition','📊','Acquisition'],['retention','🛡️','Retention'],['pnl','📊','P&L']].forEach(x=>h+=`<button class="nav ${S.main===x[0]?'on':''}" onclick="setMain('${x[0]}')"><span>${x[1]}</span><span>${x[2]}</span></button>`);
  if(S.main==='acquisition'){

function monthly(){
  let map={};
  rows('ret').filter(ok).forEach(r=>{
    let mo=String(r.month||'Unknown').slice(0,3)||'Unknown';
    map[mo]=map[mo]||{month:mo,due:0,renewed:0,booked:0,cashed:0,delayed:0,value:0,what_happens:''};
    let o=map[mo];o.due++;o.value+=n(r.renewal_value);
    if(n(r.booked_value)>0)o.booked++;
    if(n(r.collected_value)>0)o.cashed++;
    if(/delayed/i.test(String(r.renewal_status||r.status||'')))o.delayed++;
    if(n(r.booked_value)>0||n(r.collected_value)>0)o.renewed++;
    o.what_happens=o.delayed?`${o.delayed} delayed renewal(s) need action`:`${o.renewed} renewed`;
  });
  return tbl('Monthly Renewal Pipeline',Object.values(map),['month','due','renewed','booked','cashed','delayed','value','what_happens']);
}

  +`<div class="kpis">${kpi('Booking',money(sum(r,'booking')),'','g',mm)}${kpi('Cashing',money(sum(r,'cashing')),'','b',mm)}${kpi('COGS',money(sum(r,'cogs')),'','r',b)}${kpi('Overheads',money(sum(r,'overheads')),'','a',b)}${kpi('Support Allocation',money(sum(r,'support_allocation')),'','p',b)}${kpi('Total Cost',money(sum(r,'total_cost')),'','r',b)}${kpi('Net Cash',money(sum(r,'net_cash_position')),'','g',mm)}</div><div class="grid2">${tbl('P&L Product Summary',r)}${tbl('Year Comparison',rows('pnlC'))}</div>${tbl('Monthly P&L',mm)}`;
}

function pnlDetails(){
  return hero('P&L Cost Breakdown','COGS, overheads and support allocation by month/product.',[])
  +tbl('Cost Breakdown',rows('pnlB').filter(ok))

}
