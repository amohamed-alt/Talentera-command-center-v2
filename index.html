function rankItems(arr,cols){return arr.slice(0,7).map(r=>`<div class="rankItem"><div class="rankName"><b>${link(r.company_name||r.name||'—',r)}</b><small>${esc(r.owner_name||'—')} · ${esc(r.country||'—')}</small></div><div class="touchBadges"><span class="tag blue">${i(ownerConn(r))} calls</span><span class="tag purple">${i(ownerMeet(r))} meetings</span>${touchStatus(r)}</div></div>`).join('')||'<div class="empty">No untouched companies</div>'}
function needsSplit(needs){let online=needs.filter(r=>/online|inbound|form|web/i.test(String(r.source_type||r.source||''))),offline=needs.filter(r=>!online.includes(r));return `<section class="card"><div class="hd"><div><h3>📞 Needs To Contact</h3><p>Split online/offline · first rows only</p></div><button class="tag blue" onclick="openCache('${cache(needs)}','All Needs To Contact')">Open All</button></div><div class="grid2" style="padding:12px"><div>${miniList('Online / Inbound',online,'blue')}</div><div>${miniList('Offline / Outbound',offline,'amber')}</div></div></section>`}
function miniList(title,arr,color){return `<div class="card" style="margin:0"><div class="hd"><h3>${esc(title)}</h3><span class="tag ${color}">${i(arr.length)}</span></div><div style="padding:0 12px">${arr.slice(0,6).map(r=>`<div class="mini"><div>${link(r.company_name||r.name||'—',r)}<small style="display:block;color:var(--mut)">${esc(r.owner_name||'—')} · ${esc(r.country||'—')}</small></div><span class="tag red">0</span></div>`).join('')||'<div class="empty">No rows</div>'}</div></div>`}

function repHero(name,rep,open){let pipeline=money(sum(open,'amount'));return `<div class="repBlock repHero"><div class="repHeroMain"><div class="repAvatar">${esc(initials(name))}</div><div><div class="repTitle"><h1>${esc(name)}</h1><span class="repBadge">Needs Attention</span></div><div class="repMeta">${fmtDate(S.time||new Date())}</div></div></div><div class="repHeroStats">${repStat(i(numPick(rep,['calls_yesterday','yesterday_calls'],0)),'Calls','r')}${repStat(pct(numPick(rep,['conn_rate_yesterday','conversion_rate_yesterday','yesterday_connection_rate'],0)),'Rate','r')}${repStat(i(numPick(rep,['completed_yesterday','meetings_yesterday'],0)),'Meetings','p')}${repStat(pipeline,'Pipeline','c')}</div></div>`}
function repPeriodSummary(rep){let rowsData=[{title:'Yesterday',sub:'daily summary',calls:numPick(rep,['calls_yesterday','yesterday_calls']),rate:numPick(rep,['conn_rate_yesterday','conversion_rate_yesterday']),meetings:numPick(rep,['completed_yesterday','meetings_yesterday']),leads:numPick(rep,['leads_yesterday','contacts_yesterday','assigned_leads_yesterday']),won:numPick(rep,['won_yesterday','won_deals_yesterday']),wonAmount:money(numPick(rep,['won_amount_yesterday'])),lost:numPick(rep,['lost_yesterday','lost_deals_yesterday']),lostAmount:money(numPick(rep,['lost_amount_yesterday']))},{title:'MTD',sub:'month to date',calls:numPick(rep,['calls_mtd','mtd_calls']),rate:numPick(rep,['conn_rate_mtd','conversion_rate_mtd']),meetings:numPick(rep,['completed_mtd','meetings_mtd']),leads:numPick(rep,['leads_mtd','contacts_mtd','assigned_leads_mtd']),won:numPick(rep,['won_mtd','won_deals_mtd']),wonAmount:money(numPick(rep,['won_amount_mtd'])),lost:numPick(rep,['lost_mtd','lost_deals_mtd']),lostAmount:money(numPick(rep,['lost_amount_mtd']))},{title:'YTD',sub:'year to date',calls:numPick(rep,['calls_ytd','ytd_calls']),rate:numPick(rep,['conn_rate_ytd','conversion_rate_ytd']),meetings:numPick(rep,['completed_ytd','meetings_ytd']),leads:numPick(rep,['leads_ytd','contacts_ytd','assigned_leads_ytd']),won:numPick(rep,['won_ytd','won_deals_ytd']),wonAmount:money(numPick(rep,['won_amount_ytd'])),lost:numPick(rep,['lost_ytd','lost_deals_ytd']),lostAmount:money(numPick(rep,['lost_amount_ytd']))}];return `<section class="repBlock"><div class="repHd"><div><h3>📌 Yesterday · MTD · YTD Summary</h3><p>Calls, conversion, meetings, leads and outcomes</p></div></div><div class="sumWrap">${rowsData.map(r=>`<div class="sumRow"><div class="sumLabel"><b>${esc(r.title)}</b><small>${esc(r.sub)}</small></div>${sumCell(i(r.calls),'Calls','connected only','b')}${sumCell(pct(r.rate),'Conv. Rate','','r')}${sumCell(i(r.meetings),'Meetings','completed only','p')}${sumCell(i(r.leads),'Leads','all + BD','c')}${sumCell(i(r.won),'Won',r.won>0?r.wonAmount:'$0','g')}${sumCell(i(r.lost),'Lost',r.lost>0?r.lostAmount:'$0','r')}</div>`).join('')}</div></section>`}
function repNeedsSection(name,needs){let online=needs.filter(r=>/online|inbound|form|web/i.test(String(r.source_type||r.source||''))),offline=needs.filter(r=>!online.includes(r));let card=(title,arr,color)=>`<div class="miniBox"><div class="miniHd"><h4>${esc(title)}</h4><span class="tag ${color}">${i(arr.length)} contact${arr.length===1?'':'s'}</span></div><div class="miniListBody">${arr.slice(0,6).map(r=>`<div class="miniRow"><div class="miniRowMain"><b>${link(r.contact_name||r.company_name||r.name||r.contact_id||'—',r)}</b><small>${esc((r.source_type||r.source||'—'))} · ${esc(cleanCountryName(r.country||''))}${r.createdate||r.created_at?` · Created ${esc(String(r.createdate||r.created_at).slice(0,10))}`:''}</small></div><div class="age">${compactAge(r)}</div></div>`).join('')||'<div class="empty">No rows</div>'}${arr.length>6?`<div style="padding:8px 2px 4px;text-align:center"><button class="ghostBtn" onclick="openCache('${cache(arr)}','${esc(title)}')">Show ${i(arr.length-6)} more</button></div>`:''}</div></div>`;return `<section class="repBlock"><div class="repHd"><div><h3>📞 Needs To Contact · ${esc(name)}</h3><p>Contacts assigned to ${esc(name)} with 0 connected calls in the current data. Split by HubSpot source.</p></div><button class="tag red" onclick="openCache('${cache(needs)}','Needs To Contact - ${esc(name)}')">${i(needs.length)} contacts</button></div><div class="miniGrid">${card('Online / Inbound Needs Contact',online,'blue')}${card('Offline / Outbound Needs Contact',offline,'amber')}</div></section>`}
function repAiSection(name,stuck){let arr=[...stuck].sort((a,b)=>n(b.amount)-n(a.amount)||n(b.days_in_stage)-n(a.days_in_stage));return `<section class="repBlock"><div class="repHd"><div><h3>🧠 AI Coaching</h3><p>Highest priority stuck opportunities for ${esc(name)}</p></div><span class="tag purple">${i(arr.length)} deals</span></div><div class="listSection">${arr.slice(0,5).map(r=>`<div class="lineRow"><div class="lineRowMain"><b>${link(r.dealname||r.name||'—',r)}</b><small>${esc(r.dealstage||'—')} · Stuck ${compactAge(r)}</small></div><div class="amt">${money(r.amount)}</div></div>`).join('')||'<div class="empty">No rows found</div>'}${arr.length>5?`<div style="padding-top:8px;text-align:center"><button class="ghostBtn" onclick="openCache('${cache(arr)}','AI Coaching - ${esc(name)}')">Show ${i(arr.length-5)} more</button></div>`:''}</div></section>`}
function repLostSection(name,lost){let arr=[...lost].sort((a,b)=>n(b.amount)-n(a.amount));let reasonMap={};arr.forEach(r=>{let reason=lostReasonOf(r);reasonMap[reason]=reasonMap[reason]||{reason,count:0,amount:0};reasonMap[reason].count++;reasonMap[reason].amount+=n(r.amount)});let reasons=Object.values(reasonMap).sort((a,b)=>b.count-a.count||b.amount-a.amount).slice(0,4),max=Math.max(1,...reasons.map(r=>r.count));return `<section class="repBlock"><div class="repHd"><div><h3>❌ Lost Deals — ${esc(name)}</h3><p>Recently lost opportunities and the main reasons behind them</p></div><span class="tag red">${i(arr.length)} deals</span></div><div class="listSection">${arr.slice(0,4).map(r=>`<div class="lineRow"><div class="lineRowMain"><b>${link(r.dealname||'—',r)}</b><small>${esc(r.closedate||r.close_date||'—')} · ${esc(r.dealstage||'—')} · ${esc(lostReasonOf(r))}</small></div><div class="amt red">${money(r.amount)}</div></div>`).join('')||'<div class="empty">No lost deals</div>'}</div><div class="repHd" style="border-top:1px solid var(--line)"><div><h3>‼️ Why ${esc(name)} lost these deals</h3></div></div><div class="whyWrap">${reasons.map(r=>`<div class="whyCard"><div class="whyCardTop"><span>${esc(r.reason)}</span><span>${i(r.count)} deal${r.count===1?'':'s'} · ${money(r.amount)}</span></div><div class="bar"><i style="width:${Math.max(10,Math.round((r.count/max)*100))}%"></i></div></div>`).join('')||'<div class="empty">No reason breakdown</div>'}</div></section>`}
function repLeadSummary(name,rep,needs){let y=i(numPick(rep,['leads_yesterday','contacts_yesterday','assigned_leads_yesterday'],0)),m=i(numPick(rep,['leads_mtd','contacts_mtd','assigned_leads_mtd'],needs.length)),yy=i(numPick(rep,['leads_ytd','contacts_ytd','assigned_leads_ytd'],needs.length));return `<section class="repBlock"><div class="repHd"><div><h3>👥 Leads · ${esc(name)}</h3><p>Lead volume snapshot</p></div></div><div class="leadStrip"><div class="leadCell"><b>${y}</b><span>Yesterday</span><small>new / assigned leads</small></div><div class="leadCell"><b>${m}</b><span>MTD</span><small>month to date</small></div><div class="leadCell"><b>${yy}</b><span>YTD</span><small>year to date</small></div></div></section>`}
function acqRep(name){
  let rep=rows('acqRep').find(r=>norm(r.owner_name)===norm(name))||{};
  let needs=rows('need').filter(r=>norm(r.owner_name)===norm(name));
  let deals=rows('deals').filter(r=>norm(r.owner_name)===norm(name));
  let open=deals.filter(r=>norm(r.deal_status)==='open');
  let lost=deals.filter(r=>norm(r.deal_status)==='lost');
  let stuck=rows('stuck').filter(r=>norm(r.owner_name)===norm(name));
  let rank=rows('rank').filter(r=>norm(r.owner_name)===norm(name));
  let openCols=['dealname','dealstage','amount','next_activity_date','product','hubspot_url'];
  let stuckCols=['dealname','dealstage','days_in_stage','days_since_modified','amount','hubspot_url'];
  let stuckTable=tbl('',stuck,stuckCols,true).replace('<section class="card">','').replace(/<div class="hd">[\s\S]*?<\/div>/,'');
  return repHero(name,rep,open)
    + repPeriodSummary(rep)
    + repNeedsSection(name,needs)
    + repAiSection(name,stuck.length?stuck:open)
    + repLostSection(name,lost)
    + `<div class="twoColsAlt">${tbl('Open Deals',open,openCols)}${rankOverview(rank,name)}</div>`
    + `<section class="repBlock stuckTable"><div class="repHd"><div><h3>⏳ Stuck Deals (>21 days)</h3><p>Priority opportunities that need attention</p></div><span class="tag red">${i(stuck.length)}</span></div>${stuckTable}</section>`
    + repLeadSummary(name,rep,needs)
}
function dealOwner(name){let d=rows('deals').filter(r=>norm(r.owner_name)===norm(name)),open=d.filter(r=>norm(r.deal_status)==='open'),won=d.filter(r=>norm(r.deal_status)==='won'),lost=d.filter(r=>norm(r.deal_status)==='lost');return hero(name,'Deal-owner view only: open, won and lost acquisition pipeline.',[])+`<div class="kpis">${kpi('Open Deals',i(open.length),money(sum(open,'amount')),'p',open)}${kpi('Won Deals',i(won.length),money(sum(won,'amount')),'g',won)}${kpi('Lost Deals',i(lost.length),money(sum(lost,'amount')),'r',lost)}</div>${tbl('Deal Owner Pipeline',d,['dealname','dealstage','deal_status','amount','product','closedate','hubspot_url'])}`}
function acqFinancial(){let won=rows('deals').filter(r=>norm(r.deal_status)==='won'),open=rows('deals').filter(r=>norm(r.deal_status)==='open');return hero('Financial Details','Cashing revenue, signed/open contract and pending to cash.',[])+`<div class="kpis">${kpi('Cashing Revenue',money(sum(won,'amount')),`${i(won.length)} won`,'g',won)}${kpi('Signed/Open',money(sum(open,'amount')),`${i(open.length)} open`,'a',open)}${kpi('Pending To Cash',money(sum(open,'amount')),'follow-up','b',open)}</div><div class="grid2">${tbl('Cashing',won)}${tbl('Signed / Booking',open)}</div>`}
function retMetrics(){let r=rows('ret').filter(ok),del=r.filter(x=>/delayed/i.test(String(x.renewal_status||x.status||''))),book=r.filter(x=>n(x.booked_value)>0),cash=r.filter(x=>n(x.collected_value||x.cash_collected)>0);return{r,del,book,cash,renewal:sum(r,'renewal_value'),bookVal:sum(r,'booked_value'),cashVal:sum(r,'collected_value'),remain:sum(r,'remaining_collection_value')}}
function retTeam(){let x=retMetrics();return focus(true)+hero('Retention Team Overview','Renewal management, coverage quality, churn reasons and owner follow-up.',[])+`<div class="kpis">${kpi('Renewal Value',money(x.renewal),'','b',x.r)}${kpi('Booked',money(x.bookVal),'','p',x.book)}${kpi('Cash',money(x.cashVal),'','g',x.cash)}${kpi('Remaining',money(x.remain),'','b',x.r.filter(r=>n(r.remaining_collection_value)>0))}${kpi('Delayed',i(x.del.length),'needs action','r',x.del)}</div>`+period(rows('retKpi'),[['Calls Connected','connected_calls'],['Meetings Completed','meetings_completed'],['Renewed','renewed_count'],['Booked','booked_count'],['Cashed','cashed_count'],['Delayed','delayed_count']])+`<div class="grid2">${tbl('Unified Renewal Table',x.r,['company_name','tier','renewal_value','month','renewal_date','rm_owner','csm_owner','renewal_status','hubspot_search_url'])}${tbl('Coverage Quality',rows('retCov'))}</div>${tbl('Monthly Renewal Pipeline',monthlyRows())}`}
function monthlyRows(){let m={};rows('ret').filter(ok).forEach(r=>{let mo=String(r.month||'Unknown').slice(0,3)||'Unknown';m[mo]=m[mo]||{month:mo,due:0,renewed:0,booked:0,cashed:0,delayed:0,value:0};let o=m[mo];o.due++;o.value+=n(r.renewal_value);if(n(r.booked_value)>0)o.booked++;if(n(r.collected_value)>0)o.cashed++;if(/delayed/i.test(String(r.renewal_status||r.status||'')))o.delayed++;if(n(r.booked_value)>0||n(r.collected_value)>0)o.renewed++});return Object.values(m)}
function retFinancial(){let x=retMetrics(),not=rows('notBudget');return hero('Retention Financial Details','Budget, booking, collection, not-in-budget and renewal status split.',[])+`<div class="kpis">${kpi('Budget Renewal',money(x.renewal),`${i(x.r.length)} rows`,'b',x.r)}${kpi('Booked Total',money(x.bookVal),`${i(x.book.length)} booked`,'p',x.book)}${kpi('Cash Collected',money(x.cashVal),`${i(x.cash.length)} cashed`,'g',x.cash)}${kpi('Remaining',money(x.remain),'open collection','b',x.r.filter(r=>n(r.remaining_collection_value)>0))}${kpi('Delayed',i(x.del.length),'needs action','r',x.del)}${kpi('Not in Budget',i(not.length),'outside budget','a',not)}</div>${tbl('Owner Financial Summary',rows('retSide').filter(r=>allowed(RET,r.owner_name)))}${tbl('Booked Value Total',x.book)}${tbl('Cash Collected',x.cash)}${tbl('Delayed',x.del)}${tbl('Not In Budget',not)}`}
function retOwner(name){let r=rows('ret').filter(x=>ok(x)&&(norm(x.rm_owner)===norm(name)||norm(x.csm_owner)===norm(name)||norm(x.owner_name)===norm(name)));return hero(name,'Retention owner view: renewal rows and financial exposure.',[])+`<div class="kpis">${kpi('Accounts',i(r.length),'','b',r)}${kpi('Renewal Value',money(sum(r,'renewal_value')),'','g',r)}${kpi('Booked',money(sum(r,'booked_value')),'','p',r.filter(x=>n(x.booked_value)>0))}${kpi('Cash',money(sum(r,'collected_value')),'','g',r.filter(x=>n(x.collected_value)>0))}${kpi('Delayed',i(r.filter(x=>/delayed/i.test(String(x.renewal_status||x.status||''))).length),'','r',r.filter(x=>/delayed/i.test(String(x.renewal_status||x.status||''))))}</div>${tbl('Owner Renewal Rows',r)}`}
function features(){return hero('Features Plan for Upselling','Company-level feature plan and status.',[])+`<div class="grid2">${tbl('Features Plan Summary',rows('upS'))}${tbl('Company Summary',rows('upC'))}</div>`}
function pnl(){let r=rows('pnl'),mm=rows('pnlM'),b=rows('pnlB');return hero('Executive P&L Dashboard','Booking, cashing, cost breakdown and margin views.',[])+`<div class="kpis">${kpi('Booking',money(sum(r,'booking')),'','g',mm)}${kpi('Cashing',money(sum(r,'cashing')),'','b',mm)}${kpi('COGS',money(sum(r,'cogs')),'','r',b)}${kpi('Overheads',money(sum(r,'overheads')),'','a',b)}${kpi('Support Allocation',money(sum(r,'support_allocation')),'','p',b)}${kpi('Total Cost',money(sum(r,'total_cost')),'','r',b)}</div><div class="grid2">${tbl('P&L Product Summary',r)}${tbl('Year Comparison',rows('pnlC'))}</div>${tbl('Monthly P&L',mm)}`}
function pnlDetails(){return hero('P&L Cost Breakdown','COGS, overheads and support allocation by month/product.',[])+tbl('Cost Breakdown',rows('pnlB'))+tbl('Monthly Advanced',rows('pnlM'))}
loadAll();setInterval(loadAll,300000);
</script></body></html>
