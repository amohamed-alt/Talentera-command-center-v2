<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Talentera · Sales Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

/* === assets/css/base.css === */
/* base.css */
:root{
  --primary:#16A34A;--primary-dk:#15803D;
  --sb-bg:rgba(255,255,255,.72);--sb-text:#60786B;--sb-accent:#0F7A3C;--sb-border:rgba(22,64,42,.10);--sb-w:230px;
  --page-bg:#EEF6F1;--surface:rgba(255,255,255,.82);--surface2:rgba(255,255,255,.52);
  --border:rgba(22,64,42,.11);--text:#0B1F16;--text2:#263C31;--muted:#6E8378;
  --green:#16A34A;--green-bg:rgba(22,163,74,.09);--green-bd:rgba(22,163,74,.18);
  --red:#DC2626;--red-bg:rgba(220,38,38,.08);--red-bd:rgba(220,38,38,.16);
  --amber:#D97706;--amber-bg:rgba(217,119,6,.08);--amber-bd:rgba(217,119,6,.16);
  --blue:#2563EB;--blue-bg:rgba(37,99,235,.08);--blue-bd:rgba(37,99,235,.16);
  --purple:#7C3AED;--purple-bg:rgba(124,58,237,.08);--purple-bd:rgba(124,58,237,.16);
  --cyan:#0891B2;--cyan-bg:rgba(8,145,178,.08);--cyan-bd:rgba(8,145,178,.16);
  --r-sm:12px;--r:18px;--r-lg:24px;
  --sh-xs:0 8px 24px rgba(17,47,31,.06);
  --sh:0 16px 45px rgba(17,47,31,.09),0 2px 8px rgba(17,47,31,.05);
  --sh-md:0 22px 70px rgba(17,47,31,.13),0 4px 14px rgba(17,47,31,.06);
  --font:"Plus Jakarta Sans",system-ui,sans-serif;
  --mono:"DM Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--font);color:var(--text);min-height:100vh;
  background:
    radial-gradient(circle at 10% 8%,rgba(22,163,74,.18),transparent 30%),
    radial-gradient(circle at 86% 14%,rgba(8,145,178,.13),transparent 28%),
    radial-gradient(circle at 72% 86%,rgba(217,119,6,.08),transparent 26%),
    linear-gradient(135deg,#F8FCFA 0%,#EEF6F1 46%,#E7F1EC 100%);
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:-2;
  background:linear-gradient(115deg,rgba(255,255,255,.55),transparent 32%,transparent 70%,rgba(255,255,255,.38)),
    radial-gradient(circle at 24% 82%,rgba(255,255,255,.58),transparent 34%);
  mix-blend-mode:soft-light;
}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;opacity:.18;
  background-image:linear-gradient(rgba(15,122,60,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(15,122,60,.16) 1px,transparent 1px);
  background-size:34px 34px;
  mask-image:radial-gradient(circle at center,black 12%,transparent 78%);
}
button{font:inherit;cursor:pointer;border:none;background:none}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.app{display:flex;min-height:100vh}
/* === assets/css/components.css === */
/* components.css */

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sb-w);position:fixed;top:0;left:0;bottom:0;z-index:200;
  display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.48)),
    radial-gradient(circle at 20% 0%,rgba(22,163,74,.11),transparent 34%),
    radial-gradient(circle at 80% 78%,rgba(8,145,178,.08),transparent 35%);
  border-right:1px solid rgba(22,64,42,.10);
  box-shadow:inset -1px 0 0 rgba(255,255,255,.54),0 18px 55px rgba(17,47,31,.08);
  backdrop-filter:blur(26px) saturate(165%);-webkit-backdrop-filter:blur(26px) saturate(165%);
}
.sidebar-logo{padding:16px 16px 14px;border-bottom:1px solid rgba(22,64,42,.09);display:flex;flex-direction:column;gap:4px}
.logo-img{height:26px;width:auto;object-fit:contain}
.logo-sub{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.sidebar-section{padding:14px 14px 5px;font-size:9px;font-weight:700;color:rgba(107,131,120,.6);text-transform:uppercase;letter-spacing:.12em}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;margin:1px 6px;
  border-radius:var(--r-sm);cursor:pointer;transition:all .15s;
  color:var(--text2);font-size:12px;font-weight:600;
  border:1px solid transparent;width:calc(100% - 12px);text-align:left;
}
.nav-item:hover{background:rgba(255,255,255,.55);color:var(--primary-dk);border-color:rgba(22,64,42,.08)}
.nav-item.active{
  color:var(--primary-dk);font-weight:700;
  background:linear-gradient(135deg,rgba(255,255,255,.90),rgba(255,255,255,.55));
  border-color:rgba(22,163,74,.18);
  box-shadow:0 10px 24px rgba(17,47,31,.08),inset 0 1px 0 rgba(255,255,255,.78);
}
.nav-sub{margin-left:12px;font-size:11.5px}
.nav-icon{width:16px;text-align:center;font-size:14px;flex-shrink:0}
.nav-badge{margin-left:auto;background:rgba(220,38,38,.22);color:#FCA5A5;font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px}
.ret-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(8,145,178,.15);color:#22D3EE;border:1px solid rgba(8,145,178,.25)}
.sidebar-bottom{margin-top:auto;border-top:1px solid rgba(22,64,42,.09);padding:10px 6px}
.user-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;
  background:linear-gradient(180deg,rgba(255,255,255,.64),rgba(255,255,255,.36));border:1px solid rgba(22,64,42,.09);transition:background .15s}
.user-row:hover{background:rgba(255,255,255,.72)}
.user-av{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--green),var(--cyan));
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:var(--text)}.user-role{font-size:9px;color:var(--muted);margin-top:1px}

/* ── TOPBAR ── */
.main-area{margin-left:var(--sb-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{
  min-height:60px;margin:14px 18px 0;padding:0 22px;
  border:1px solid rgba(22,64,42,.10);border-radius:var(--r-lg);
  background:linear-gradient(180deg,rgba(255,255,255,.82),rgba(255,255,255,.52));
  box-shadow:0 10px 30px rgba(17,47,31,.08);
  backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
  display:flex;align-items:center;gap:14px;
}
.topbar-title{font-size:16px;font-weight:900;color:var(--text);letter-spacing:-.02em}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:6px;background:var(--green-bg);color:var(--green);
  font-size:10px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--green-bd);letter-spacing:.04em}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.refresh-btn{
  display:flex;align-items:center;gap:6px;padding:7px 14px;
  background:linear-gradient(135deg,var(--green),var(--primary-dk));color:#fff;
  border-radius:var(--r-sm);font-size:11px;font-weight:700;transition:all .15s;
  box-shadow:0 6px 18px rgba(22,163,74,.22);
}
.refresh-btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(22,163,74,.3)}
.refresh-btn.spinning #refreshIcon{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TABS BAR ── */
.tabs-bar{
  margin:10px 18px 0;padding:8px;
  border:1px solid rgba(22,64,42,.10);border-radius:22px;
  background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.44));
  box-shadow:0 8px 24px rgba(17,47,31,.06);
  backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);
  display:flex;overflow-x:auto;scrollbar-width:none;gap:4px;
}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{
  height:34px;padding:0 14px;border-radius:999px;border:1px solid transparent;
  font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;
  white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px;
}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.58);border-color:rgba(22,64,42,.08)}
.tab-btn.active{color:#fff;background:linear-gradient(135deg,var(--green),var(--primary-dk));
  border-color:transparent;box-shadow:0 8px 22px rgba(22,163,74,.2)}

/* ── CONTENT ── */
.content{padding:16px 18px 80px;flex:1}

/* ── LOADING / ERROR ── */
.loading-state{display:flex;align-items:center;gap:14px;padding:48px 24px;color:var(--muted);font-weight:700}
.spinner{width:22px;height:22px;border:2.5px solid rgba(22,64,42,.12);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.error-state{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r);padding:16px 18px;color:var(--red);font-weight:700}
.section-unavail{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r);padding:14px 16px;color:#92400e;font-size:12px;margin:8px 0}

/* ── PERIOD LABEL ── */
.period-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;
  margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.period-label::before{content:"";width:3px;height:14px;background:var(--green);border-radius:2px;display:block}
.period-label::after{content:"";flex:1;height:1px;background:var(--border)}

/* ── KPI SUMMARY GRID ── */
.summary-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-bottom:14px}
.sum-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 12px;position:relative;overflow:hidden;box-shadow:var(--sh-xs);
  transition:all .2s;cursor:pointer;
}
.sum-card:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.sum-card::after{content:"↗";position:absolute;top:8px;right:9px;font-size:9px;color:var(--muted);opacity:0;transition:opacity .15s}
.sum-card:hover::after{opacity:1}
.sum-card-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.sum-val{font-family:var(--mono);font-size:22px;font-weight:600;line-height:1;margin-top:4px}
.sum-lbl{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:8px}
.sum-sub{font-size:9px;color:var(--muted);margin-top:3px;font-weight:500}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px;box-shadow:var(--sh);transition:box-shadow .2s}
.card:hover{box-shadow:var(--sh-md)}
.card-hd{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2)}
.card-title{font-size:11px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:8px}
.card-title-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:9px 14px;text-align:left;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;position:sticky;top:0;z-index:2}
.tbl th.c,.tbl td.c{text-align:center}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(22,163,74,.04)}
.tbl tbody tr{cursor:pointer}
.tbl-wrap{overflow-x:auto}
.show-more-btn{width:100%;padding:9px;text-align:center;font-size:10px;font-weight:900;color:var(--green);
  border:none;border-top:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:var(--font)}
.show-more-btn:hover{background:var(--green-bg)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:3px 8px;border-radius:999px}
.bg{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.br{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.bb{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.bp{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.ba{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.bc{background:var(--cyan-bg);color:var(--cyan);border:1px solid var(--cyan-bd)}

/* ── STATUS PILLS ── */
.status-ok{color:var(--green);font-weight:900}
.status-bad{color:var(--red);font-weight:900}
.status-warn{color:var(--amber);font-weight:900}

/* ── HS LINK ── */
.hs-link{display:inline-flex;align-items:center;gap:4px;background:var(--blue-bg);color:var(--blue);
  border:1px solid var(--blue-bd);border-radius:6px;padding:3px 8px;font-size:10px;font-weight:800;transition:background .12s}
.hs-link:hover{background:#bfdbfe;text-decoration:none}

/* ── RECORD LINK ── */
.record-link{color:var(--blue);font-weight:700;text-decoration:none}
.record-link:hover{text-decoration:underline}

/* ── SECTION LABEL ── */
.manager-section-label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;
  padding:16px 0 8px;display:flex;align-items:center;gap:8px}
.manager-section-label::after{content:"";flex:1;height:1px;background:var(--border)}

/* ── TWO COL GRID ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── COMMAND PREVIEW (Acquisition focus strip) ── */
.focus-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  overflow:hidden;margin-bottom:14px;box-shadow:var(--sh)}
.focus-top{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 18px 10px}
.focus-title{font-size:16px;font-weight:900;color:var(--text);letter-spacing:-.02em}
.focus-sub{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600}
.focus-date{text-align:right;font-size:10px;color:var(--muted);font-weight:700}
.focus-date-val{font-size:12px;color:var(--text2);font-weight:800;margin-top:3px;display:block}
.focus-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 14px 14px}
.focus-pill{background:rgba(255,255,255,.58);border:1px solid var(--border);border-radius:var(--r);
  padding:12px;border-left:3px solid var(--fp-c,var(--green));cursor:pointer;transition:all .2s}
.focus-pill:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.focus-pill-value{font-family:var(--mono);font-size:26px;font-weight:900;color:var(--fp-c,var(--green));line-height:1}
.focus-pill-label{font-size:10px;font-weight:700;color:var(--text2);margin-top:6px;text-transform:uppercase;letter-spacing:.06em}
.focus-pill-sub{font-size:9px;color:var(--muted);margin-top:3px;font-weight:600}
.focus-row{font-size:11px;color:var(--text2);padding:9px 18px;border-top:1px solid var(--border);background:var(--surface2);font-weight:700}
.focus-row span{color:var(--green);margin-right:6px}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(17,47,31,.28);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.modal-box{
  background:rgba(255,255,255,.94);border:1px solid rgba(22,64,42,.12);
  border-radius:var(--r-lg);box-shadow:0 28px 90px rgba(17,47,31,.22);
  backdrop-filter:blur(18px);width:100%;max-width:1100px;max-height:85vh;
  display:flex;flex-direction:column;overflow:hidden;
}
.modal-hd{
  padding:16px 20px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-shrink:0;
  background:var(--surface2);
}
.modal-title{font-size:15px;font-weight:900;color:var(--text)}
.modal-sub{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600}
.modal-search{height:32px;border:1px solid var(--border);border-radius:var(--r-sm);padding:0 10px;
  font-size:11px;font-family:var(--font);background:rgba(255,255,255,.8);color:var(--text);outline:none;width:180px}
.modal-search:focus{border-color:rgba(22,163,74,.4);box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.modal-export-btn{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);
  border-radius:999px;padding:5px 11px;font-size:10px;font-weight:800;cursor:pointer;white-space:nowrap}
.modal-close-btn{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);
  border-radius:999px;padding:5px 10px;font-size:11px;font-weight:800;cursor:pointer}
.modal-body{overflow-y:auto;flex:1}
.modal-empty{padding:40px;text-align:center;color:var(--muted);font-size:13px;font-style:italic}

/* ── RATE BAR ── */
.rate-bar{width:48px;height:3px;background:rgba(22,64,42,.1);border-radius:2px;overflow:hidden;margin:4px auto 0}
.rate-fill{height:100%;border-radius:2px}

/* ── PIPELINE STAGE BARS ── */
.pipe-stages{display:flex;gap:6px;padding:14px;overflow-x:auto}
.pipe-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 8px;gap:3px;border-radius:var(--r-sm);min-width:90px;flex:1}
.ps-name{font-size:9px;font-weight:700;color:rgba(255,255,255,.85);text-align:center;line-height:1.2}
.ps-count{font-family:var(--mono);font-size:22px;font-weight:600;color:#fff}
.ps-amt{font-size:9px;color:rgba(255,255,255,.7);font-family:var(--mono)}

/* ── RESPONSIVE ── */
@media(max-width:1200px){.summary-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:900px){
  .sidebar{position:static;width:100%;border-right:none;border-bottom:1px solid var(--border)}
  .main-area{margin-left:0}
  .two-col,.three-col{grid-template-columns:1fr}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:700px){
  .topbar,.tabs-bar{margin-left:12px;margin-right:12px}
  .focus-grid{grid-template-columns:1fr 1fr}
  .content{padding:12px 12px 60px}
}
/* === assets/css/acquisition.css === */
/* acquisition.css */
.rank-a{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block}
.rank-b{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block}
.acq-country-chip{background:rgba(255,255,255,.58);border:1px solid var(--border);border-radius:999px;
  padding:4px 11px;font-size:10px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s}
.acq-country-chip:hover{background:rgba(255,255,255,.8);border-color:var(--green-bd)}
.acq-country-chip.active{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.acq-chips-row{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px;border-bottom:1px solid var(--border)}
.acq-rank-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.acq-rank-box{background:rgba(255,255,255,.5);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;text-align:center;cursor:pointer;transition:all .15s}
.acq-rank-box:hover{background:rgba(255,255,255,.8);transform:translateY(-1px)}
.acq-rank-v{font-family:var(--mono);font-size:20px;font-weight:900;line-height:1}

  document.getElementById('detailModal').style.display='flex';
  document.body.style.overflow='hidden';
  window.__modalUrlFn=rowUrlFn||null;
  document.getElementById('modalSearch').oninput=function(){
    const q=this.value.toLowerCase();
    _filtered=q?_rows.filter(r=>Object.values(r).some(v=>String(v||'').toLowerCase().includes(q))):_rows;
    document.getElementById('modalSub').textContent=`${_filtered.length} / ${_rows.length} rows`;
    render(window.__modalUrlFn);
  };
  document.getElementById('modalExportBtn').onclick=()=>exportCsv(title);
}

function openFromData(id){
  const d=(window.__openAllData||{})[id];
  if(!d)return;
  open(d);
}

function render(rowUrlFn){
  const {esc:e}=window.U;
  if(!_filtered.length){document.getElementById('modalBody').innerHTML='<div class="modal-empty">No rows to display</div>';return;}
  const thead=`<thead><tr>${_cols.map(c=>`<th class="${c.center?'c':''}">${e(c.label)}</th>`).join('')}</tr></thead>`;
  const tbody=_filtered.map(r=>{
    const url=rowUrlFn?rowUrlFn(r):r._url||r.hubspot_url||r.hubspot_company_url||r.company_url||r.hubspot_search_url||null;
    const attr=url?`onclick="window.open('${e(url)}','_blank')" style="cursor:pointer"`:'' ;
    return `<tr ${attr}>${_cols.map(c=>`<td class="${c.center?'c':''}">${c.render?c.render(r):e(r[c.key])}</td>`).join('')}</tr>`;
  }).join('');
  document.getElementById('modalBody').innerHTML=`<div class="tbl-wrap"><table class="tbl">${thead}<tbody>${tbody}</tbody></table></div>`;
}

function exportCsv(title){
  if(!_filtered.length)return;
  const headers=_cols.map(c=>c.label);
  const csvRows=[headers,..._filtered.map(r=>_cols.map(c=>{
    const v=c.csvVal?c.csvVal(r):(r[c.key]??'');
    const s=String(v).replace(/"/g,'""');
    return (s.includes(',') || s.includes('\n'))?`"${s}"`:s;
  }))];
  const blob=new Blob([csvRows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${(title||'export').replace(/\s+/g,'_')}.csv`;
  a.click();
}

function close(){
  document.getElementById('detailModal').style.display='none';
  document.body.style.overflow='';
}

// Wire close button and backdrop
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('modalCloseBtn').onclick=close;
  document.getElementById('detailModal').onclick=function(e){if(e.target===this)close();};
  document.addEventListener('keydown',e=>{if(e.key==='Escape')close();});
});

// Delegated card clicks
document.addEventListener('click',function(e){
  const card=e.target.closest('[data-onclick]');
  if(card){try{eval(card.dataset.onclick);}catch(err){console.error(err);}return;}
  const kpi=e.target.closest('[data-kpi-onclick]');
  if(kpi){try{eval(kpi.dataset.kpiOnclick);}catch(err){console.error(err);}return;}
});

window.Modal={open,openFromData,close};
window.__openAllData={};
})();

(function(){
'use strict';
const {esc,money,num,date,setTitle,setContent,showLoading}=window.U;
const {card,table}=window.Components;
const {get}=window.State;

const CO_COLS=[
  {label:'Company',key:'company_name'},{label:'Product',key:'product_line'},
  {label:'Owner',key:'owner_name'},{label:'CSM',key:'csm_owner'},
  {label:'Features',key:'features',center:true,render:r=>num(r.features)},
  {label:'Proposal',key:'proposal',center:true,render:r=>num(r.proposal)},
  {label:'Interested',key:'interested',center:true,render:r=>`<span style="color:var(--green);font-weight:900">${num(r.interested)}</span>`},
  {label:'Not Interested',key:'not_interested',center:true,render:r=>`<span style="color:var(--red);font-weight:900">${num(r.not_interested)}</span>`},
  {label:'Upsell',key:'upsell',center:true,render:r=>money(r.upsell)},
  {label:'Renewal',key:'renewal',center:true,render:r=>money(r.renewal)},
];
const FEAT_COLS=[
  {label:'Company',key:'company_name'},{label:'Feature',key:'feature_name'},{label:'Status',key:'feature_status'},
  {label:'Proposal Date',key:'proposal_sent_date',center:true,render:r=>date(r.proposal_sent_date)},
  {label:'Expected Month',key:'expected_month',center:true},
  {label:'Upsell Value',key:'upsell_value',center:true,render:r=>money(r.upsell_value)},
  {label:'Owner',key:'owner_name'},{label:'CSM',key:'csm_owner'},
];

function groupByCompany(rows){
  const map={};
  rows.forEach(r=>{
    const k=(r.company_name||'Unknown').toLowerCase().trim();
    if(!map[k])map[k]={company_name:r.company_name,product_line:r.product_line,owner_name:r.owner_name,csm_owner:r.csm_owner,features:0,proposal:0,interested:0,not_interested:0,upsell:0,renewal:0,_rows:[]};
    const c=map[k];c.features++;c._rows.push(r);
    const st=String(r.feature_status||'').toLowerCase();
    if(st.includes('proposal'))c.proposal++;
    if(st.includes('interested')&&!st.includes('not'))c.interested++;
    if(st.includes('not interested'))c.not_interested++;
    c.upsell=Math.max(c.upsell,Number(r.upsell_value||0));
    c.renewal=Math.max(c.renewal,Number(r.renewal_value||0));
  });
  return Object.values(map).sort((a,b)=>b.upsell-a.upsell);
}

async function render(){
  setTitle('Features Plan · Upselling','Upsell features grouped by company');
  showLoading('Loading Features Plan…');

  const rows=await get('features_plan_rows',2000).catch(()=>[]);
  const companies=groupByCompany(rows);

  const totalUpsell=companies.reduce((s,c)=>s+c.upsell,0);
  const totalProposal=companies.reduce((s,c)=>s+c.proposal,0);
  const totalInterested=companies.reduce((s,c)=>s+c.interested,0);
  const totalNot=companies.reduce((s,c)=>s+c.not_interested,0);

  // Unique filters
  const products=[...new Set(rows.map(r=>r.product_line).filter(Boolean))].sort();
  const owners=[...new Set(rows.map(r=>r.owner_name).filter(Boolean))].sort();
  let filterProduct='All',filterOwner='All';

  window._feat={companies,rows,filtered:companies};

  function getFiltered(){
    return companies.filter(c=>{
      if(filterProduct!=='All'&&c.product_line!==filterProduct)return false;
      if(filterOwner!=='All'&&c.owner_name!==filterOwner)return false;
      return true;
    });
  }
  function rerender(){
    const fc=getFiltered();
    window._feat.filtered=fc;
    document.getElementById('featTable').innerHTML=table(fc,CO_COLS,20);
    document.getElementById('featCount').textContent=fc.length+' companies';
  }

  const filterBar=`<div style="display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border)">
    <select class="pnl-select" onchange="window._featFilter('product',this.value)">
      <option value="All">All Products</option>
      ${products.map(p=>`<option>${esc(p)}</option>`).join('')}
    </select>
    <select class="pnl-select" onchange="window._featFilter('owner',this.value)">
      <option value="All">All Owners</option>
      ${owners.map(o=>`<option>${esc(o)}</option>`).join('')}
    </select>
    <button class="badge bb" onclick="window.Modal.open({title:'All Features',rows:window._feat.rows,cols:[]})">All ${rows.length} feature rows</button>
  </div>`;

  window._featFilter=function(type,val){
    if(type==='product')filterProduct=val;
    else filterOwner=val;
    rerender();
  };

  const summaryCards=`<div class="summary-grid">
    <div class="sum-card" style="cursor:pointer" onclick="window.Modal.open({title:'All Companies',rows:window._feat.filtered,cols:[]})" ><div class="sum-card-accent" style="background:var(--blue)"></div><div class="sum-val" style="color:var(--blue)">${num(companies.length)}</div><div class="sum-lbl">Companies</div></div>
    <div class="sum-card" style="cursor:pointer" onclick="window.Modal.open({title:'Proposal Sent',rows:window._feat.filtered.filter(c=>c.proposal>0),cols:[]})"><div class="sum-card-accent" style="background:var(--purple)"></div><div class="sum-val" style="color:var(--purple)">${num(totalProposal)}</div><div class="sum-lbl">Proposal Sent</div></div>
    <div class="sum-card" style="cursor:pointer" onclick="window.Modal.open({title:'Interested',rows:window._feat.filtered.filter(c=>c.interested>0),cols:[]})"><div class="sum-card-accent" style="background:var(--green)"></div><div class="sum-val" style="color:var(--green)">${num(totalInterested)}</div><div class="sum-lbl">Interested</div></div>
    <div class="sum-card" style="cursor:pointer" onclick="window.Modal.open({title:'Not Interested',rows:window._feat.filtered.filter(c=>c.not_interested>0),cols:[]})"><div class="sum-card-accent" style="background:var(--red)"></div><div class="sum-val" style="color:var(--red)">${num(totalNot)}</div><div class="sum-lbl">Not Interested</div></div>
    <div class="sum-card"><div class="sum-card-accent" style="background:var(--amber)"></div><div class="sum-val" style="color:var(--amber)">${money(totalUpsell)}</div><div class="sum-lbl">Total Upsell Value</div><div class="sum-sub">Company-unique max</div></div>
    <div class="sum-card"><div class="sum-card-accent" style="background:var(--cyan)"></div><div class="sum-val" style="color:var(--cyan)">${money(companies.reduce((s,c)=>s+c.renewal,0))}</div><div class="sum-lbl">Total Renewal Value</div><div class="sum-sub">Company-unique max</div></div>
  </div>`;

  const mainCard=`<div class="manager-section-label">Company Features Plan</div>
  ${card('<div class="card-title-icon" style="background:var(--blue-bg)">🚀</div> Company Features Plan',
    `<span class="badge bb" id="featCount">${companies.length} companies</span>`,
    filterBar+`<div id="featTable">${table(companies,CO_COLS,20)}</div>`)}`;

  setContent(summaryCards+mainCard);

  // Patch modal cols
  window.Modal._origOpen=window.Modal.open;
  CO_COLS.forEach(c=>{if(!c.render)c.render=null;});
  FEAT_COLS.forEach(c=>{if(!c.render)c.render=null;});
  window._feat.CO_COLS=CO_COLS;
  window._feat.FEAT_COLS=FEAT_COLS;
}

window.FeaturesPlanModule={render};
})();

];

function sumBy(rows,year,key){

}
function total(rows,year,key){return sumBy(rows,year,key).reduce((a,b)=>a+b,0);}

function drawCharts(rows){

  // YTD Bar
  const barEl=document.getElementById('pnlBar');

      labels:['Booking','Cashing','Total Cost'],
      datasets:[
        {label:'2025',data:[total(rows,'2025','booking'),total(rows,'2025','cashing'),total(rows,'2025','total_cost')],backgroundColor:'rgba(124,58,237,.35)',borderColor:'#7C3AED',borderWidth:1.5},
        {label:'2026',data:[total(rows,'2026','booking'),total(rows,'2026','cashing'),total(rows,'2026','total_cost')],backgroundColor:'rgba(22,163,74,.35)',borderColor:'#16A34A',borderWidth:1.5},
      ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:12}}},
      scales:{x:{ticks:{font:{size:9}},grid:{color:'rgba(22,64,42,.08)'}},y:{ticks:{font:{size:9},callback:v=>Math.abs(v)>=1e6?(v/1e6).toFixed(1)+'M':Math.abs(v)>=1e3?(v/1e3).toFixed(0)+'K':v},grid:{color:'rgba(22,64,42,.08)'}}}}
  });

  // Monthly trend line
  const lineEl=document.getElementById('pnlLine');

    type:'line',

      labels:MONTHS,
      datasets:[
        {label:'Booking 2026',data:sumBy(rows,'2026','booking'),borderColor:'#7C3AED',backgroundColor:'rgba(124,58,237,.08)',tension:.35,fill:true,borderWidth:2},
        {label:'Cashing 2026',data:sumBy(rows,'2026','cashing'),borderColor:'#16A34A',backgroundColor:'rgba(22,163,74,.08)',tension:.35,fill:true,borderWidth:2},
        {label:'Cost 2026',data:sumBy(rows,'2026','total_cost'),borderColor:'#D97706',backgroundColor:'rgba(217,119,6,.08)',tension:.35,fill:true,borderWidth:2},
        {label:'Booking 2025',data:sumBy(rows,'2025','booking'),borderColor:'rgba(124,58,237,.4)',tension:.35,fill:false,borderWidth:1.5,borderDash:[4,3]},
      ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:12}}},
      scales:{x:{ticks:{font:{size:9}},grid:{color:'rgba(22,64,42,.08)'}},y:{ticks:{font:{size:9},callback:v=>Math.abs(v)>=1e6?(v/1e6).toFixed(1)+'M':Math.abs(v)>=1e3?(v/1e3).toFixed(0)+'K':v},grid:{color:'rgba(22,64,42,.08)'}}}}
  });

  if(gapEl){
    const cash26=sumBy(rows,'2026','cashing');
    const cost26=sumBy(rows,'2026','total_cost');
    const gap=cash26.map((v,i)=>v-cost26[i]);
    _charts.gap=new Chart(gapEl,{
      type:'bar',
      data:{labels:MONTHS,datasets:[{label:'Cash - Cost Gap',data:gap,backgroundColor:gap.map(v=>v>=0?'rgba(22,163,74,.5)':'rgba(220,38,38,.5)'),borderColor:gap.map(v=>v>=0?'#16A34A':'#DC2626'),borderWidth:1.5}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{ticks:{font:{size:9}},grid:{color:'rgba(22,64,42,.08)'}},y:{ticks:{font:{size:9},callback:v=>Math.abs(v)>=1e6?(v/1e6).toFixed(1)+'M':v},grid:{color:'rgba(22,64,42,.08)'}}}}
    });
  }
}

  // Filters

// === assets/js/router.js ===
(function(){
'use strict';
const ROUTES={
  'acquisition':()=>window.AcquisitionModule.render(),
  'retention-team':()=>window.RetentionTeamModule.render(),
  'retention-financial':()=>window.RetentionFinancialModule.render(),
  'features-plan':()=>window.FeaturesPlanModule.render(),
  'pnl':()=>window.PnlModule.render(),
};

const PAGE_TITLES={
  'acquisition':'Acquisition · Team Overview',
  'retention-team':'Retention · Team Overview',
  'retention-financial':'Retention · Financial Details',
  'features-plan':'Retention · Features Plan',
  'pnl':'P&L · Revenue Analysis',
};

function navigate(route){
  if(!ROUTES[route]) route='acquisition';
  window.State.setRoute(route);

  // Update active states — sidebar nav
  document.querySelectorAll('.nav-item[data-route]').forEach(el=>{
    el.classList.toggle('active',el.dataset.route===route);
  });
  // Update active states — tab bar
  document.querySelectorAll('.tab-btn[data-route]').forEach(el=>{
    el.classList.toggle('active',el.dataset.route===route);
  });

  // Show/hide tabs bar
  const tabsBar=document.getElementById('tabsBar');
  if(tabsBar) tabsBar.style.display='flex';

  window.scrollTo({top:0,behavior:'smooth'});

  ROUTES[route]().catch(err=>{
    window.U.showError('Route error: '+err.message);
    console.error(err);
  });
}

// Wire all nav buttons
document.querySelectorAll('[data-route]').forEach(btn=>{
  btn.addEventListener('click',()=>navigate(btn.dataset.route));
});

// Refresh button
document.getElementById('refreshBtn').addEventListener('click',function(){
  this.classList.add('spinning');
  window.State.flush();
  navigate(window.State.route);
  setTimeout(()=>this.classList.remove('spinning'),1500);
});

// Fix modal open for empty cols (pass STATUS_COLS from context)
const _origModalOpen=window.Modal.open.bind(window.Modal);
window.Modal.open=function(opts){
  if(!opts.cols||!opts.cols.length){
    // Try to infer cols from first row
    if(opts.rows&&opts.rows.length){
      opts.cols=Object.keys(opts.rows[0]).filter(k=>!k.startsWith('_')).map(k=>({label:k.replace(/_/g,' ').replace(/\w/g,c=>c.toUpperCase()),key:k}));
    }
  }
  _origModalOpen(opts);
};

// Boot
navigate(window.State.route);
})();

</script>
