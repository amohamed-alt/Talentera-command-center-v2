<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Talentera · Sales Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#16A34A;--primary-dk:#15803D;
  --sb-w:240px;
  --page-bg:#EEF6F1;
  --surface:rgba(255,255,255,.85);--surface2:rgba(255,255,255,.55);
  --border:rgba(22,64,42,.11);--border2:rgba(22,64,42,.06);
  --text:#0B1F16;--text2:#263C31;--muted:#6E8378;
  --green:#16A34A;--green-bg:rgba(22,163,74,.09);--green-bd:rgba(22,163,74,.20);
  --red:#DC2626;--red-bg:rgba(220,38,38,.08);--red-bd:rgba(220,38,38,.18);
  --amber:#D97706;--amber-bg:rgba(217,119,6,.08);--amber-bd:rgba(217,119,6,.18);
  --blue:#2563EB;--blue-bg:rgba(37,99,235,.08);--blue-bd:rgba(37,99,235,.18);
  --purple:#7C3AED;--purple-bg:rgba(124,58,237,.08);--purple-bd:rgba(124,58,237,.18);
  --cyan:#0891B2;--cyan-bg:rgba(8,145,178,.08);--cyan-bd:rgba(8,145,178,.18);
  --r-sm:10px;--r:16px;--r-lg:22px;
  --sh-xs:0 4px 14px rgba(17,47,31,.06);
  --sh:0 14px 40px rgba(17,47,31,.09),0 2px 6px rgba(17,47,31,.05);
  --sh-lg:0 24px 64px rgba(17,47,31,.14);
  --font:"Plus Jakarta Sans",system-ui,sans-serif;
  --mono:"DM Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--font);color:var(--text);min-height:100vh;
  background:
    radial-gradient(circle at 10% 8%,rgba(22,163,74,.15),transparent 30%),
    radial-gradient(circle at 86% 14%,rgba(8,145,178,.11),transparent 28%),
    linear-gradient(135deg,#F8FCFA 0%,#EEF6F1 50%,#E7F1EC 100%);
}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;opacity:.14;
  background-image:linear-gradient(rgba(15,122,60,.18) 1px,transparent 1px),
    linear-gradient(90deg,rgba(15,122,60,.18) 1px,transparent 1px);
  background-size:32px 32px;
  mask-image:radial-gradient(ellipse at center,black 20%,transparent 75%);
}
button{font:inherit;cursor:pointer;border:none;background:none}
a{color:var(--blue);text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(22,64,42,.15);border-radius:4px}
.app{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sb-w);position:fixed;top:0;left:0;bottom:0;z-index:200;
  display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
  background:linear-gradient(170deg,rgba(255,255,255,.78) 0%,rgba(240,252,246,.65) 100%);
  border-right:1px solid rgba(22,64,42,.10);
  backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
  box-shadow:1px 0 0 rgba(255,255,255,.55),0 0 40px rgba(17,47,31,.07);
}
.sb-logo{padding:14px 14px 12px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px}
.sb-logo-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#16A34A,#0891B2);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:16px;flex-shrink:0}
.sb-logo-text{font-size:13px;font-weight:800;color:var(--text);line-height:1.1}
.sb-logo-sub{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.sb-section{padding:12px 12px 4px;font-size:9px;font-weight:800;color:rgba(107,131,120,.55);
  text-transform:uppercase;letter-spacing:.14em;display:flex;align-items:center;gap:6px}
.sb-section::after{content:"";flex:1;height:1px;background:var(--border2)}
.nav-btn{
  display:flex;align-items:center;gap:8px;padding:7px 10px;margin:1px 6px;
  border-radius:var(--r-sm);cursor:pointer;transition:all .14s;
  color:var(--text2);font-size:12px;font-weight:600;border:1px solid transparent;
  width:calc(100% - 12px);text-align:left;
}
.nav-btn:hover{background:rgba(255,255,255,.6);color:var(--primary-dk);border-color:rgba(22,64,42,.08)}
.nav-btn.active{
  color:var(--primary-dk);font-weight:700;
  background:linear-gradient(135deg,rgba(255,255,255,.92),rgba(255,255,255,.58));
  border-color:rgba(22,163,74,.20);
  box-shadow:0 8px 20px rgba(17,47,31,.08),inset 0 1px 0 rgba(255,255,255,.8);
}
.nav-btn.sub{margin-left:14px;font-size:11.5px;opacity:.92}
.nav-btn.view-only{opacity:.6}
.nav-icon{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.nav-chip{margin-left:auto;font-size:8px;font-weight:800;padding:1px 5px;border-radius:4px;flex-shrink:0}
.chip-view{background:rgba(107,131,120,.15);color:var(--muted)}
.chip-rm{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.chip-csm{background:var(--cyan-bg);color:var(--cyan);border:1px solid var(--cyan-bd)}
.chip-acq{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.sb-bottom{margin-top:auto;border-top:1px solid var(--border2);padding:8px 6px}
.user-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);
  background:rgba(255,255,255,.55);border:1px solid var(--border2)}
.user-av{width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--green),var(--cyan));
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;flex-shrink:0}
.user-name{font-size:12px;font-weight:700;color:var(--text)}
.user-role{font-size:9px;color:var(--muted)}

/* ── MAIN ── */
.main-area{margin-left:var(--sb-w);flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:12px;z-index:100;margin:12px 16px 0;
  min-height:58px;padding:0 20px;
  background:rgba(255,255,255,.88);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid rgba(22,64,42,.10);border-radius:var(--r-lg);
  box-shadow:var(--sh);display:flex;align-items:center;gap:14px;
}
.topbar-title{font-size:15px;font-weight:900;color:var(--text);letter-spacing:-.02em}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:5px;background:var(--green-bg);color:var(--green);
  font-size:10px;font-weight:700;padding:5px 11px;border-radius:20px;border:1px solid var(--green-bd)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  animation:livepulse 2s ease infinite}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.3}}
.refresh-btn{
  display:flex;align-items:center;gap:5px;padding:6px 13px;
  background:linear-gradient(135deg,var(--green),var(--primary-dk));color:#fff;
  border-radius:10px;font-size:11px;font-weight:700;
  box-shadow:0 4px 14px rgba(22,163,74,.25);transition:all .14s;
}
.refresh-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(22,163,74,.3)}
.refresh-btn.spin #refresh-icon{display:inline-block;animation:spn .7s linear infinite}
@keyframes spn{to{transform:rotate(360deg)}}

/* ── TABS ── */
.tabs-bar{
  margin:10px 16px 0;padding:7px 8px;
  background:rgba(255,255,255,.70);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(22,64,42,.09);border-radius:20px;
  box-shadow:var(--sh-xs);display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;
}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{
  height:32px;padding:0 13px;border-radius:999px;border:1px solid transparent;
  font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;
  white-space:nowrap;transition:all .14s;display:flex;align-items:center;gap:5px;
}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.65);border-color:var(--border2)}
.tab-btn.active{color:#fff;background:linear-gradient(135deg,var(--green),var(--primary-dk));
  box-shadow:0 6px 18px rgba(22,163,74,.22)}

/* ── CONTENT ── */
.content{padding:14px 16px 80px;flex:1}
#appContent{display:flex;flex-direction:column;gap:14px}

/* ── STATES ── */
.loading-state{display:flex;align-items:center;gap:12px;padding:48px 20px;color:var(--muted);font-weight:700}
.spinner{width:20px;height:20px;border:2.5px solid rgba(22,64,42,.1);border-top-color:var(--green);
  border-radius:50%;animation:spn .7s linear infinite;flex-shrink:0}
.err-state{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r);
  padding:14px 16px;color:var(--red);font-weight:700;font-size:12px}
.unavail{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r);
  padding:12px 14px;color:#92400e;font-size:11px;margin:4px 0}

/* ── SUMMARY GRID ── */
.sum-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
.sum-grid.g4{grid-template-columns:repeat(4,1fr)}
.sum-grid.g6{grid-template-columns:repeat(6,1fr)}
.sum-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:14px 12px 12px;position:relative;overflow:hidden;box-shadow:var(--sh-xs);
  transition:all .18s;
}
.sum-card.clickable{cursor:pointer}
.sum-card.clickable:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.sum-card.clickable::after{content:"↗";position:absolute;top:8px;right:9px;
  font-size:9px;color:var(--muted);opacity:0;transition:.14s}
.sum-card.clickable:hover::after{opacity:1}
.sum-accent{position:absolute;top:0;left:0;right:0;height:3px}
.sum-val{font-family:var(--mono);font-size:22px;font-weight:600;line-height:1;margin-top:6px}
.sum-lbl{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;
  letter-spacing:.1em;margin-top:9px}
.sum-sub{font-size:9px;color:var(--muted);margin-top:3px;font-weight:500}

/* ── FOCUS STRIP ── */
.focus-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh)}
.focus-top{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 18px 10px}
.focus-title{font-size:17px;font-weight:900;color:var(--text);letter-spacing:-.02em}
.focus-sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:3px}
.focus-ts{font-size:9px;color:var(--muted);font-weight:700;text-align:right}
.focus-ts-val{display:block;font-size:11px;color:var(--text2);font-weight:800;margin-top:2px}
.focus-pills{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 14px 14px}
.focus-pill{background:rgba(255,255,255,.6);border:1px solid var(--border);border-radius:var(--r);
  padding:12px;border-left:3px solid var(--fp-c,var(--green));cursor:pointer;transition:all .18s}
.focus-pill:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.focus-pill-v{font-family:var(--mono);font-size:26px;font-weight:900;color:var(--fp-c,var(--green));line-height:1}
.focus-pill-l{font-size:9px;font-weight:800;color:var(--text2);margin-top:6px;text-transform:uppercase;letter-spacing:.06em}
.focus-pill-s{font-size:9px;color:var(--muted);margin-top:3px;font-weight:600}
.focus-health{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 14px 14px}
.fh-card{background:rgba(255,255,255,.55);border:1px solid var(--border);border-radius:var(--r);padding:14px;overflow:hidden;position:relative}
.fh-accent{position:absolute;top:0;left:0;right:0;height:3px}
.fh-title{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.fh-val{font-family:var(--mono);font-size:26px;font-weight:900;line-height:1}
.fh-lbl{font-size:9px;color:var(--muted);font-weight:700;margin-top:4px}
.fh-bar{height:3px;background:rgba(22,64,42,.08);border-radius:2px;overflow:hidden;margin:8px 0 4px}
.fh-fill{height:100%;border-radius:2px;transition:width .6s ease}
.fh-sub{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.fh-mini-v{font-family:var(--mono);font-size:14px;font-weight:900}
.fh-mini-l{font-size:7px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.focus-insight{font-size:11px;color:var(--text2);padding:8px 18px;border-top:1px solid var(--border);
  background:var(--surface2);font-weight:600}
.focus-insight strong{color:var(--primary-dk)}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh)}
.card-hd{padding:11px 16px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;background:var(--surface2)}
.card-title{font-size:11px;font-weight:800;color:var(--text2);display:flex;align-items:center;gap:7px}
.card-icon{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px}

/* ── SECTION LABEL ── */
.section-lbl{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;
  letter-spacing:.14em;display:flex;align-items:center;gap:8px;margin:2px 0 8px}
.section-lbl::before{content:"";width:3px;height:12px;background:var(--green);border-radius:2px}
.section-lbl::after{content:"";flex:1;height:1px;background:var(--border)}

/* ── TWO / THREE COL ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 13px;text-align:left;font-size:9px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.1em;font-weight:700;border-bottom:1px solid var(--border);background:var(--surface2);
  white-space:nowrap;position:sticky;top:0;z-index:2}
.tbl th.c,.tbl td.c{text-align:center}
.tbl td{padding:9px 13px;border-bottom:1px solid var(--border2);color:var(--text2);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(22,163,74,.03)}
.tbl-empty{padding:24px;text-align:center;color:var(--muted);font-size:12px;font-style:italic}
.show-more{width:100%;padding:9px;text-align:center;font-size:10px;font-weight:800;color:var(--green);
  border-top:1px solid var(--border);background:var(--surface);cursor:pointer}
.show-more:hover{background:var(--green-bg)}

/* ── BADGES / CHIPS ── */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;
  padding:3px 8px;border-radius:999px}
.bg{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.br{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.bb{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.bp{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.ba{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.bc{background:var(--cyan-bg);color:var(--cyan);border:1px solid var(--cyan-bd)}
.rank-a{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block}
.rank-b{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block}
.status-ok{color:var(--green);font-weight:900;font-size:11px}
.status-bad{color:var(--red);font-weight:900;font-size:11px}
.status-warn{color:var(--amber);font-weight:900;font-size:11px}
.fin-pill{display:inline-flex;align-items:center;font-size:9px;font-weight:800;padding:2px 7px;border-radius:999px}
.fp-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.fp-bad{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.fp-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.fp-info{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.fp-muted{background:rgba(107,131,120,.1);color:var(--muted)}
.hs-link{display:inline-flex;align-items:center;gap:3px;background:var(--blue-bg);color:var(--blue);
  border:1px solid var(--blue-bd);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:800}
.hs-link:hover{background:#bfdbfe;text-decoration:none}
.record-link{color:var(--blue);font-weight:700}
.record-link:hover{text-decoration:underline}

/* ── RETENTION SPECIFIC ── */
.ret-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ret-kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:14px 12px;box-shadow:var(--sh-xs);cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.ret-kpi:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.ret-kpi::after{content:"↗ Details";position:absolute;top:8px;right:9px;font-size:8px;color:var(--muted);opacity:0;transition:.14s}
.ret-kpi:hover::after{opacity:1}
.ret-kpi-accent{position:absolute;top:0;left:0;right:0;height:3px}
.ret-kpi-v{font-family:var(--mono);font-size:24px;font-weight:900;line-height:1;margin-top:6px}
.ret-kpi-l{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:9px}
.ret-kpi-s{font-size:9px;color:var(--muted);font-weight:600;margin-top:3px}
.ret-period-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
.ret-period-col{background:var(--surface2);padding:14px 16px}
.ret-period-hd{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.ret-period-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(22,64,42,.05)}
.ret-period-row:last-child{border-bottom:0}
.ret-period-k{font-size:10px;color:var(--muted);font-weight:600}
.ret-period-v{font-family:var(--mono);font-size:13px;font-weight:900;color:var(--text)}
.cov-line{display:grid;grid-template-columns:140px 1fr 56px;gap:10px;align-items:center;margin-bottom:10px}
.cov-lbl{font-size:10px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:5px}
.cov-bar{height:7px;background:rgba(22,64,42,.07);border-radius:999px;overflow:hidden}
.cov-fill{height:100%;border-radius:999px;transition:width .6s ease}
.cov-pct{font-family:var(--mono);font-size:11px;font-weight:900;color:var(--text2);text-align:right}

/* ── FIN CARDS ── */
.fin-card-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.fin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:14px 12px;border-left:4px solid var(--fc,var(--green));box-shadow:var(--sh-xs);
  cursor:pointer;transition:all .18s;position:relative}
.fin-card:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.fin-card::after{content:"↗";position:absolute;top:9px;right:10px;font-size:9px;color:var(--muted);opacity:0;transition:.14s}
.fin-card:hover::after{opacity:1}
.fin-card-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:14px;background:rgba(255,255,255,.7);border:1px solid var(--border);margin-bottom:8px}
.fin-card-v{font-family:var(--mono);font-size:20px;font-weight:900;line-height:1}
.fin-card-l{font-size:8px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:8px}
.fin-card-s{font-size:9px;color:var(--text2);font-weight:600;margin-top:4px;line-height:1.4}
.status-split-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 14px;border-bottom:1px solid var(--border2)}

  }

  // Wire immediately if DOM ready, else wait

})();

/* Build sidebar reps */
function buildSidebar(reps){
  const el=document.getElementById('sideRepLinks');
  const titleEl=document.getElementById('sideRepTitle');
  if(titleEl)titleEl.textContent='Acquisition Reps';
  if(!el)return;
  const repMap={};
  (reps||[]).forEach(r=>repMap[r.owner_name]=r);
  const mkBtn=(name,isView)=>{
    const r=repMap[name]||{};
    const cls='nav-btn sub'+(isView?' view-only':'');
    const chip=isView?'<span class="nav-chip chip-view">VIEW</span>':'<span class="nav-chip chip-acq">'+num(r.meetings_completed||0)+'</span>';
    return '<button class="'+cls+'" data-route="acq-rep" data-rep="'+esc(name)+'"><span class="nav-icon">👤</span>'+esc(name.split(' ')[0])+chip+'</button>';
  };
  el.innerHTML=ACQ_REPS.map(n=>mkBtn(n,false)).join('')+VIEW_ONLY.map(n=>mkBtn(n,true)).join('');
  el.querySelectorAll('[data-rep]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderRep(btn.dataset.rep);
    });
  });
}

async function renderRep(ownerName){

    get('vw_dash_acq_sidebar_fast',50),

    get('vw_acquisition_stuck_deals',200),

  const reps=repsR.status==='fulfilled'?repsR.value:[];
  const pipe=pipeR.status==='fulfilled'?pipeR.value.filter(r=>r.owner_name===ownerName):[];
  const stuck=stuckR.status==='fulfilled'?stuckR.value.filter(r=>r.owner_name===ownerName):[];
  const rank=rankR.status==='fulfilled'?rankR.value.filter(r=>r.owner_name===ownerName):[];

  window._repData={pipe,stuck,rank,rep};

  const banner=isView?'<div class="unavail">👁 View Only — '+esc(ownerName)+' is in read-only mode.</div>':'';

  const cards=`<div class="sum-grid g4">
    ${sumCard('Calls Logged',num(rep.calls_logged),'Total calls','var(--blue)','')}
    ${sumCard('Connected',num(rep.connected_calls),'Connected calls','var(--cyan)','')}
    ${sumCard('Meetings Done',num(rep.meetings_completed),'Completed','var(--purple)','')}
    ${sumCard('Open Deals',num(pipe.length),money(pipe.reduce((s,r)=>s+Number(r.amount||0),0)),'var(--green)','Modal.open({title:"Open Deals",rows:window._repData.pipe,cols:[]})')}
  </div>`;

  const pipeSection=card('<div class="card-icon" style="background:var(--green-bg)">💼</div> Open Pipeline — '+esc(ownerName),
    '<button class="badge bg" onclick="Modal.open({title:\'Pipeline\',rows:window._repData.pipe,cols:[]})">All '+pipe.length+'</button>',

  window.U.setContent(banner+cards+pipeSection+(stuckSection?'<div class="section-lbl">Stuck</div>'+stuckSection:''));

function buildRetSidebar(coverage){
  const el=document.getElementById('sideRepLinks');
  const titleEl=document.getElementById('sideRepTitle');
  if(titleEl)titleEl.textContent='Retention Team';
  if(!el)return;
  if(!coverage||!coverage.length){el.innerHTML='<div style="padding:6px 10px;font-size:11px;color:var(--muted)">Loading team…</div>';return;}
  el.innerHTML=coverage.map(o=>{
    const role=String(o.role||'').toUpperCase();
    const chipCls=role==='RM'?'chip-rm':'chip-csm';
    return '<button class="nav-btn sub" data-route="ret-owner" data-owner="'+esc(o.owner_name)+'" data-role="'+esc(o.role)+'">'
      +'<span class="nav-icon">'+(role==='RM'?'◆':'●')+'</span>'
      +esc((o.owner_name||'').split(' ')[0])
      +'<span class="nav-chip '+chipCls+'">'+esc(role)+'</span>'
      +'<span class="nav-chip" style="background:var(--amber-bg);color:var(--amber);margin-left:2px">'+num(o.delayed_accounts||0)+'</span>'
      +'</button>';
  }).join('');
  el.querySelectorAll('[data-owner]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderOwner(btn.dataset.owner,btn.dataset.role);
    });
  });
}

/* ── FEATURES PLAN MODULE ── */
window.FeatModule=(function(){
'use strict';
const {esc,money,num,dt,setTitle,loading}=window.U;
const {sumCard,table,card}=window.C;
const {get}=window.State;

const CO_COLS=[
  {label:'Company',key:'company_name'},{label:'Product',key:'product_line'},
  {label:'Owner',key:'owner_name'},{label:'CSM',key:'csm_owner'},
  {label:'Features',key:'features',center:true,render:r=>num(r.features)},
  {label:'Proposal',key:'proposal',center:true,render:r=>num(r.proposal)},
  {label:'Interested',key:'interested',center:true,render:r=>'<span style="color:var(--green);font-weight:900">'+num(r.interested)+'</span>'},
  {label:'Not Interested',key:'not_interested',center:true,render:r=>'<span style="color:var(--red);font-weight:900">'+num(r.not_interested)+'</span>'},
  {label:'Upsell',key:'upsell',center:true,render:r=>money(r.upsell)},
  {label:'Renewal',key:'renewal',center:true,render:r=>money(r.renewal)},
];

function groupByCompany(rows){
  const map={};
  rows.forEach(r=>{
    const k=(r.company_name||'Unknown').toLowerCase().trim();
    if(!map[k])map[k]={company_name:r.company_name,product_line:r.product_line,
      owner_name:r.owner_name,csm_owner:r.csm_owner,features:0,proposal:0,interested:0,not_interested:0,upsell:0,renewal:0};
    const c=map[k];c.features++;
    const st=String(r.feature_status||'').toLowerCase();
    if(st.includes('proposal'))c.proposal++;
    if(st.includes('interested')&&!st.includes('not'))c.interested++;
    if(st.includes('not interested'))c.not_interested++;
    c.upsell=Math.max(c.upsell,Number(r.upsell_value||0));
    c.renewal=Math.max(c.renewal,Number(r.renewal_value||0));
  });
  return Object.values(map).sort((a,b)=>b.upsell-a.upsell);
}

async function render(){
  setTitle('Features Plan · Upselling','Upsell features grouped by company');
  loading('Loading Features Plan…');

  const rows=await get('features_plan_rows',2000).catch(()=>[]);
  const companies=groupByCompany(rows);

  const products=[...new Set(rows.map(r=>r.product_line).filter(Boolean))].sort();
  const owners=[...new Set(rows.map(r=>r.owner_name).filter(Boolean))].sort();
  let filterProduct='All',filterOwner='All';

  window._featData={companies,rows};
  function refilter(){
    const fc=companies.filter(c=>(filterProduct==='All'||c.product_line===filterProduct)&&(filterOwner==='All'||c.owner_name===filterOwner));
    window._featData.filtered=fc;
    const el=document.getElementById('feat-table');if(el)el.innerHTML=table(fc,CO_COLS,20);
    const ct=document.getElementById('feat-count');if(ct)ct.textContent=fc.length+' companies';
  }
  window._featFilter=function(type,val){if(type==='product')filterProduct=val;else filterOwner=val;refilter();};

  const cards=`<div class="sum-grid g6">
    ${sumCard('Companies',num(companies.length),'Unique','var(--blue)','Modal.open({title:"All Companies",rows:window._featData.filtered||window._featData.companies,cols:[]})')}
    ${sumCard('Proposal Sent',num(companies.reduce((s,c)=>s+c.proposal,0)),'Feature rows','var(--purple)','Modal.open({title:"Proposal Sent",rows:(window._featData.filtered||window._featData.companies).filter(c=>c.proposal>0),cols:[]})')}
    ${sumCard('Interested',num(companies.reduce((s,c)=>s+c.interested,0)),'Feature rows','var(--green)','Modal.open({title:"Interested",rows:(window._featData.filtered||window._featData.companies).filter(c=>c.interested>0),cols:[]})')}
    ${sumCard('Not Interested',num(companies.reduce((s,c)=>s+c.not_interested,0)),'Feature rows','var(--red)','Modal.open({title:"Not Interested",rows:(window._featData.filtered||window._featData.companies).filter(c=>c.not_interested>0),cols:[]})')}
    ${sumCard('Total Upsell',money(companies.reduce((s,c)=>s+c.upsell,0)),'Company max','var(--amber)','')}
    ${sumCard('Total Renewal',money(companies.reduce((s,c)=>s+c.renewal,0)),'Company max','var(--cyan)','')}
  </div>`;

  const filterBar='<div class="pnl-filter-bar">'
    +'<select class="pnl-select" onchange="window._featFilter(\'product\',this.value)">'
    +'<option value="All">All Products</option>'+products.map(p=>'<option>'+esc(p)+'</option>').join('')+'</select>'
    +'<select class="pnl-select" onchange="window._featFilter(\'owner\',this.value)">'
    +'<option value="All">All Owners</option>'+owners.map(o=>'<option>'+esc(o)+'</option>').join('')+'</select>'
    +'<button class="badge bb" onclick="Modal.open({title:\'All Feature Rows\',rows:window._featData.rows,cols:[]})">All '+rows.length+' feature rows</button>'
    +'</div>';

  const mainCard=card('<div class="card-icon" style="background:var(--blue-bg)">🚀</div> Company Features Plan',
    '<span class="badge bb" id="feat-count">'+companies.length+' companies</span>',
    filterBar+'<div id="feat-table">'+table(companies,CO_COLS,20)+'</div>');

  window.U.setContent(cards+mainCard);
  window._featData.filtered=companies;
}
return {render};
})();

/* ── P&L MODULE ── */
window.PnlModule=(function(){
'use strict';
const {esc,money,num,pct,setTitle,loading,unavail}=window.U;
const {sumCard,table,card}=window.C;
const {get}=window.State;

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let _charts={};
function destroyCharts(){Object.values(_charts).forEach(c=>{try{c.destroy();}catch(e){}});_charts={};}

const MONTHLY_COLS=[
  {label:'Year',key:'year',center:true},{label:'Month',key:'month',center:true},{label:'Product',key:'product'},
  {label:'Booking',key:'booking',center:true,render:r=>money(r.booking)},
  {label:'Cashing',key:'cashing',center:true,render:r=>money(r.cashing)},
  {label:'COGS',key:'cogs',center:true,render:r=>money(r.cogs)},
  {label:'Overheads',key:'overheads',center:true,render:r=>money(r.overheads)},
  {label:'Support',key:'support_allocation',center:true,render:r=>money(r.support_allocation)},
  {label:'Total Cost',key:'total_cost',center:true,render:r=>money(r.total_cost)},
  {label:'Net Cash',key:'net_cash_position',center:true,render:r=>{const v=Number(r.net_cash_position||0);return '<span style="color:'+(v<0?'var(--red)':'var(--green)')+'";font-family:var(--mono);font-weight:900">'+money(v)+'</span>';}},
];
const COST_COLS=[
  {label:'Year',key:'year',center:true},{label:'Product',key:'product'},
  {label:'COGS',key:'cogs',center:true,render:r=>money(r.cogs)},
  {label:'Overheads',key:'overheads',center:true,render:r=>money(r.overheads)},
  {label:'Support',key:'support_allocation',center:true,render:r=>money(r.support_allocation)},
  {label:'Total Cost',key:'total_cost',center:true,render:r=>money(r.total_cost)},
];

function sumBy(rows,year,key){return MONTHS.map((_,i)=>rows.filter(r=>String(r.year)===String(year)&&(Number(r.month)===i+1||String(r.month).slice(0,3).toLowerCase()===MONTHS[i].toLowerCase())).reduce((a,b)=>a+Number(b[key]||0),0));}
function total(rows,year,key){return sumBy(rows,year,key).reduce((a,b)=>a+b,0);}

function drawCharts(rows){
  if(!window.Chart||!rows.length)return;
  destroyCharts();
  const barEl=document.getElementById('pnl-bar');
  if(barEl)_charts.bar=new Chart(barEl,{
    type:'bar',
    data:{labels:['Booking','Cashing','Total Cost'],
      datasets:[
        {label:'2025',data:[total(rows,'2025','booking'),total(rows,'2025','cashing'),total(rows,'2025','total_cost')],backgroundColor:'rgba(124,58,237,.35)',borderColor:'#7C3AED',borderWidth:1.5},
        {label:'2026',data:[total(rows,'2026','booking'),total(rows,'2026','cashing'),total(rows,'2026','total_cost')],backgroundColor:'rgba(22,163,74,.35)',borderColor:'#16A34A',borderWidth:1.5},
      ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:12}}},
      scales:{x:{ticks:{font:{size:9}}},y:{ticks:{font:{size:9},callback:v=>Math.abs(v)>=1e6?(v/1e6).toFixed(1)+'M':Math.abs(v)>=1e3?(v/1e3).toFixed(0)+'K':v}}}}
  });
  const lineEl=document.getElementById('pnl-line');
  if(lineEl)_charts.line=new Chart(lineEl,{
    type:'line',
    data:{labels:MONTHS,datasets:[
      {label:'Booking 26',data:sumBy(rows,'2026','booking'),borderColor:'#7C3AED',backgroundColor:'rgba(124,58,237,.06)',tension:.35,fill:true,borderWidth:2},
      {label:'Cashing 26',data:sumBy(rows,'2026','cashing'),borderColor:'#16A34A',backgroundColor:'rgba(22,163,74,.06)',tension:.35,fill:true,borderWidth:2},
      {label:'Cost 26',data:sumBy(rows,'2026','total_cost'),borderColor:'#D97706',backgroundColor:'rgba(217,119,6,.06)',tension:.35,fill:true,borderWidth:2},
      {label:'Booking 25',data:sumBy(rows,'2025','booking'),borderColor:'rgba(124,58,237,.4)',tension:.35,fill:false,borderWidth:1.5,borderDash:[4,3]},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:12}}},
      scales:{x:{ticks:{font:{size:9}}},y:{ticks:{font:{size:9},callback:v=>Math.abs(v)>=1e6?(v/1e6).toFixed(1)+'M':v}}}}
  });
  const gapEl=document.getElementById('pnl-gap');
  if(gapEl){const c26=sumBy(rows,'2026','cashing'),co26=sumBy(rows,'2026','total_cost'),gap=c26.map((v,i)=>v-co26[i]);
    _charts.gap=new Chart(gapEl,{type:'bar',data:{labels:MONTHS,datasets:[{label:'Cash - Cost',data:gap,
      backgroundColor:gap.map(v=>v>=0?'rgba(22,163,74,.45)':'rgba(220,38,38,.45)'),
      borderColor:gap.map(v=>v>=0?'#16A34A':'#DC2626'),borderWidth:1.5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:9}}},y:{ticks:{font:{size:9},callback:v=>Math.abs(v)>=1e6?(v/1e6).toFixed(1)+'M':v}}}}});}
}

async function render(){
  setTitle('P&L · Revenue Analysis','2025 full year · 2026 actuals to date');
  loading('Loading P&L…');
  const [execR,monthlyR,costR]=await Promise.allSettled([

      <div class="pnl-exec-s">Cash / Total Cost</div></div>
    <div class="pnl-exec-card" style="--fc:var(--cyan)">
      <div class="pnl-exec-v">${pct(y26.booking_cash_pct||0)}</div><div class="pnl-exec-l">Booking → Cash</div>
      <div class="pnl-exec-s">Cash / Booking</div></div>
  </div>`;

  const products=[...new Set(monthly.map(r=>r.product).filter(Boolean))].sort();
  window._pnlFilter=function(){
    const yr=document.getElementById('pnl-yr')?.value||'all';
    const pr=document.getElementById('pnl-pr')?.value||'All';
    const f=monthly.filter(r=>(yr==='all'||String(r.year)===yr)&&(pr==='All'||r.product===pr));
    const el=document.getElementById('pnl-tbl');if(el)el.innerHTML=table(f,MONTHLY_COLS,20);

  const filterBar='<div class="pnl-filter-bar">'
    +'<select class="pnl-select" id="pnl-yr" onchange="window._pnlFilter()">'
    +'<option value="all">All Years</option><option value="2026" selected>2026</option><option value="2025">2025</option></select>'
    +'<select class="pnl-select" id="pnl-pr" onchange="window._pnlFilter()">'
    +'<option value="All">All Products</option>'+products.map(p=>'<option>'+esc(p)+'</option>').join('')+'</select>'
    +'<button class="badge bb" onclick="Modal.open({title:\'Full Monthly P&L\',rows:window._pnlData.monthly,cols:[]})">Export All</button>'
    +'</div>';

  const charts=`<div class="pnl-chart-grid">
    <div class="pnl-chart-card"><div class="pnl-chart-hd">YTD Comparison — Booking / Cashing / Cost</div>
      <div class="pnl-chart-wrap"><canvas id="pnl-bar"></canvas></div></div>
    <div class="pnl-chart-card"><div class="pnl-chart-hd">Monthly Trend 2026 vs 2025</div>
      <div class="pnl-chart-wrap"><canvas id="pnl-line"></canvas></div></div>
    <div class="pnl-chart-card"><div class="pnl-chart-hd">Cash vs Cost Gap — 2026</div>
      <div class="pnl-chart-wrap"><canvas id="pnl-gap"></canvas></div></div>
    ${cost.length?'<div class="pnl-chart-card"><div class="pnl-chart-hd">Cost Breakdown</div>'+table(cost,COST_COLS,10)+'</div>':''}
  </div>`;

  const monthSection=card('<div class="card-icon" style="background:var(--blue-bg)">📊</div> Monthly P&L Detail',
    '<span class="badge bb">'+monthly.length+' rows</span>',
    filterBar+'<div id="pnl-tbl">'+table(monthly.filter(r=>String(r.year)==='2026'),MONTHLY_COLS,20)+'</div>');

  window.U.setContent(execCards+charts+monthSection);
  setTimeout(()=>drawCharts(monthly),120);
}
return {render};
})();

/* ── ROUTER ── */
(function(){
'use strict';

const ROUTES={
  'acquisition':    ()=>window.AcqModule.render(),
  'retention-team': ()=>window.RetModule.render(),
  'retention-financial': ()=>window.FinModule.render(),
  'features-plan':  ()=>window.FeatModule.render(),
  'pnl':            ()=>window.PnlModule.render(),
};

function navigate(route){
  if(!ROUTES[route]) route='acquisition';
  window.State.setRoute(route);

  /* Sidebar nav active */
  document.querySelectorAll('.nav-btn[data-route]').forEach(el=>{
    el.classList.toggle('active', el.dataset.route===route);
  });
  /* Tabs active */
  document.querySelectorAll('.tab-btn[data-route]').forEach(el=>{
    el.classList.toggle('active', el.dataset.route===route);
  });

  window.scrollTo({top:0,behavior:'instant'});
  ROUTES[route]().catch(err=>{
    window.U.err('Route error: '+err.message);
    console.error(err);
  });
}

/* Wire sidebar nav buttons */
document.querySelectorAll('.nav-btn[data-route]').forEach(btn=>{
  btn.addEventListener('click',()=>navigate(btn.dataset.route));
});

/* Wire tabs */
document.querySelectorAll('.tab-btn[data-route]').forEach(btn=>{
  btn.addEventListener('click',()=>navigate(btn.dataset.route));
});

/* Refresh */
const rfBtn=document.getElementById('refreshBtn');
if(rfBtn){
  rfBtn.addEventListener('click',function(){
    this.classList.add('spin');
    window.State.flush();
    navigate(window.State.route);
    setTimeout(()=>this.classList.remove('spin'),1800);
  });
}

/* Boot */
navigate(window.State.route);
})();


</script>
